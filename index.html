  if (!allEx.length) return `<div style="color:#444;text-align:center;padding:40px">No exercises logged yet.</div>`;

  // Map exercise names to main LIFTS for PR annotation
  const LIFT_NAME_MAP = {
    'squat':['squat','back squat'],'bench':['bench','bench press','tempo bench'],
    'deadlift':['deadlift'],'ohp':['ohp','overhead press','btn press','press']
  };
  function getLiftKeyForExercise(name) {
    const n = (name||'').toLowerCase();
    for (const [key, aliases] of Object.entries(LIFT_NAME_MAP)) {
      if (aliases.some(a => n.includes(a))) return key;
    }
    return null;
  }

  const rangeOptions = [[0,'All time'],[4,'4 weeks'],[8,'8 weeks'],[12,'12 weeks'],[24,'6 months'],[52,'1 year']];

  const controlBar = `<div class="card" style="margin-bottom:16px;padding:14px 20px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="font-size:10px;color:#555;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap">Exercise</div>
      <select id="exercise-select" onchange="window.selectExercise(this.value)"
        style="flex:2;min-width:180px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-family:'DM Mono',monospace;font-size:12px;outline:none">
        <option value="">— pick an exercise —</option>
        ${allEx.map(n => `<option value="${n}" ${n===selectedExercise?'selected':''}>${n}</option>`).join('')}
      </select>
      <div style="font-size:10px;color:#555;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap">Range</div>
      <select id="ex-range-select" onchange="window.setExRange(this.value)"
        style="flex:1;min-width:110px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-family:'DM Mono',monospace;font-size:12px;outline:none">
        ${rangeOptions.map(([w,l]) => `<option value="${w}" ${exRangeWeeks===w?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
  </div>`;

  if (!selectedExercise) return controlBar + `<div style="color:#444;text-align:center;padding:30px;font-size:13px">Select an exercise above to see its trend.</div>`;

  const trend = getExerciseTrend(u.id, selectedExercise, exRangeWeeks);
  if (!trend.length) return controlBar + `<div style="color:#444;text-align:center;padding:30px">No data in this range. Try a wider window.</div>`;

  const allE1RMs = trend.map(t => t.topE1RM).filter(Boolean);
  const peakE1RM = allE1RMs.length ? Math.max(...allE1RMs) : 0;
  const latestE1RM = trend[trend.length-1]?.topE1RM || 0;
  const firstE1RM  = trend[0]?.topE1RM || 0;
  const e1rmDelta  = latestE1RM - firstE1RM;
  const muscles = getMuscles(selectedExercise);
  const allVols = trend.map(t => t.totalVol).filter(Boolean);
  const peakVol = allVols.length ? Math.max(...allVols) : 0;
  const liftKey = getLiftKeyForExercise(selectedExercise);
  const prEntry = liftKey ? getLiftPR(u, liftKey) : null;
  const trend7 = trend.slice(-3); // last 3 sessions momentum
  const momentum = trend7.length >= 2 ? (trend7[trend7.length-1].topE1RM||0) - (trend7[0].topE1RM||0) : null;

  return controlBar + `
    <!-- HEADLINE STATS -->
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card" style="background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.18)">
        <div class="stat-label" style="color:rgba(0,229,255,0.7)">Peak e1RM</div>
        <div class="stat-value" style="color:#00e5ff">${peakE1RM}<span class="stat-unit">lbs</span></div>
        ${prEntry ? `<div style="font-size:10px;color:#555;margin-top:4px">Logged PR: ${prEntry.weight} lbs</div>` : ''}
      </div>
      <div class="stat-card" style="background:rgba(105,255,71,0.07);border:1px solid rgba(105,255,71,0.18)">
        <div class="stat-label" style="color:rgba(105,255,71,0.7)">${exRangeWeeks ? 'Range' : 'All-time'} gain</div>
        <div class="stat-value" style="color:${e1rmDelta>=0?'#69ff47':'#ff4d8d'};font-size:28px">${e1rmDelta>=0?'+':''}${e1rmDelta}<span class="stat-unit">lbs</span></div>
      </div>
      <div class="stat-card" style="background:rgba(255,224,64,0.07);border:1px solid rgba(255,224,64,0.18)">
        <div class="stat-label" style="color:rgba(255,224,64,0.7)">Sessions</div>
        <div class="stat-value" style="color:#ffe040">${trend.length}</div>
        ${momentum !== null ? `<div style="font-size:10px;color:${momentum>=0?'#69ff47':'#ff4d8d'};margin-top:4px">${momentum>=0?'↑':'↓'} ${Math.abs(momentum)} last 3</div>` : ''}
      </div>
      <div class="stat-card" style="background:rgba(199,125,255,0.07);border:1px solid rgba(199,125,255,0.18)">
        <div class="stat-label" style="color:rgba(199,125,255,0.7)">Peak Volume</div>
        <div class="stat-value" style="color:#c77dff;font-size:28px">${peakVol>0?Math.round(peakVol/1000):'—'}<span class="stat-unit">${peakVol>0?'k lbs':''}</span></div>
      </div>
    </div>

    ${muscles.length ? `<div style="font-size:11px;color:#555;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="color:#444">Muscles:</span>
      ${muscles.map(m=>`<span style="color:${MUSCLE_COLORS[m]||'#888'};background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:3px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">${m}</span>`).join('')}
    </div>` : ''}

    <!-- E1RM TREND CHART -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">
        <span class="card-title-icon">📈</span>Estimated 1RM — ${selectedExercise}
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          ${prEntry ? `<span style="font-size:10px;color:#ffe040;background:rgba(255,224,64,0.08);border:1px solid rgba(255,224,64,0.2);padding:2px 8px;border-radius:3px">🏆 PR ${prEntry.weight} lbs</span>` : ''}
          <span style="font-size:10px;color:#555">RPE-adjusted · dashed = actual top set</span>
        </div>
      </div>
      <canvas id="ex-trend-chart" style="max-height:300px"></canvas>
    </div>

    <!-- VOLUME + RPE COMBO CHART -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">📦</span>Session Volume &amp; Avg RPE</div>
      <canvas id="ex-vol-chart" style="max-height:200px"></canvas>
    </div>

    <!-- SESSION HISTORY TABLE -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">🎯</span>Session History
        <span style="margin-left:auto;font-size:10px;color:#444">${trend.length} sessions · ${exRangeWeeks ? exRangeWeeks+' week window' : 'all time'}</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Date</th><th>Session</th><th>Top Set</th><th>e1RM</th><th>Avg RPE</th><th>Volume</th>
          </tr></thead>
          <tbody>
            ${[...trend].reverse().map(t => {
              const isPeak = t.topE1RM === peakE1RM && peakE1RM > 0;
              const topSet = [...(t.sets||[])].sort((a,b) => (setE1RM(b)||0)-(setE1RM(a)||0))[0];
              const rpeColor = t.avgRPE >= 9 ? '#ff4d8d' : t.avgRPE >= 8 ? '#ff6b2b' : t.avgRPE >= 7 ? '#ffe040' : '#69ff47';
              return `<tr style="${isPeak?'background:rgba(0,229,255,0.06);':''}" >
                <td style="color:#777;font-size:11px;white-space:nowrap">${fmtDate(t.date)}</td>
                <td style="font-size:10px;color:#555;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.label||''}</td>
                <td style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text);white-space:nowrap">
                  ${topSet?.weight ? topSet.weight+' × '+(topSet.reps||'?') : topSet?.weightNote || '—'}
                  ${topSet?.rpe ? `<span style="font-size:10px;color:#666"> @${topSet.rpe}</span>` : ''}
                </td>
                <td style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${isPeak?'#00e5ff':'var(--text)'};white-space:nowrap">
                  ${t.topE1RM||'—'} ${isPeak?'<span class="peak-badge">PEAK</span>':''}
                </td>
                <td style="font-size:12px;color:${t.avgRPE?rpeColor:'#444'}">${t.avgRPE||'—'}</td>
                <td style="font-size:11px;color:#555">${t.totalVol ? Math.round(t.totalVol/1000)+'k' : '—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function mountExerciseChart(userId, exerciseName) {
  const trend = getExerciseTrend(userId, exerciseName, exRangeWeeks);
  if (!trend.length) return;
  const u = users.find(x => x.id === userId);
  const color = u?.color || '#00e5ff';

  // Find PR from logged lifts for annotation
  const LIFT_NAME_MAP = {'squat':['squat','back squat'],'bench':['bench','bench press','tempo bench'],'deadlift':['deadlift'],'ohp':['ohp','overhead press','btn press']};
  let prWeight = null;
  for (const [key, aliases] of Object.entries(LIFT_NAME_MAP)) {
    if (aliases.some(a => exerciseName.toLowerCase().includes(a))) {
      const pr = getLiftPR(u, key);
      if (pr) prWeight = pr.weight;
      break;
    }
  }

  const peakE1RM = Math.max(...trend.map(t => t.topE1RM||0));
  const labels = trend.map(t => fmtDate(t.date));

  // RPE → point color: low=green, mid=yellow, high=red, none=grey
  const rpeColor = rpe => rpe >= 9 ? '#ff4d8d' : rpe >= 8 ? '#ff6b2b' : rpe >= 7 ? '#ffe040' : rpe ? '#69ff47' : color+'88';

  // ── e1RM chart ─────────────────────────────────────────────
  const ctx1 = document.getElementById('ex-trend-chart');
  if (ctx1) {
    const ch = Chart.getChart(ctx1); if (ch) ch.destroy();
    const datasets = [{
      label: 'Est. 1RM (RPE-adj)',
      data: trend.map(t => t.topE1RM),
      borderColor: color, backgroundColor: color+'18', borderWidth: 2.5,
      pointRadius: trend.map(t => t.topE1RM === peakE1RM ? 8 : 5),
      pointBackgroundColor: trend.map(t => t.topE1RM === peakE1RM ? '#ffffff' : rpeColor(t.avgRPE)),
      pointBorderColor: trend.map(t => t.topE1RM === peakE1RM ? color : 'transparent'),
      pointBorderWidth: 2,
      fill: true, tension: 0.35,
    }, {
      label: 'Top Working Set',
      data: trend.map(t => t.topWeight),
      borderColor: color+'66', backgroundColor: 'transparent', borderWidth: 1.5,
      borderDash: [6,4], pointRadius: 3, pointBackgroundColor: color+'66',
      fill: false, tension: 0.35,
    }];

    // PR annotation line if available
    if (prWeight) {
      datasets.push({
        label: 'Logged PR',
        data: Array(trend.length).fill(prWeight),
        borderColor: '#ffe040', backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [3,4],
        pointRadius: 0, fill: false,
      });
    }

    new Chart(ctx1, {
      type: 'line',
      data: { labels, datasets },
      options: {
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { labels: { color:'#777', font:{family:'DM Mono',size:10}, boxWidth:16, padding:16 } },
          tooltip: {
            backgroundColor:'rgba(10,10,20,0.95)', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
            titleColor:'#aaa', bodyColor:'#ccc', titleFont:{family:'DM Mono',size:10}, bodyFont:{family:'DM Mono',size:11},
            padding:10,
            callbacks: {
              title: items => fmtDate(trend[items[0].dataIndex]?.date||''),
              afterBody: items => {
                const t = trend[items[0].dataIndex];
                if (!t) return [];
                const lines = [];
                if (t.avgRPE) lines.push(`RPE avg: ${t.avgRPE}`);
                if (t.totalVol) lines.push(`Volume: ${Math.round(t.totalVol/1000)}k lbs`);
                return lines;
              }
            }
          }
        },
        scales: {
          x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, maxRotation:45} },
          y: {
            grid:{color:'rgba(255,255,255,0.06)'}, 
            ticks:{color:'#666',font:{family:'DM Mono',size:10}, callback:v=>v+' lbs'},
            // Pad y axis so PR line has breathing room
            afterDataLimits(scale) { scale.max = Math.max(scale.max, (prWeight||0)*1.02); }
          }
        },
        responsive:true, maintainAspectRatio:true,
      }
    });
  }

  // ── Volume + RPE combo bar chart ───────────────────────────
  const ctx2 = document.getElementById('ex-vol-chart');
  if (ctx2) {
    const ch2 = Chart.getChart(ctx2); if (ch2) ch2.destroy();
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Volume (lbs)',
          data: trend.map(t => t.totalVol||0),
          backgroundColor: trend.map(t => {
            const r = parseFloat(t.avgRPE)||0;
            return r >= 9 ? '#ff4d8d55' : r >= 8 ? '#ff6b2b55' : r >= 7 ? '#ffe04055' : color+'44';
          }),
          borderColor: trend.map(t => {
            const r = parseFloat(t.avgRPE)||0;
            return r >= 9 ? '#ff4d8d' : r >= 8 ? '#ff6b2b' : r >= 7 ? '#ffe040' : color;
          }),
          borderWidth: 1.5, borderRadius: 4,
          yAxisID: 'y',
        }, {
          label: 'Avg RPE',
          data: trend.map(t => parseFloat(t.avgRPE)||null),
          type: 'line',
          borderColor: '#c77dff', backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#c77dff',
          tension: 0.3, fill: false,
          yAxisID: 'y2',
        }]
      },
      options: {
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { labels:{ color:'#777', font:{family:'DM Mono',size:10}, boxWidth:16, padding:14 } },
          tooltip: {
            backgroundColor:'rgba(10,10,20,0.95)', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
            titleColor:'#aaa', bodyColor:'#ccc', titleFont:{family:'DM Mono',size:10}, bodyFont:{family:'DM Mono',size:11},
            callbacks: { label: ctx => ctx.dataset.label+': '+(ctx.dataset.yAxisID==='y2' ? ctx.parsed.y : Math.round((ctx.parsed.y||0)/1000)+'k lbs') }
          }
        },
        scales: {
          x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, maxRotation:45} },
          y: { position:'left', grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, callback:v=>Math.round(v/1000)+'k'} },
          y2: { position:'right', min:5, max:10, grid:{display:false}, ticks:{color:'#c77dff99',font:{family:'DM Mono',size:10}, callback:v=>'RPE '+v} }
        },
        responsive:true, maintainAspectRatio:true,
      }
    });
  }
}

// ── VOLUME TAB ────────────────────────────────────────────────
const MUSCLE_COLORS = {
  'chest':'#ff4d8d','triceps':'#ff6b2b','front delt':'#ffe040',
  'quads':'#69ff47','glutes':'#1de9b6','hamstrings':'#00e5ff',
  'lower back':'#c77dff','lats':'#7b5ea7','upper back':'#4a90d9',
  'side delt':'#ffb347','rear delt':'#ff7eb3','biceps':'#a8e6cf',
  'core':'#f8f8f8','obliques':'#ddd','traps':'#aaa','adductors':'#888',
};

function renderVolumeTab(u) {
  const weeklyVol = getWeeklyVolume(u.id);
  const allWeeks = Object.keys(weeklyVol).sort();
  if (!allWeeks.length) return `<div style="color:#444;text-align:center;padding:40px">No data yet. Log some sessions first.</div>`;

  const weeks = allWeeks.slice(-volRangeWeeks);

  // Most recent week with data (may not be current calendar week)
  const latestWeek = weeks[weeks.length-1];
  const thisMuscles = weeklyVol[latestWeek] || {};
  const muscles = [...new Set(Object.values(weeklyVol).flatMap(w => Object.keys(w)))].sort();

  const MRV = { chest:20, triceps:18, front_delt:16, quads:20, glutes:18, hamstrings:20, lower_back:12, lats:20, upper_back:20, side_delt:20, rear_delt:20, biceps:18, core:16 };
  const rangeOptions = [[4,'4 wk'],[8,'8 wk'],[12,'12 wk'],[26,'6 mo'],[52,'1 yr']];

  return `
    <!-- RANGE SELECTOR -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <span style="font-size:10px;color:#555;letter-spacing:0.12em;text-transform:uppercase">History window</span>
      <div style="display:flex;gap:4px">
        ${rangeOptions.map(([w,l]) => `<button class="chart-mode-btn ${volRangeWeeks===w?'active':''}"
          onclick="window.setVolRange(${w})" style="font-size:10px;padding:4px 10px">${l}</button>`).join('')}
      </div>
      <span style="font-size:10px;color:#444;margin-left:4px">Most recent: week of ${fmtDate(latestWeek)}</span>
    </div>

    <!-- LATEST WEEK MUSCLE GRID -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">💪</span>Latest Week — Sets per Muscle Group
        <span style="margin-left:auto;font-size:11px;color:#555">vs. Israetel MEV/MRV</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${muscles.map(m => {
          const sets = thisMuscles[m] || 0;
          const key = m.replace(/ /g,'_');
          const mrv = MRV[key] || 16;
          const mev = Math.round(mrv * 0.4); // MEV ≈ 40% of MRV
          const pct = Math.min(100, (sets/mrv)*100);
          const col = MUSCLE_COLORS[m] || '#888';
          const status = sets === 0 ? '#333' : sets < mev ? '#ff4d8d' : pct < 70 ? '#ffe040' : '#69ff47';
          const label = sets === 0 ? 'none' : sets < mev ? 'under MEV' : pct >= 100 ? 'at MRV' : 'good';
          return `<div style="flex:1;min-width:130px;background:rgba(255,255,255,0.03);border:1px solid ${col}22;border-radius:8px;padding:12px">
            <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">
              <span style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:${status}">${sets}</span>
              <span style="font-size:10px;color:#444">/ ${mrv}</span>
            </div>
            <div style="font-size:10px;color:${col};letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">${m}</div>
            <div style="position:relative;height:5px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-bottom:4px">
              <div style="height:100%;width:${pct.toFixed(0)}%;background:linear-gradient(90deg,${col}88,${col});border-radius:2px"></div>
              <div style="position:absolute;top:0;left:40%;width:1px;height:100%;background:rgba(255,255,255,0.15)"></div>
            </div>
            <div style="font-size:9px;color:${status};letter-spacing:0.06em">${label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- WEEKLY VOLUME CHART -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">📊</span>Weekly Volume — Sets by Muscle Group</div>
      <canvas id="volume-chart" style="max-height:320px"></canvas>
    </div>

    <!-- TONNAGE OVERVIEW CARDS -->
    ${(() => {
      const weeklyTon = getWeeklyTonnage(u.id);
      const tonWeeks = Object.keys(weeklyTon).sort().slice(-volRangeWeeks);
      const sessions = getUserSessions(u.id).filter(s => {
        const wk = (() => { const d=new Date(s.date+'T00:00:00'); const ws=new Date(d); ws.setDate(d.getDate()-d.getDay()); return ws.toISOString().split('T')[0]; })();
        return tonWeeks.includes(wk);
      }).sort((a,b)=>b.date.localeCompare(a.date));
      const exTon = getExerciseTonnage(u.id);
      const totalTon = tonWeeks.reduce((s,w)=>s+(weeklyTon[w]||0),0);
      const peakWeek = tonWeeks.reduce((best,w)=>weeklyTon[w]>weeklyTon[best]?w:best, tonWeeks[0]||'');
      const avgWeekly = tonWeeks.length ? Math.round(totalTon/tonWeeks.length) : 0;
      const topExercises = Object.entries(exTon)
        .filter(([,v])=>v.total>0)
        .sort(([,a],[,b])=>b.total-a.total).slice(0,5);
      // Sessions sorted by tonnage
      const sessionsByTon = sessions.map(s=>({...s, ton: calcSessionTonnage(s)})).filter(s=>s.ton>0).sort((a,b)=>b.ton-a.ton).slice(0,5);
      const maxTon = Math.max(...tonWeeks.map(w=>weeklyTon[w]||0), 1);

      return `
      <div class="card" style="margin-bottom:16px">
        <div class="card-title"><span class="card-title-icon">🏋️</span>Training Tonnage
          <span style="margin-left:auto;font-size:11px;color:#555">weight × reps across all sets</span>
        </div>
        <!-- Headline stats -->
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
          <div style="flex:1;min-width:110px;background:rgba(199,125,255,0.07);border:1px solid rgba(199,125,255,0.2);border-radius:8px;padding:14px">
            <div style="font-size:9px;color:rgba(199,125,255,0.7);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px">Period Total</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#c77dff;line-height:1">${(totalTon/1000).toFixed(1)}<span style="font-size:13px;opacity:0.6"> k lbs</span></div>
          </div>
          <div style="flex:1;min-width:110px;background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:14px">
            <div style="font-size:9px;color:rgba(0,229,255,0.7);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px">Avg / Week</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#00e5ff;line-height:1">${(avgWeekly/1000).toFixed(1)}<span style="font-size:13px;opacity:0.6"> k lbs</span></div>

    <!-- FREQUENCY TABLE -->
    <div class="card">
      <div class="card-title"><span class="card-title-icon">📅</span>Muscle Frequency Grid
        <span style="margin-left:auto;font-size:10px;color:#444">green=12+ · yellow=6–11 · red=1–5 · —=none</span>
      </div>

        <table>
          <thead><tr>
            <th>Muscle</th>
            ${weeks.map(w => `<th style="text-align:center;font-size:10px">${fmtDate(w)}</th>`).join('')}
            <th style="text-align:center">Avg</th>
          </tr></thead>
          <tbody>
            ${muscles.map(m => {
              const sets = weeks.map(w => weeklyVol[w]?.[m] || 0);
              const avg = (sets.reduce((a,b)=>a+b,0)/sets.length).toFixed(1);
              const col = MUSCLE_COLORS[m] || '#888';
              return `<tr>
                <td style="font-size:11px;color:${col};min-width:90px;padding:8px 10px">${m}</td>
                ${sets.map(s => `<td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:${s===0?'#2a2a3a':s<6?'#ff4d8d':s<12?'#ffe040':'#69ff47'};padding:8px 6px">${s||'—'}</td>`).join('')}
                <td style="text-align:center;font-size:12px;color:${col};font-weight:bold">${avg}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- LIFT FREQUENCY HEATMAP -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">📅</span>Lift Frequency — Last 12 Weeks
        <span style="margin-left:auto;font-size:10px;color:#333">sessions containing each lift</span>
      </div>
      ${(() => {
        const weeks = 12;
        const today = new Date();
        // Get all unique exercises from sessions in range
        const rangeStart = new Date(today); rangeStart.setDate(today.getDate() - weeks*7);
        const recentSessions = sessions.filter(s => new Date(s.date+'T00:00:00') >= rangeStart);
        // Count per exercise per week
        const exCounts = {};
        recentSessions.forEach(sess => {
          const wk = new Date(sess.date+'T00:00:00');
          const monday = new Date(wk); monday.setDate(wk.getDate() - wk.getDay() + (wk.getDay()===0?-6:1));
          const wkKey = monday.toISOString().split('T')[0];
          (sess.sets||[]).forEach(set => {
            const ex = set.exercise||'Unknown';
            if (!exCounts[ex]) exCounts[ex] = {};
            exCounts[ex][wkKey] = (exCounts[ex][wkKey]||0) + 1;
          });
        });
        // Top 8 most frequent exercises
        const topEx = Object.entries(exCounts)
          .map(([ex,wks]) => ({ex, total: Object.values(wks).reduce((s,v)=>s+v,0), wks}))
          .sort((a,b) => b.total - a.total).slice(0,8);
        if (!topEx.length) return '<div style="font-size:12px;color:#444;padding:12px 0">No exercise data yet.</div>';
        // Build week labels
        const wkLabels = [];
        for (let w=weeks-1; w>=0; w--) {
          const d = new Date(today); d.setDate(today.getDate() - d.getDay() + (d.getDay()===0?-6:1) - w*7);
          wkLabels.push(d.toISOString().split('T')[0]);
        }
        const maxCount = Math.max(...topEx.flatMap(e=>Object.values(e.wks)));
        let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:separate;border-spacing:2px">';
        html += '<tr><th style="text-align:left;font-size:9px;color:#444;padding:2px 8px 2px 0;white-space:nowrap">Exercise</th>';
        wkLabels.forEach(wk => {
          const d = new Date(wk+'T00:00:00');
          html += `<th style="font-size:8px;color:#333;text-align:center;padding:2px;white-space:nowrap">${d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'})}</th>`;
        });
        html += '<th style="font-size:9px;color:#444;padding:2px 0 2px 6px">Total</th></tr>';
        topEx.forEach(({ex, total, wks}) => {
          html += `<tr><td style="font-size:10px;color:#aaa;padding:3px 8px 3px 0;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis">${ex}</td>`;
          wkLabels.forEach(wk => {
            const c = wks[wk]||0;
            const intensity = c ? Math.min(1, c/maxCount) : 0;
            const bg = c ? \`rgba(105,255,71,\${0.15+intensity*0.7})\` : 'rgba(255,255,255,0.03)';
            html += \`<td style="width:22px;height:22px;background:\${bg};border-radius:3px;text-align:center;font-size:9px;color:\${c?'#69ff47':'#222'}">\${c||''}</td>\`;
          });
          html += \`<td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#69ff47;padding-left:8px">\${total}</td></tr>\`;
        });
        html += '</table></div>';
        return html;
      })()}
    </div>
  `;
}

function mountVolumeChart(userId) {
  const ctx = document.getElementById('volume-chart');
  if (!ctx) return;
  const ch = Chart.getChart(ctx); if (ch) ch.destroy();
  const weeklyVol = getWeeklyVolume(userId);
  const weeks = Object.keys(weeklyVol).sort().slice(-volRangeWeeks);
  if (!weeks.length) return;
  const muscles = [...new Set(Object.values(weeklyVol).flatMap(w => Object.keys(w)))].sort();
  const ranked = muscles.map(m => ({ m, total: weeks.reduce((s,w) => s+(weeklyVol[w]?.[m]||0), 0) }))
    .sort((a,b) => b.total-a.total).slice(0,8).map(x=>x.m);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weeks.map(w => fmtDate(w)),
      datasets: ranked.map(m => ({
        label: m, data: weeks.map(w => weeklyVol[w]?.[m] || 0),
        backgroundColor: (MUSCLE_COLORS[m]||'#888')+'aa',
        borderColor: MUSCLE_COLORS[m]||'#888', borderWidth:1, borderRadius:3,
      }))
    },
    options: {
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend:{ labels:{color:'#777',font:{family:'DM Mono',size:10},boxWidth:12,padding:12} },
        tooltip:{ backgroundColor:'rgba(10,10,20,0.95)', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          titleColor:'#aaa', bodyColor:'#ccc', titleFont:{family:'DM Mono',size:10}, bodyFont:{family:'DM Mono',size:11} }
      },
      scales: {
        x: { stacked:true, grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, maxRotation:45} },
        y: { stacked:true, grid:{color:'rgba(255,255,255,0.06)'}, ticks:{color:'#666',font:{family:'DM Mono',size:10},callback:v=>v+' sets'} }
      },
      responsive:true, maintainAspectRatio:true,
    }
  });
}

window.previewImport = function(userId) {
  const text   = document.getElementById('import-paste')?.value;
  const dateEl = document.getElementById('import-date');
  const baseDate = dateEl?.value || new Date().toISOString().split('T')[0];
  if (!text?.trim()) return;

  const parsed = parseWorkoutPaste(text);
  // Assign dates: space sessions 1 day apart starting from baseDate
  parsed.forEach((s, i) => {
    const d = new Date(baseDate + 'T00:00:00');
    d.setDate(d.getDate() + i);
    s.date = d.toISOString().split('T')[0];
    s.userId = userId;
  });

  const el = document.getElementById('import-preview');
  if (!el) return;

  if (!parsed.length) {
    el.innerHTML = `<div style="color:#ff4d8d;font-size:13px">No sessions detected. Check format.</div>`;
    return;
  }

  const u = users.find(x => x.id === userId);
  el.innerHTML = `
    <div style="font-size:11px;color:#69ff47;margin-bottom:14px">✅ ${parsed.length} sessions parsed — review below, then confirm import.</div>
    ${parsed.map((s,i) => `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${u?.color||'#00e5ff'}">${s.label}</span>
        <span style="font-size:10px;color:#444">Day ${s.cycle} · ${fmtDate(s.date)}</span>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <label style="font-size:10px;color:#555;text-transform:none;letter-spacing:0;margin:0">Date:</label>
          <input type="date" value="${s.date}" id="import-date-${i}"
            style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 8px;font-family:'DM Mono',monospace;font-size:11px;outline:none;width:130px">
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${(s.exercises||[]).map(ex => {
          const hasSets = ex.sets.filter(st=>st.weight||st.reps||st.weightNote).length;
          return `<span style="font-size:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:3px 8px;color:${hasSets?'#aaa':'#555'}">
            ${ex.name}${hasSets ? ' ('+hasSets+' sets)' : ''}
          </span>`;
        }).join('')}
      </div>
    </div>`).join('')}
    <button class="btn" style="width:100%;margin-top:8px" onclick="window.confirmImport('${userId}')">
      ✅ Import ${parsed.length} Sessions
    </button>
  `;

  // Store parsed data for confirm
  window._pendingImport = parsed;
};

window.confirmImport = async function(userId) {
  const parsed = window._pendingImport;
  if (!parsed?.length) return;
  // Update dates from per-session inputs
  parsed.forEach((s, i) => {
    const d = document.getElementById('import-date-'+i);
    if (d?.value) s.date = d.value;
    s.userId = userId;
  });
  for (const s of parsed) await saveTrainingSession(s);
  window._pendingImport = null;
  trainingSubTab = 'log';
  renderTraining();
};

window._doCopySession = async function(userId, srcId) {
  const sessions = trainingData[userId] || [];
  const src = sessions.find(s => s.id === srcId);
  if (!src || !db) return;
  const date = document.getElementById('copy-date')?.value || new Date().toISOString().split('T')[0];
  const label = document.getElementById('copy-label')?.value?.trim() || src.label;
  const newId = genId();
  const newSession = { ...src, id: newId, date, label,
    sets: src.sets ? src.sets.map(s => ({...s, id: genId(), reps: s.reps, weight: s.weight})) : [] };
  await set(ref(db, `training/${userId}/${newId}`), newSession);
  document.getElementById('confirmDialog').style.display = 'none';
};

window._saveCustomTemplate = function(userId) {
  const name = document.getElementById('new-template-name')?.value?.trim();
  if (!name) return;
  const sessions = trainingData[userId] || [];
  // Get last 7 days' session labels as the split
  const recent = [...sessions].sort((a,b) => b.date.localeCompare(a.date)).slice(0,7);
  const days = recent.length ? recent.map(s => s.label || 'Session').reverse() : ['Day 1'];
  const saved = settings.customTemplates || [];
  saved.push({ name, days });
  saveSetting('customTemplates', saved);
  window.showSplitTemplates(userId); // refresh
};

window._deleteTemplate = function(idx) {
  const saved = settings.customTemplates || [];
  saved.splice(idx, 1);
  saveSetting('customTemplates', saved);
};

window.showAddSession = function(userId) {
  const el = document.getElementById('confirmDialog');
  el.style.display = 'flex';
  el.innerHTML = `<div class="confirm-dialog"><div class="confirm-box" style="max-width:520px;text-align:left;max-height:90vh;overflow-y:auto">
    <h3 style="color:var(--yellow);margin-bottom:18px">New Training Session</h3>
    <div class="form-group"><label>Date</label><input type="date" id="ns-date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="form-group"><label>Session Label</label><input type="text" id="ns-label" placeholder="e.g. Day 1 — Primary Bench"></div>
    <div class="form-group"><label>Cycle (e.g. 1.1, 1.2, 2.1)</label><input type="text" id="ns-cycle" placeholder="1.1"></div>
    <div class="form-group"><label>Notes (optional)</label><input type="text" id="ns-notes" placeholder="How it felt, deload, etc."></div>
    <div style="font-size:11px;color:#555;margin-bottom:8px">Add exercises after creating the session.</div>
    <div class="confirm-btns">
      <button class="btn" id="nsSave">Create Session</button>
      <button class="btn btn-ghost" onclick="document.getElementById('confirmDialog').style.display='none'">Cancel</button>
    </div>
  </div></div>`;
  document.getElementById('nsSave').onclick = async () => {
    const session = {
      id: genId(), userId,
      date:  document.getElementById('ns-date').value,
      label: document.getElementById('ns-label').value || 'Session',
      cycle: document.getElementById('ns-cycle').value || '1.1',
      notes: document.getElementById('ns-notes').value || '',
      exercises: [],
    };
    // Optimistically add to local trainingSessions so showEditSession can find it
    // before Firebase onValue fires
    if (!trainingSessions[userId]) trainingSessions[userId] = [];
    trainingSessions[userId].unshift(session);
    await saveTrainingSession(session);
    el.style.display = 'none';
    editingSessionId = session.id;
    trainingSubTab = 'log';
    window.showEditSession(userId, session.id);
  };
};

// ── EDIT SESSION MODAL ────────────────────────────────────────
window.showEditSession = function(userId, sessionId) {
  const u = users.find(x => x.id === userId);
  const el = document.getElementById('confirmDialog');
  el.style.display = 'flex';

  // Always look up the session fresh from trainingSessions — never cache it
  function getS() {
    return (trainingSessions[userId] || []).find(x => x.id === sessionId)
        || getUserSessions(userId).find(x => x.id === sessionId);
  }

  function renderEditHTML() {
    const s = getS();
    if (!s) return `<div class="confirm-dialog"><div class="confirm-box">
      <p style="color:#555">Session not found.</p>
      <button class="btn btn-ghost" onclick="document.getElementById('confirmDialog').style.display='none'">Close</button>
    </div></div>`;
    return `<div class="confirm-dialog"><div class="confirm-box" style="max-width:640px;text-align:left;max-height:92vh;overflow-y:auto">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <h3 style="color:var(--yellow);flex:1">${s.label}</h3>
        <input type="date" value="${s.date}" id="es-date"
          style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:5px 8px;font-family:'DM Mono',monospace;font-size:11px;outline:none"
          onchange="window.updateSessionField('${userId}','${sessionId}','date',this.value)">
      </div>

      ${(s.exercises||[]).map((ex,ei) => `
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px;margin-bottom:10px" id="ex-block-${ex.id}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <input type="text" value="${ex.name}" id="ex-name-${ex.id}" style="flex:1;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text);padding:4px 0;font-family:'DM Mono',monospace;font-size:13px;outline:none"
              onchange="window.updateExerciseName('${userId}','${sessionId}','${ex.id}',this.value)">
            <button class="entry-del" onclick="window.deleteExercise('${userId}','${sessionId}','${ex.id}')">✕</button>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">
            ${ex.sets.map((st,si) => `
              <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:4px;padding:6px 8px;min-width:90px;position:relative">
                <div style="font-size:9px;color:#444;margin-bottom:3px">Set ${si+1}</div>
                <div style="display:flex;gap:4px;flex-wrap:wrap">
                  <input type="number" value="${st.weight||''}" placeholder="lbs" title="Weight"
                    style="width:56px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--text);padding:2px 4px;font-family:'DM Mono',monospace;font-size:11px;outline:none"
                    onchange="window.updateSet('${userId}','${sessionId}','${ex.id}','${st.id}','weight',this.value)">
                  <input type="number" value="${st.reps||''}" placeholder="reps" title="Reps"
                    style="width:44px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--text);padding:2px 4px;font-family:'DM Mono',monospace;font-size:11px;outline:none"
                    onchange="window.updateSet('${userId}','${sessionId}','${ex.id}','${st.id}','reps',this.value)">
                  <input type="number" value="${st.rpe||''}" placeholder="RPE" title="RPE" min="1" max="10" step="0.5"
                    style="width:44px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--text);padding:2px 4px;font-family:'DM Mono',monospace;font-size:11px;outline:none"
                    onchange="window.updateSet('${userId}','${sessionId}','${ex.id}','${st.id}','rpe',this.value)">
                </div>
                <button onclick="window.deleteSet('${userId}','${sessionId}','${ex.id}','${st.id}')"
                  style="position:absolute;top:4px;right:4px;background:none;border:none;color:#444;cursor:pointer;font-size:10px;line-height:1">✕</button>
              </div>`).join('')}
            <button onclick="window.addSet('${userId}','${sessionId}','${ex.id}')"
              style="background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);border-radius:4px;padding:6px 10px;color:#555;cursor:pointer;font-size:11px;min-width:60px;white-space:nowrap">+ Set</button>
          </div>
        </div>`).join('')}

      <button onclick="window.addExercise('${userId}','${sessionId}')"
        style="width:100%;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.12);border-radius:6px;padding:10px;color:#555;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;margin-bottom:14px">
        + Add Exercise
      </button>
      <button class="btn btn-ghost" style="width:100%" onclick="document.getElementById('confirmDialog').style.display='none';renderTraining()">Done</button>
    </div></div>`;
  }

  el.innerHTML = renderEditHTML();

  // Re-render pulls fresh data from trainingSessions each time — no stale closure
  window._reRenderEditSession = () => { el.innerHTML = renderEditHTML(); };
};

// Helper: get live session object from trainingSessions (always current)
function getLiveSession(uid, sid) {
  return (trainingSessions[uid] || []).find(x => x.id === sid) || null;
}

window.updateSessionField = async function(uid, sid, field, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  s[field] = val;
  saveTrainingSession(s); // fire-and-forget; no re-render needed (input already shows new val)
};
window.updateExerciseName = async function(uid, sid, exId, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  ex.name = val;
  saveTrainingSession(s);
};
window.updateSet = async function(uid, sid, exId, stId, field, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  const st = (ex.sets||[]).find(x=>x.id===stId); if(!st) return;
  st[field] = val === '' ? null : (field==='rpe'||field==='weight'||field==='reps') ? parseFloat(val) : val;
  saveTrainingSession(s);
};
window.deleteSet = async function(uid, sid, exId, stId) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  ex.sets = (ex.sets||[]).filter(x=>x.id!==stId);
  await saveTrainingSession(s);   // await so DOM update sees new data
  if (window._reRenderEditSession) window._reRenderEditSession();
};
window.addSet = async function(uid, sid, exId) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  const last = (ex.sets||[])[ex.sets.length-1] || {};
  ex.sets = [...(ex.sets||[]), { id:genId(), weight:last.weight||null, reps:last.reps||null, rpe:null, note:'' }];
  await saveTrainingSession(s);
  if (window._reRenderEditSession) window._reRenderEditSession();
};
window.deleteExercise = async function(uid, sid, exId) {
  const s = getLiveSession(uid, sid); if(!s) return;
  s.exercises = (s.exercises||[]).filter(e=>e.id!==exId);
  await saveTrainingSession(s);
  if (window._reRenderEditSession) window._reRenderEditSession();
};
window.addExercise = async function(uid, sid) {
  const s = getLiveSession(uid, sid); if(!s) return;
  // Optimistic mutation directly on the live object so re-render sees it immediately
  if (!s.exercises) s.exercises = [];
  s.exercises.push({ id:genId(), name:'New Exercise', sets:[{ id:genId(), weight:null, reps:null, rpe:null, note:'' }] });
  if (window._reRenderEditSession) window._reRenderEditSession(); // show immediately
  saveTrainingSession(s); // persist in background
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('mainNav').addEventListener('click', e => {
    const btn = e.target.closest('[data-view]');
    if (btn) window.showView(btn.dataset.view, { target: btn });
  });
});
initFirebase(HARDCODED_CONFIG);
</script>
