<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Prophecy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070e; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
    --text: #e4e4f0; --muted: #555; --cyan: #00e5ff; --green: #69ff47;
    --yellow: #ffe040; --pink: #ff4d8d; --orange: #ff6b2b; --purple: #c77dff;
    --iron: #1a1a2e;
  }
  /* ── THEMES (hard variants only) ───────────────────────── */

  body.theme-neon-hard {
    --bg:#020010; --surface:rgba(199,125,255,.06); --border:rgba(199,125,255,.25);
    --text:#f0e0ff; --muted:#6a4a8a; --iron:#0d0020;
    --cyan:#c77dff; --green:#a855f7; --yellow:#e879f9; --pink:#f0abfc; --orange:#d946ef; --purple:#a21caf;
  }
  body.theme-neon-hard .card { background:rgba(139,92,246,.07)!important; border-color:rgba(199,125,255,.3)!important; box-shadow:0 0 12px rgba(199,125,255,.08)!important; }
  body.theme-neon-hard .card-title { color:#c77dff!important; text-shadow:0 0 8px rgba(199,125,255,.4); }
  body.theme-neon-hard .nav-bar { background:rgba(2,0,16,.97)!important; border-color:rgba(199,125,255,.25)!important; box-shadow:0 0 20px rgba(139,92,246,.15)!important; }

  body.theme-military-hard {
    --bg:#0c1005; --surface:rgba(120,150,60,.06); --border:rgba(127,176,105,.3);
    --text:#d8e8b8; --muted:#6a7a4a; --iron:#0c1005;
    --cyan:#7fb069; --green:#a3c585; --yellow:#d4a843; --pink:#c0392b; --orange:#d4781a; --purple:#8b9467;
  }
  body.theme-military-hard .card { background:rgba(60,80,30,.18)!important; border-color:rgba(127,176,105,.35)!important; border-left:3px solid #7fb069!important; }
  body.theme-military-hard .card-title { color:#a3c585!important; letter-spacing:.2em!important; text-transform:uppercase!important; font-size:10px!important; }
  body.theme-military-hard .nav-bar { background:rgba(5,8,3,.97)!important; border-color:rgba(127,176,105,.3)!important; }

  body.theme-blood-hard {
    --bg:#030001; --surface:rgba(180,0,25,.06); --border:rgba(220,0,30,.3);
    --text:#ffe8e8; --muted:#7a2020; --iron:#0a0003;
    --cyan:#ff3333; --green:#ff6600; --yellow:#ffcc00; --pink:#ff0033; --orange:#ff4400; --purple:#cc0033;
  }
  body.theme-blood-hard .card { background:rgba(80,0,10,.2)!important; border-color:rgba(200,0,20,.35)!important; box-shadow:0 2px 8px rgba(180,0,20,.1)!important; }
  body.theme-blood-hard .card-title { color:#ff3333!important; text-shadow:0 0 6px rgba(255,0,0,.3); }
  body.theme-blood-hard .nav-bar { background:rgba(3,0,1,.98)!important; border-color:rgba(180,0,20,.35)!important; box-shadow:0 0 16px rgba(180,0,20,.12)!important; }

  body.theme-clean-hard {
    --bg:#e8eaf2; --surface:#fff; --border:rgba(0,0,0,.12);
    --text:#0d0d1a; --muted:#777; --iron:#d0d4e8;
    --cyan:#0055cc; --green:#1a8a3a; --yellow:#c06000; --pink:#cc0033; --orange:#cc4400; --purple:#7700cc;
  }
  body.theme-clean-hard .card { background:#fff!important; border-color:rgba(0,0,0,.12)!important; box-shadow:0 2px 10px rgba(0,0,0,.08)!important; border-radius:10px!important; }
  body.theme-clean-hard .card-title { color:#0d0d1a!important; border-bottom:2px solid rgba(0,0,0,.08)!important; padding-bottom:8px!important; }
  body.theme-clean-hard .nav-bar { background:#fff!important; border-color:rgba(0,0,0,.15)!important; box-shadow:0 2px 12px rgba(0,0,0,.08)!important; }

  body.theme-rome-hard {
    --bg:#080600; --surface:rgba(212,175,55,.07); --border:rgba(212,175,55,.35);
    --text:#f8ecc8; --muted:#8a7540; --iron:#110d00;
    --cyan:#d4af37; --green:#c8a96e; --yellow:#ffd700; --pink:#c0392b; --orange:#e8890c; --purple:#a0845c;
  }
  body.theme-rome-hard .card { background:rgba(212,175,55,.06)!important; border-color:rgba(212,175,55,.35)!important; border-top:1px solid rgba(212,175,55,.5)!important; box-shadow:0 2px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(212,175,55,.15)!important; }
  body.theme-rome-hard .card-title { color:#d4af37!important; letter-spacing:.14em!important; text-transform:uppercase!important; font-size:11px!important; border-bottom:1px solid rgba(212,175,55,.2)!important; padding-bottom:8px!important; }
  body.theme-rome-hard .nav-bar { background:rgba(8,6,0,.98)!important; border-color:rgba(212,175,55,.3)!important; box-shadow:0 0 20px rgba(212,175,55,.06)!important; }

  body.theme-ice-hard {
    --bg:#00060f; --surface:rgba(160,220,255,.05); --border:rgba(160,220,255,.2);
    --text:#e0f4ff; --muted:#3a6a8a; --iron:#001020;
    --cyan:#7dd4fc; --green:#38bdf8; --yellow:#e0f2fe; --pink:#bae6fd; --orange:#60a5fa; --purple:#93c5fd;
  }
  body.theme-ice-hard .card { background:rgba(14,60,100,.18)!important; border-color:rgba(125,212,252,.25)!important; box-shadow:0 2px 10px rgba(0,30,60,.4)!important; }
  body.theme-ice-hard .card-title { color:#7dd4fc!important; letter-spacing:.06em; }
  body.theme-ice-hard .nav-bar { background:rgba(0,6,15,.97)!important; border-color:rgba(125,212,252,.2)!important; box-shadow:0 0 16px rgba(0,100,180,.12)!important; }

  body.theme-gold-hard {
    --bg:#0a0800; --surface:rgba(255,200,0,.05); --border:rgba(255,200,0,.28);
    --text:#fff8dc; --muted:#8a7020; --iron:#130f00;
    --cyan:#ffc200; --green:#e6a817; --yellow:#ffd700; --pink:#ff8c00; --orange:#ff6600; --purple:#cc9900;
  }
  body.theme-gold-hard .card { background:rgba(255,180,0,.05)!important; border-color:rgba(255,200,0,.32)!important; box-shadow:0 2px 10px rgba(0,0,0,.5)!important; }
  body.theme-gold-hard .card-title { color:#ffc200!important; letter-spacing:.1em; text-transform:uppercase; font-size:11px!important; }
  body.theme-gold-hard .nav-bar { background:rgba(10,8,0,.98)!important; border-color:rgba(255,200,0,.25)!important; }

  body.theme-void-hard {
    --bg:#000000; --surface:rgba(255,255,255,.03); --border:rgba(255,255,255,.08);
    --text:#ffffff; --muted:#444; --iron:#0a0a0a;
    --cyan:#ffffff; --green:#aaaaaa; --yellow:#ffffff; --pink:#cccccc; --orange:#aaaaaa; --purple:#888888;
  }
  body.theme-void-hard .card { background:rgba(255,255,255,.03)!important; border-color:rgba(255,255,255,.1)!important; }
  body.theme-void-hard .card-title { color:#fff!important; letter-spacing:.18em!important; text-transform:uppercase!important; font-size:10px!important; }
  body.theme-void-hard .nav-bar { background:#000!important; border-color:rgba(255,255,255,.1)!important; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; font-size: 14px; }

  /* NOISE TEXTURE */
  body::after { content:''; position:fixed; inset:0; z-index:0; opacity:0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events:none; }
  body::before { content: ''; position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 10% 10%, rgba(0,229,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(255,77,141,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255,107,43,0.03) 0%, transparent 70%);
    pointer-events: none; }

  #app { max-width: 960px; margin: 0 auto; padding: 0 16px 40px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  .site-header {
    position: relative; padding: 32px 0 24px; margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }

  /* BARBELL SVG */
  .barbell-wrap { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 960px; overflow: hidden; height: 100%; pointer-events: none; opacity: 0.04; }
  .barbell-wrap svg { width: 100%; height: 100%; }

  .logo-block { position: relative; }
  .logo-eyebrow { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--orange); margin-bottom: 4px; }
  .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; color: var(--text); letter-spacing: 0.04em; }
  .logo-title span { color: var(--cyan); }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .sync-status { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink:0; }
  .sync-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 4px var(--green)} 50%{box-shadow:0 0 12px var(--green)} }

  /* PLATES DECORATION */
  .plates-row { display: flex; align-items: center; gap: 0; }
  .plate { border-radius: 3px; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 9px; letter-spacing: 0.05em; }

  /* ── NAV ── */
  nav { display: flex; gap: 6px; padding: 20px 0 20px; flex-wrap: wrap; }
  .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 4px;
    cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; }
  .nav-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .nav-btn.active { background: rgba(0,229,255,0.1); border-color: var(--cyan); color: var(--cyan); }

  /* ── USER PILLS ── */
  .user-pills { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .user-pill { display: flex; align-items: center; gap: 7px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 5px 14px; border-radius: 3px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 12px; transition: all 0.15s; letter-spacing: 0.05em; }
  .user-pill.active { background: color-mix(in srgb, var(--pill-color) 12%, transparent); border-color: var(--pill-color); color: var(--pill-color); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; display:flex; align-items:center; gap:8px; }
  .card-title-icon { font-size: 14px; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 110px; border-radius: 8px; padding: 16px 18px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; right:0; width:60px; height:60px; border-radius:50%; opacity:0.1; }
  .stat-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; }
  .stat-unit { font-family: 'DM Mono', monospace; font-size: 12px; opacity: 0.7; margin-left: 2px; }

  /* ── PROGRESS ── */
  .progress-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }

  /* ── FORMS ── */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--muted); letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: 7px; }
  input[type=text], input[type=number], input[type=date] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 11px 14px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: rgba(0,229,255,0.4); }
  select { width: 100%; background: #12121f; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 11px 14px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; }
  select option { background: #12121f; color: var(--text); }
  .btn { background: rgba(0,229,255,0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 11px 22px; border-radius: 6px;
    cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.1em; transition: all 0.2s; width: 100%; }
  .btn:hover { background: rgba(0,229,255,0.2); }
  .btn-ghost { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); color: var(--text); }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); }
  .btn-danger { background: rgba(255,77,141,0.08); border-color: var(--pink); color: var(--pink); }
  .btn-danger:hover { background: rgba(255,77,141,0.2); }
  .btn-sm { padding: 6px 14px; font-size: 12px; width: auto; border-radius: 4px; font-family: 'DM Mono', monospace; }

  /* ── LOG ── */
  .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .entry-row:last-child { border-bottom: none; }
  .entry-date { font-size: 11px; color: var(--muted); }
  .entry-note { font-size: 11px; color: #333; margin-left: 12px; }
  .entry-weight { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.05em; }
  .entry-del { background: none; border: none; color: #252535; cursor: pointer; font-size: 14px; padding: 2px 6px; transition: color 0.15s; }
  .entry-del:hover { color: var(--pink); }

  /* ── COMPARE DATE FILTER ── */
  .compare-filter { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px;
    background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:14px 18px; }
  .compare-filter label { margin:0; white-space:nowrap; }
  .compare-filter input { width:auto; flex:1; min-width:130px; padding:7px 10px; font-size:12px; }
  .filter-sep { color:var(--muted); font-size:11px; white-space:nowrap; }
  .filter-reset { background:none; border:1px solid var(--border); color:var(--muted); padding:7px 12px;
    border-radius:4px; cursor:pointer; font-family:'DM Mono',monospace; font-size:11px; white-space:nowrap;
    transition:all 0.15s; }
  .filter-reset:hover { border-color:var(--cyan); color:var(--cyan); }

  /* ── LEADERBOARD ── */
  .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); flex-wrap: wrap; gap: 8px; }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#2a2a3a; width:28px; }
  .lb-rank.gold { color: #ffe040; }
  .lb-rank.silver { color: #aaa; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-stats { display: flex; gap: 16px; font-size: 12px; flex-wrap: wrap; }

  /* ── TABLE ── */
  table { width:100%; border-collapse:collapse; font-size:11px; }
  th { padding:8px 10px; color:var(--muted); text-align:left; border-bottom:1px solid var(--border); font-weight:400; letter-spacing:0.08em; }
  td { padding:10px 10px; border-bottom:1px solid rgba(255,255,255,0.03); }
  tr:last-child td { border-bottom:none; }

  /* ── IRON DIVIDER ── */
  .iron-divider { display:flex; align-items:center; gap:12px; margin:24px 0 16px; }
  .iron-divider-line { flex:1; height:1px; background:var(--border); }
  .iron-divider-label { font-size:9px; color:#333; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }

  /* ── SPOTLIGHT CARDS ── */
  .spotlight-card { flex:1; min-width:160px; border-radius:8px; padding:18px; position:relative; overflow:hidden; }
  .spotlight-name { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1.1; margin-top:4px; }
  .spotlight-sub { font-size:10px; color:#777; margin-top:4px; }
  .spotlight-emoji { font-size:20px; margin-bottom:4px; }

  /* ── MISC ── */
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 42px; margin-bottom: 12px; }
  .danger-zone { border-top: 1px solid rgba(255,77,141,0.12); margin-top: 20px; padding-top: 20px; }
  .confirm-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter:blur(4px); }
  .confirm-box { background: #0d0d1a; border: 1px solid rgba(255,77,141,0.25); border-radius: 12px; padding: 28px; max-width: 400px; width: 90%; text-align: center; }
  .confirm-box h3 { font-family: 'Bebas Neue', sans-serif; font-size:24px; color: var(--pink); margin-bottom: 10px; letter-spacing:0.05em; }
  .confirm-box p { font-size: 12px; color: #777; margin-bottom: 24px; line-height: 1.7; }
  .confirm-btns { display: flex; gap: 10px; }
  canvas { max-height: 280px; }
  .lift-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px; flex:1; min-width:200px; position:relative; overflow:hidden; }
  .lift-card-label { font-size:11px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:6px; }
  .lift-card-val { font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:1; }
  .lift-card-unit { font-family:'DM Mono',monospace; font-size:13px; opacity:0.6; margin-left:2px; }
  .lift-card-date { font-size:10px; color:#444; margin-top:4px; }
  .lift-card-delta { font-size:11px; margin-top:6px; }
  .lift-history-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .lift-history-row:last-child { border-bottom:none; }
  .pr-badge { font-size:9px; background:rgba(255,224,64,0.15); color:#ffe040; border:1px solid rgba(255,224,64,0.3); padding:2px 7px; border-radius:3px; letter-spacing:0.1em; }
  .lift-compare-bar { height:10px; border-radius:2px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1); }
  .wilks-badge { display:inline-block; padding:3px 10px; border-radius:3px; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; }
  textarea { background: #12121f; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; }
  /* Settings toggles */
  .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .toggle-row:last-child { border-bottom:none; }
  .toggle-label { font-size:13px; color:var(--text); }
  .toggle-sub { font-size:11px; color:#555; margin-top:2px; }
  .tog { display:inline-flex; align-items:center; width:44px; height:24px; border-radius:12px; position:relative; cursor:pointer; background:#1a1a2e; border:1px solid #333; transition:background 0.2s,border-color 0.2s; flex-shrink:0; }
  .tog.on { background:rgba(0,229,255,0.2); border-color:var(--cyan); }
  .tog-knob { position:absolute; left:3px; width:16px; height:16px; border-radius:50%; background:#444; transition:transform 0.2s,background 0.2s; pointer-events:none; }
  .tog.on .tog-knob { transform:translateX(20px); background:var(--cyan); }
  .toggle-switch { position:relative; width:44px; height:24px; flex-shrink:0; cursor:pointer; display:inline-block; }
  .toggle-switch input { position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer; z-index:2; }
  .toggle-track { position:absolute; inset:0; background:#1a1a2e; border:1px solid #333; border-radius:12px; transition:all 0.25s; pointer-events:none; }
  .toggle-knob { position:absolute; top:4px; left:4px; width:14px; height:14px; background:#555; border-radius:50%; transition:all 0.25s; pointer-events:none; z-index:1; }
  .toggle-switch input:checked ~ .toggle-track { background:rgba(0,229,255,0.3); border-color:var(--cyan); }
  .toggle-switch input:checked ~ .toggle-knob { transform:translateX(20px); background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
  /* Spectrum dial */

// ── SETTINGS (persisted to localStorage) ──────────────────

// ── UNIT HELPERS ──────────────────────────────────────────
function lbs(v) { return v; }
function wUnit() { return 'lbs'; }
function fmtW(v) { if(v===null||v===undefined) return '—'; return `${lbs(v)} ${wUnit()}`; }

// ── TRUE WEIGHT (7-day rolling average) ───────────────────
function calcTrueWeight(entries) {
  if (!entries || entries.length === 0) return [];
  const sorted = [...entries].sort((a,b)=>a.date.localeCompare(b.date));
  return sorted.map((e, i) => {
    const window = sorted.slice(Math.max(0, i-6), i+1);
    const avg = window.reduce((s,x)=>s+x.weight,0)/window.length;
    return { date:e.date, weight:parseFloat(avg.toFixed(1)) };
  });
}

function getTrueWeightNow(u) {
  const tw = calcTrueWeight(u.entries);
  if (!tw.length) return null;
  return tw[tw.length-1].weight;
}

// ── WATER SPIKE DETECTION ─────────────────────────────────
// Water spike = any day-over-day jump > 1.9 lbs (no recovery check needed)
function detectSpikes(entries) {
  if (!entries || entries.length < 2) return new Set();
  const sorted = [...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const spikes = new Set();
  for (let i=1; i<sorted.length; i++) {
    const delta = sorted[i].weight - sorted[i-1].weight;
    if (delta > 1.9) spikes.add(sorted[i].date);
  }
  return spikes;
}

// ── GOAL PREDICTION ───────────────────────────────────────
function calcGoalPrediction(u) {
  if (!u.goalWeight || !u.entries || u.entries.length < 2) return null;
  // Use true weight for rate calculation (smoother)
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 2) return null;
  // Use last 8 true-weight points (≈4 weeks) for stable rate estimate
  const recent = tw.slice(-8);
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 7) return null;
  const currentTW = recent[recent.length-1].weight;
  const toGoal = currentTW - u.goalWeight;
  if (toGoal <= 0) return { reached: true };
  const weeklyChange = (recent[0].weight - recent[recent.length-1].weight) / days * 7;
  if (weeklyChange <= 0) return { gained: true, weeklyChange: weeklyChange.toFixed(2) };
  const weeksNeeded = toGoal / weeklyChange;
  const daysNeeded = Math.round(weeksNeeded * 7);
  const goalDate = new Date();
  goalDate.setDate(goalDate.getDate() + daysNeeded);
  // Optimal prediction (at 1 lb/week for cut, 0.75 for bulk)
  const optRate = u.phase === 'bulk' ? 0.75 : 1.0;
  const optDays = Math.round((toGoal / optRate) * 7);
  const optDate = new Date();
  optDate.setDate(optDate.getDate() + optDays);
  // Calorie deficit estimate (3500 kcal per lb of fat)
  const deficitPerDay = Math.round((weeklyChange * 3500) / 7);
  const optDeficit = Math.round((optRate * 3500) / 7);
  // Estimate TDEE from bodyweight (Mifflin-St Jeor approximation for sedentary male ~35yo)
  // Then subtract deficit to get estimated intake
  const estTDEE = Math.round(currentTW * 14.5); // conservative multiplier (lbs × 14-16 = TDEE)
  const estIntake = Math.max(800, estTDEE - deficitPerDay);
  return {
    reached: false, gained: false,
    currentRate: weeklyChange.toFixed(2),
    daysNeeded, goalDate: goalDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
    optDays, optDate: optDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
    deficitPerDay, estIntake, estTDEE, toGoal: toGoal.toFixed(1),
    currentTW: currentTW.toFixed(1),
  };
}

// ── STRENGTH PERCENTILES ──────────────────────────────────
// Based on published lifting standards (male, approximate population percentiles)
// Strength standards calibrated as % of bodyweight (assuming ~180lb male average)
// Sources: Strength Level data, Greg Nuckols powerlifting research
// Bodyweight-relative multipliers: intermediate = SQ 1.25x, BP 1.0x, DL 1.5x, OHP 0.65x
// [beginner, novice, intermediate, advanced, elite]
const LIFT_BW_MULTIPLIERS = {
  bench:    [0.50, 0.75, 1.25, 1.75, 2.00],
  squat:    [0.75, 1.25, 1.50, 2.25, 2.75],
  deadlift: [1.00, 1.50, 2.00, 2.50, 3.00],
  ohp:      [0.35, 0.55, 0.80, 1.10, 1.40],
};
// Direct tier classification — returns {label, color, tierIdx, pctOfNext}
// Tier = highest standard the lifter has reached (0=below Beginner, 1=Beginner, ..., 5=Elite)
const TIER_LABELS  = ['Beginner','Novice','Intermediate','Advanced','Elite'];
const TIER_COLORS  = ['#888','#ff6b2b','#ffe040','#00e5ff','#69ff47'];
function getLiftTier(liftKey, liftWeight, bodyweight) {
  const mults = LIFT_BW_MULTIPLIERS[liftKey];
  if (!mults || !liftWeight || !bodyweight) return null;
  // Find highest standard met
  let tierIdx = -1; // -1 = below Beginner
  for (let i = 0; i < mults.length; i++) {
    if (liftWeight >= mults[i] * bodyweight) tierIdx = i;
  }
  const label = tierIdx < 0 ? 'Sub-Beginner' : TIER_LABELS[tierIdx];
  const color = tierIdx < 0 ? '#444' : TIER_COLORS[tierIdx];
  // Progress toward next tier (for bar display)
  const prevMult = tierIdx < 0 ? 0 : mults[tierIdx];
  const nextMult = tierIdx < mults.length - 1 ? mults[tierIdx + 1] : null;
  const prevW = prevMult * bodyweight;
  const nextW = nextMult ? nextMult * bodyweight : null;
  const pctOfNext = nextW ? Math.round(((liftWeight - prevW) / (nextW - prevW)) * 100) : 100;
  const toNext = nextW ? Math.round(nextW - liftWeight) : 0;
  const nextLabel = tierIdx < TIER_LABELS.length - 1 ? TIER_LABELS[tierIdx + 1] : null;
  return { label, color, tierIdx, pctOfNext: Math.max(0, Math.min(100, pctOfNext)), toNext, nextLabel, nextW: nextW ? Math.round(nextW) : null };
}
// Keep legacy name for any callers
function getStrengthPercentile(liftKey, liftWeight, bodyweight) { return getLiftTier(liftKey,liftWeight,bodyweight); }
function strengthLabel(x) { return x; } // identity — getLiftTier already returns {label,color}

// ── FIREBASE ───────────────────────────────────────────────
function initFirebase(config) {
  try {
    const app = initializeApp(config);
    db = getDatabase(app);
    startTeamGoalListener();
    startTrainingListener();
    onValue(ref(db, "users"), (snapshot) => {
      users = [];
      const data = snapshot.val() || {};
      Object.entries(data).forEach(([id, u]) => {
        const prs = {};
        if (u.prs) { Object.entries(u.prs).forEach(([lk, lv]) => { prs[lk] = lv; }); }
        const manualBadges = u.manualBadges || {};
        const customBadges = u.customBadges || {};
        users.push({ id, ...u, entries: u.entries ? Object.values(u.entries) : [], prs, manualBadges, customBadges });
      });
      users.sort((a, b) => (a.createdAt||0) - (b.createdAt||0));
      if (!activeUserId && users.length > 0) activeUserId = users[0].id;
      if (activeUserId && !users.find(u => u.id === activeUserId))
        activeUserId = users.length > 0 ? users[0].id : null;
      document.getElementById("syncDot").classList.add("connected");
      document.getElementById("syncLabel").textContent = "Live sync";
      renderAll();
    }, (err) => {
      document.getElementById("syncLabel").textContent = "Connection failed";
    });
  } catch(e) { document.getElementById("syncLabel").textContent = "Config error"; }
}

// ── HELPERS ────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function getActive() { return users.find(u => u.id === activeUserId); }
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

function filteredEntries(u, startDate, endDate) {
  return u.entries.filter(e => {
    if (startDate && e.date < startDate) return false;
    if (endDate && e.date > endDate) return false;
    return true;
  });
}

function calcProgress(u, entries) {
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  const first = sorted[0].weight, last = sorted[sorted.length-1].weight;
  return {
    current: last, first,
    lost: (first - last).toFixed(1),
    toGoal: u.goalWeight ? (last - u.goalWeight).toFixed(1) : null,
    pct: u.goalWeight ? Math.min(100, Math.max(0, ((first-last)/(first-u.goalWeight))*100)) : null,
  };
}

function calcBMI(weight, height) {
  if (!weight || !height) return null;
  return ((weight / Math.pow(height,2)) * 703).toFixed(1);
}
function calcWeeklyRate(u, entries) {
  const ents = (entries ?? u.entries);
  if (!ents || ents.length < 2) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  const days = (new Date(sorted[sorted.length-1].date) - new Date(sorted[0].date)) / 864e5;
  if (days < 1) return null;
  return ((sorted[0].weight - sorted[sorted.length-1].weight) / (days/7)).toFixed(2);
}
function calcPctBodyLost(u, entries) {
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  return ((sorted[0].weight - sorted[sorted.length-1].weight) / sorted[0].weight * 100).toFixed(1);
}
function calcGoalPct(u, entries) {
  if (!u.goalWeight) return null;
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  return Math.min(100, Math.max(0, ((sorted[0].weight - sorted[sorted.length-1].weight) / (sorted[0].weight - u.goalWeight)) * 100)).toFixed(0);
}
function calcBestWeekDrop(u, entries) {
  const ents = (entries ?? u.entries);
  if (!ents || ents.length < 2) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  let best = 0;
  for (let i = 1; i < sorted.length; i++) {
    const days = (new Date(sorted[i].date) - new Date(sorted[i-1].date)) / 864e5;
    if (days <= 10) { const drop = sorted[i-1].weight - sorted[i].weight; if (drop > best) best = drop; }
  }
  return best > 0 ? best.toFixed(1) : null;
}
function calcClosestToGoal(u, entries) {
  if (!u.goalWeight) return null;
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  return (sorted[sorted.length-1].weight - u.goalWeight).toFixed(1);
}
function phaseLabel(phase) {
  if (phase === "bulk") return `<span class="phase-badge phase-bulk">Bulk</span>`;
  if (phase === "cut") return `<span class="phase-badge phase-cut">Cut</span>`;
  return `<span class="phase-badge phase-maintain">Maintain</span>`;
}

    ${collapseSection('analytics-'+u.id,'<span class="card-title-icon">📊</span>Plateau & Volatility Analysis',renderPlateauProbability(u)+renderVolatilityChart(u),false)}
    ${renderTrendConfidence(u)}
    ${sorted.length>1?collapseSection('chart-sec-'+u.id,'<span class="card-title-icon">📈</span>Weight History',renderWeightChart(u),true):''}
    ${collapseSection('entries-'+u.id,'<span class="card-title-icon">📋</span>Entry Log',
      `<div class="card" style="margin-top:0;border-top:none;border-radius:0 0 8px 8px">` +
      (sorted.length===0
        ?`<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">No entries yet.</div>`
        :[...sorted].reverse().map(e=>`<div class="entry-row">
          <div><span class="entry-date">${fmtDate(e.date)}</span>${e.note?`<span class="entry-note">${e.note}</span>`:""}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="entry-weight" style="color:${u.color}">${e.weight} lbs</span>
            <button class="entry-del" onclick="window.confirmDelEntry('${u.id}','${e.id}','${e.date}','${e.weight}')">✕</button>
          </div>
        </div>`).join('')) +
      `</div>`,
      false)}
    ${collapseSection('achievements-'+u.id,
      '<span class="card-title-icon">🏅</span>Achievements<span style="margin-left:auto"><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="event.stopPropagation();window.showEditAchievements(\''+u.id+'\')">Edit ✏️</button></span>',
      `<div class="card" style="margin-top:0"><div id="badges-${u.id}">${renderBadges(u)}</div></div>`,
      false)}
    ${(() => {
      // Next Milestone: find the single closest unearned badge across all groups
      const earned = new Set(getEarnedBadges(u).map(b=>b.id));
      const candidates = [];
      for (const group of BADGE_GROUPS) {
        for (const badge of group.badges) {
          if (earned.has(badge.id)) continue;
          // Try to compute distance for numeric badges
          let dist = null, distLabel = '';
          try {
            // weight loss badges
            if (badge.id.startsWith('lost_')) {
              const target = parseInt(badge.id.replace('lost_',''));
              const p = calcProgress(u);
              const got = parseFloat(p?.lost||0);
              if (got >= 0) { dist = target - got; distLabel = `${dist.toFixed(1)} lbs to go`; }
            }
            // body pct badges
            if (badge.id.startsWith('pct_')) {
              const target = parseInt(badge.id.replace('pct_',''));
              const p = calcProgress(u);
              const got = parseFloat(p?.pctBodyLost||0);
              dist = target - got; distLabel = `${dist.toFixed(1)}% to go`;
            }
            // log count badges
            if (badge.id.startsWith('log_')) {
              const target = parseInt(badge.id.replace('log_',''));
              dist = target - u.entries.length; distLabel = `${dist} weigh-ins to go`;
            }
            // lift plate badges
            const liftMatch = badge.id.match(/^(bench|squat|dead|ohp)_(\d+)$/);
            if (liftMatch) {
              const lk = liftMatch[1]==='dead'?'deadlift':liftMatch[1];
              const target = parseInt(liftMatch[2]);
              const pr = getLiftPR(u, lk);
              if (pr) { dist = target - pr.weight; distLabel = `${dist} lbs to go`; }
            }
            // SBD total badges
            if (badge.id.startsWith('total_')) {
              const target = parseInt(badge.id.replace('total_',''));
              const t = getTotal(u);
              if (t) { dist = target - t; distLabel = `${dist} lbs to go`; }
            }
            // streak badges
            if (badge.id.startsWith('streak_')) {
              const target = parseInt(badge.id.replace('streak_',''));
              const s = calcStreak(u);
              if (s) { dist = target - s.current; distLabel = `${dist} days to go`; }
            }
            // session badges
            if (badge.id.startsWith('sess_')) {
              const target = parseInt(badge.id.replace('sess_',''));
              const cnt = (trainingSessions[u.id]||[]).filter(s=>s.type!=='rest').length;
              dist = target - cnt; distLabel = `${dist} sessions to go`;
            }
          } catch(e) {}
          if (dist !== null && dist > 0) {
            candidates.push({ badge, group, dist, distLabel });
          }
        }
      }
      if (!candidates.length) return '';
      candidates.sort((a,b) => a.dist - b.dist);
      const top = candidates[0];
      const groupCol = top.group.color || '#ffe040';
      const cd = u.customBadgeData || {};
      const icon = cd[top.badge.id]?.icon || top.badge.icon || '🏅';
      const label = cd[top.badge.id]?.label || top.badge.label;
      return `<div class="card" style="margin-bottom:12px;border-color:${groupCol}33;background:${groupCol}06">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:28px">${icon}</div>
          <div style="flex:1">
            <div style="font-size:10px;color:${groupCol};letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px">🎯 Next Milestone</div>
            <div style="font-size:14px;color:var(--text);font-weight:500">${label}</div>
            <div style="font-size:11px;color:#555;margin-top:2px">${top.distLabel}</div>
          </div>
          <div style="font-size:10px;color:#333;text-align:right">
            <div style="color:#444">${top.group.label}</div>
          </div>
        </div>
      </div>`;
    })()}
    ${collapseSection('profile-'+u.id,'<span class="card-title-icon">⚙️</span>Profile',
      `<div class="card" style="margin-top:0">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="window.selectUser('${u.id}');window.showView('manage',{target:document.querySelector('[data-view=manage]')})">+ Entry</button>
          <button class="btn btn-ghost" onclick="window.showEditProfile('${u.id}')">Edit Profile</button>
        </div>
        <div class="danger-zone" style="margin-top:16px">
          <div style="font-size:10px;color:rgba(255,77,141,0.4);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px">Danger Zone</div>
          <button class="btn btn-danger" onclick="window.confirmDelUser('${u.id}','${u.name}')">Remove ${u.name}</button>
        </div>
      </div>`,
      false)}
  </div>`;
}

function renderAthleteChart(u) {
  const sorted = [...u.entries].sort((a,b)=>a.date.localeCompare(b.date));
  if (sorted.length <= 1) return;
  const ctx = document.getElementById('chart-'+u.id);
  if (!ctx) return;
  const spikes = settings.showSpikes ? detectSpikes(u.entries) : new Set();
  const twData = settings.showTrueWeight ? calcTrueWeight(u.entries) : [];
  const twMap = {}; twData.forEach(t => { twMap[t.date] = t.weight; });
  const datasets = [{
    label: u.name,
    data: sorted.map(e => e.weight),
    borderColor: u.color, backgroundColor: u.color+'18', borderWidth:2,
    pointRadius: sorted.map(e => spikes.has(e.date)?7:3),
    pointBackgroundColor: sorted.map(e => spikes.has(e.date)?'#33aaff':u.color),
    pointBorderColor: sorted.map(e => spikes.has(e.date)?'white':u.color),
    fill:true, tension:0.3
  }];
  if (settings.showTrueWeight && twData.length) {
    datasets.push({ label:'True Weight', data: sorted.map(e=>twMap[e.date]??null),
      borderColor:'#33aaff', backgroundColor:'transparent', borderWidth:2,
      borderDash:[6,4], pointRadius:0, fill:false, tension:0.3, spanGaps:true });
  }
  if (settings.showRestDays) {
    const restSet = new Set((trainingSessions[u.id]||[]).filter(s=>s.type==='rest').map(s=>s.date));
    if (restSet.size > 0) {
      const restData = sorted.map(e => restSet.has(e.date) ? e.weight : null);
      datasets.push({
        label: 'Rest Day',
        data: restData,
        type: 'scatter',
        pointStyle: 'triangle',
        pointRadius: sorted.map(e => restSet.has(e.date) ? 8 : 0),
        pointBackgroundColor: '#69ff4788',
        pointBorderColor: '#69ff47',
        pointBorderWidth: 1.5,
        showLine: false,
        fill: false,
      });
    }
  }
  new Chart(ctx, {
    type:'line',
    data:{ labels:sorted.map(e=>fmtDate(e.date)), datasets },
    options:{
      plugins:{legend:{display:settings.showTrueWeight,labels:{color:'#777',font:{family:'DM Mono',size:10},boxWidth:20}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:10},callback:v=>v+' lbs'}}
      },
      responsive:true, maintainAspectRatio:true,
    }
  });
}

function renderCompare() {

    u,
    ents: filteredEntries(u, compareStartDate, compareEndDate)
  })).filter(x => x.ents.length > 0);

  const allDates = [...new Set(filtered.flatMap(x => x.ents.map(e => e.date)))].sort();

  // Stats per user using filtered entries
  const stats = filtered.map(({u, ents}) => ({
    u, ents,
    p: calcProgress(u, ents),
    weeklyRate: calcWeeklyRate(u, ents),
    pctBodyLost: calcPctBodyLost(u, ents),
    goalPct: calcGoalPct(u, ents),
    bestWeek: calcBestWeekDrop(u, ents),
    toGoal: calcClosestToGoal(u, ents),
  })).filter(s => s.p);

  const withGoal = stats.filter(s => s.u.goalWeight && s.toGoal !== null);
  const closestToGoal = withGoal.length > 0
    ? withGoal.reduce((a,b) => parseFloat(a.toGoal) < parseFloat(b.toGoal) ? a : b) : null;
  const fastestRate = stats.length > 0
    ? stats.reduce((a,b) => parseFloat(b.weeklyRate??0) > parseFloat(a.weeklyRate??0) ? b : a) : null;
  const bestDrop = stats.length > 0
    ? stats.reduce((a,b) => parseFloat(b.bestWeek??0) > parseFloat(a.bestWeek??0) ? b : a) : null;

  // Date range display
  const minDate = withEntries.flatMap(u=>u.entries.map(e=>e.date)).sort()[0] ?? "";

      <span class="filter-sep">→ To</span>

      <button class="filter-reset" onclick="resetFilter()">Reset</button>
    </div>

    ${compareStartDate || compareEndDate ? `
    <div style="font-size:11px;color:var(--orange);margin-bottom:16px;padding:8px 14px;background:rgba(255,107,43,0.08);border-radius:6px;border:1px solid rgba(255,107,43,0.2)">
      ⚡ Filtered: ${compareStartDate ? fmtDate(compareStartDate) : "start"} → ${compareEndDate ? fmtDate(compareEndDate) : "today"} · ${filtered.length} athlete${filtered.length!==1?'s':''} with data in range
    </div>` : ""}

    <!-- RACE TO GOAL -->
    ${renderRaceToGoal()}

    <!-- SPOTLIGHT -->
    <div class="stats-row">
      ${closestToGoal ? `<div class="spotlight-card" style="background:rgba(255,224,64,0.07);border:1px solid rgba(255,224,64,0.2)">
        <div class="spotlight-emoji">🏆</div>
        <div style="font-size:9px;color:rgba(255,224,64,0.7);letter-spacing:0.15em;text-transform:uppercase">Closest to Goal</div>
        <div class="spotlight-name" style="color:#ffe040">${closestToGoal.u.name}</div>
        <div class="spotlight-sub">${closestToGoal.toGoal} lbs away</div>
      </div>` : ""}
      ${fastestRate?.weeklyRate ? `<div class="spotlight-card" style="background:rgba(105,255,71,0.07);border:1px solid rgba(105,255,71,0.2)">
        <div class="spotlight-emoji">🔥</div>
        <div style="font-size:9px;color:rgba(105,255,71,0.7);letter-spacing:0.15em;text-transform:uppercase">Fastest Drop Rate</div>
        <div class="spotlight-name" style="color:#69ff47">${fastestRate.u.name}</div>
        <div class="spotlight-sub">${fastestRate.weeklyRate} lbs/week avg</div>
      </div>` : ""}
      ${bestDrop?.bestWeek ? `<div class="spotlight-card" style="background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.2)">
        <div class="spotlight-emoji">⚡</div>
        <div style="font-size:9px;color:rgba(0,229,255,0.7);letter-spacing:0.15em;text-transform:uppercase">Best Single Drop</div>
        <div class="spotlight-name" style="color:#00e5ff">${bestDrop.u.name}</div>
        <div class="spotlight-sub">${bestDrop.bestWeek} lbs in one week</div>
      </div>` : ""}
    </div>

    <!-- LINE CHART -->
    <div class="card">
      <div class="card-title"><span class="card-title-icon">📈</span>Weight Over Time
        ${allDates.length >= 2 ? `<button onclick="window.openFullscreenChart('chartLine','Weight Over Time')" title="Fullscreen" style="margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#666;padding:2px 7px;border-radius:4px;font-size:11px;cursor:pointer">⛶</button>` : ''}
      </div>
      ${allDates.length < 2 ? `<div style="text-align:center;color:var(--muted);padding:30px;font-size:12px">Not enough data in this date range.</div>`
        : `<canvas id="chartLine"></canvas>`}
    </div>

    <!-- BAR: lbs lost -->
    <div class="card">
      <div class="card-title"><span class="card-title-icon">💪</span>Total Weight Lost (lbs)</div>
      <canvas id="chartBar" style="max-height:200px"></canvas>
    </div>

    <!-- BAR: % body weight -->
    <div class="card">
      <div class="card-title"><span class="card-title-icon">⚖️</span>% Body Weight Lost — levels the playing field</div>
      <canvas id="chartPct" style="max-height:200px"></canvas>
    </div>

    <!-- GOAL PROGRESS BARS -->
    ${withGoal.length > 0 ? `
    <div class="card">
      <div class="card-title"><span class="card-title-icon">🎯</span>Goal Progress</div>
      ${stats.filter(s => s.u.goalWeight).map(s => `
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;align-items:center">
            <span style="display:flex;align-items:center;gap:8px">
              <span class="dot" style="background:${s.u.color}"></span>
              <span style="color:${s.u.color};font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.05em">${s.u.name}</span>
              ${phaseLabel(s.u.phase||'cut')}
            </span>
            <span style="color:var(--muted)">${s.goalPct??0}% &nbsp;·&nbsp; ${s.toGoal} lbs to go</span>
          </div>
          <div class="progress-track" style="height:10px">
            <div class="progress-fill" style="width:${s.goalPct??0}%;background:${s.u.color}"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:#333;margin-top:4px">
            <span>${s.p?.first??s.u.startWeight} lbs</span><span>Goal: ${s.u.goalWeight} lbs</span>
          </div>
        </div>`).join("")}
    </div>` : ""}

    <!-- FULL TABLE -->
    <div class="card" style="overflow-x:auto">
      <div class="card-title"><span class="card-title-icon">📊</span>Full Stats Breakdown</div>
      <table>
        <thead><tr>
          <th>Athlete</th><th>Phase</th><th>Lost (lbs)</th><th>% Body Wt</th>
          <th>Avg/Week</th><th>Best Drop</th><th>Goal %</th><th>To Goal</th>
        </tr></thead>
        <tbody>
          ${stats.map(s => `<tr>
            <td><span style="display:flex;align-items:center;gap:8px">
              <span class="dot" style="background:${s.u.color}"></span>
              <span style="color:${s.u.color};font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.04em">${s.u.name}</span>
            </span></td>
            <td>${phaseLabel(s.u.phase||'cut')}</td>

          </tr>`).join("")}

      x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#555",font:{family:"DM Mono",size:10}}},
      y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#555",font:{family:"DM Mono",size:10}}}
    },
    responsive:true, maintainAspectRatio:true,
    plugins:{ legend:{labels:{color:"#888",font:{family:"DM Mono",size:11},boxWidth:12}} }
  };

  if (allDates.length >= 2) {
    if (chartLine) chartLine.destroy();
    chartLine = new Chart(document.getElementById("chartLine"), {
      type:"line",
      data:{
        labels: allDates.map(fmtDate),
        datasets: filtered.map(({u, ents}) => {
          const map={}; ents.forEach(e=>{map[e.date]=e.weight;});
          return { label:u.name, data:allDates.map(d=>map[d]??null), borderColor:u.color,
            backgroundColor:u.color+"22", borderWidth:2, pointRadius:3, pointBackgroundColor:u.color, spanGaps:true, tension:0.3 };

      options: chartCfg
    });

  const barStats = stats.filter(s => parseFloat(s.p?.lost??0) > 0);
  if (chartBar) chartBar.destroy();
  chartBar = new Chart(document.getElementById("chartBar"), {
    type:"bar",
    data:{
      labels: barStats.map(s=>s.u.name),
      datasets:[{ data:barStats.map(s=>parseFloat(s.p?.lost??0)),

  const pctStats = stats.filter(s => s.pctBodyLost && parseFloat(s.pctBodyLost) > 0);
  if (chartPct) chartPct.destroy();
  chartPct = new Chart(document.getElementById("chartPct"), {
    type:"bar",

        borderWidth:1, borderRadius:4 }]

    options:{...chartCfg, plugins:{legend:{display:false}}, scales:{...chartCfg.scales, y:{...chartCfg.scales.y, min:0, ticks:{...chartCfg.scales.y.ticks, callback:v=>v+"%"}}}}

let filterDebounce = null;
window.updateFilter = function() {
  // Debounce so year can be fully typed before triggering
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(() => {
    const s = document.getElementById("filterStart")?.value || "";
    const e = document.getElementById("filterEnd")?.value || "";
    // Only apply if dates are complete (4-digit year) or empty
    const validOrEmpty = v => v === "" || /^\d{4}-\d{2}-\d{2}$/.test(v) && parseInt(v.slice(0,4)) > 1900;
    if (validOrEmpty(s) && validOrEmpty(e)) {
      compareStartDate = s;
      compareEndDate = e;
      renderCompare();
    }
  }, 600);
};
window.resetFilter = function() {
  compareStartDate = ""; compareEndDate = "";
  renderCompare();
};

window.submitEntry = async function() {
  const u = getActive(); if(!u) return;
  const weight = parseFloat(document.getElementById("e-weight").value);
  const date = document.getElementById("e-date").value;
  const note = document.getElementById("e-note").value.trim();
  if (!weight || !date) { alert("Please enter a date and weight."); return; }
  await saveEntry(u.id, { id:genId(), date, weight, note });
  showView("dashboard", null);
};

window.confirmDelEntry = function(userId, entryId, date, weight) {
  showConfirm("Delete Entry?", `Remove the ${weight} lbs entry from ${fmtDate(date)}?`, async () => {
    await deleteEntry(userId, entryId);
  });
};

// ── POWERLIFTING ───────────────────────────────────────────
const LIFTS = [
  { key:"squat",   label:"Back Squat",     icon:"🟥", color:"#ff4d8d" },
  { key:"bench",   label:"Bench Press",    icon:"🟦", color:"#00e5ff" },
  { key:"deadlift",label:"Deadlift",       icon:"⬛", color:"#ffe040" },
  { key:"ohp",     label:"Overhead Press", icon:"🟩", color:"#69ff47" },
];

// Wilks2 (2020 updated formula — IPF standard)
// Coefficients from: https://www.powerlifting.sport/fileadmin/ipf/data/rules/technical-rules/english/IPF_Technical_Rules_Book_2023.pdf
function calcWilks(total, bw, isMale=true) {
  if (!total || !bw) return null;
  const bwKg = bw / 2.2046226218;
  const totKg = total / 2.2046226218;
  // Wilks2 polynomials (6th degree)
  let a, b, c, d, e, f;
  if (isMale) {
    a = -216.0475144; b = 16.2606339; c = -0.002388645;
    d = -0.00113732; e = 7.01863e-6; f = -1.291e-8;
  } else {
    a = 594.31747775582; b = -27.23842536447; c = 0.82112226871;
    d = -0.00930733913; e = 4.731582e-5; f = -9.054e-8;
  }
  const denom = a + b*bwKg + c*bwKg**2 + d*bwKg**3 + e*bwKg**4 + f*bwKg**5;
  const coeff = 500 / denom;
  return (coeff * totKg).toFixed(1);
}

function calcFFMI(weightLbs, heightIn, bodyFatPct) {
  if (!weightLbs || !heightIn || !bodyFatPct) return null;
  const weightKg = weightLbs / 2.2046;
  const heightM  = (heightIn * 2.54) / 100;
  const leanMass = weightKg * (1 - bodyFatPct / 100);
  const ffmi = leanMass / (heightM * heightM);
  const normalised = ffmi + 6.3 * (1.8 - heightM);
  return { ffmi: ffmi.toFixed(1), norm: normalised.toFixed(1) };
}
// Updated FFMI labels — natural cap is ~25, enhanced starts above
function ffmiLabel(norm) {
  const n = parseFloat(norm);
  if (n < 16)  return { label:'Below Average',   color:'#666' };
  if (n < 18)  return { label:'Average',          color:'#aaa' };
  if (n < 20)  return { label:'Above Average',    color:'#ff6b2b' };
  if (n < 22)  return { label:'Excellent',        color:'#ffe040' };
  if (n < 23)  return { label:'Near Natty Peak',  color:'#69ff47' };
  if (n < 25)  return { label:'Natural Elite',    color:'#00e5ff' };
  if (n < 28)  return { label:'Enhanced',         color:'#c77dff' };
  return               { label:'Enhanced — High', color:'#ff4d8d' };
}
// ── BODYBUILDER–POWERLIFTER INDEX (BPI) ───────────────────
// BPI > 0 → Powerlifter side, BPI < 0 → Bodybuilder side
function calcBPI(u) {
  const currentW = u.entries.length > 0
    ? [...u.entries].sort((a,b) => b.date.localeCompare(a.date))[0].weight
    : u.startWeight;
  if (!currentW) return null;

  const sqPR  = getLiftPR(u, 'squat');
  const bpPR  = getLiftPR(u, 'bench');
  const dlPR  = getLiftPR(u, 'deadlift');
  const ohpPR = getLiftPR(u, 'ohp');
  const ffmiData = calcFFMI(currentW, u.height, u.bodyFat);
  const bmi = u.height ? parseFloat(((currentW / Math.pow(u.height, 2)) * 703).toFixed(1)) : null;

  // Need at least one strength signal OR muscularity signal
  const hasStrength = sqPR || bpPR || dlPR || ohpPR;
  const hasMuscularity = ffmiData && bmi;
  if (!hasStrength && !hasMuscularity) return null;

  let normalizedStrength = null;
  if (hasStrength) {
    // STEP 1: Weighted relative strength index
    // Weights: squat 35%, deadlift 35%, bench 20%, ohp 10%
    let weightedSum = 0, weightTotal = 0;
    if (sqPR)  { weightedSum += 0.35 * (sqPR.weight  / currentW); weightTotal += 0.35; }
    if (dlPR)  { weightedSum += 0.35 * (dlPR.weight  / currentW); weightTotal += 0.35; }
    if (bpPR)  { weightedSum += 0.20 * (bpPR.weight  / currentW); weightTotal += 0.20; }
    if (ohpPR) { weightedSum += 0.10 * (ohpPR.weight / currentW); weightTotal += 0.10; }
    // Rescale to full weight so partial data still gives a valid index
    const strengthIndex = weightTotal > 0 ? weightedSum / weightTotal : 0;

    // STEP 2: Normalize — novice ~2.0x BW combined, elite ~6.0x BW combined
    const STRENGTH_MIN = 2.0, STRENGTH_MAX = 6.0;
    normalizedStrength = Math.min(1, Math.max(0,
      (strengthIndex - STRENGTH_MIN) / (STRENGTH_MAX - STRENGTH_MIN)
    ));
  }

  let normalizedMuscularity = null;
  if (hasMuscularity) {
    const ffmi = parseFloat(ffmiData.norm);
    // STEP 3: Muscularity index — rewards high FFMI relative to BMI
    const muscularityIndex = (ffmi - 18) * (ffmi / bmi);

    // STEP 4: Normalize — untrained ~0.8, near natural limit ~2.5
    const MUSC_MIN = 0.8, MUSC_MAX = 2.5;
    normalizedMuscularity = Math.min(1, Math.max(0,
      (muscularityIndex - MUSC_MIN) / (MUSC_MAX - MUSC_MIN)
    ));
  }

  // STEP 5: BPI — positive = powerlifter, negative = bodybuilder
  let bpi;
  if (normalizedStrength !== null && normalizedMuscularity !== null) {
    bpi = 100 * (normalizedStrength - normalizedMuscularity);
  } else if (normalizedStrength !== null) {
    // Only strength data: treat muscularity as neutral (0.5)
    bpi = 100 * (normalizedStrength - 0.5);
  } else {
    // Only muscularity data: treat strength as neutral (0.5)
    bpi = 100 * (0.5 - normalizedMuscularity);
  }

  // Classify
  let label, color, zone;
  if (bpi >= 60)        { label = 'Powerlifter';              color = '#ff4d8d'; zone = 4; }
  else if (bpi >= 25)   { label = 'Powerlifter-leaning';      color = '#ff8c69'; zone = 3; }
  else if (bpi > -25)   { label = 'True Hybrid';              color = '#c77dff'; zone = 2; }
  else if (bpi > -60)   { label = 'Bodybuilder-leaning';      color = '#69b4ff'; zone = 1; }
  else                  { label = 'Bodybuilder';              color = '#00e5ff'; zone = 0; }

  return {
    bpi: parseFloat(bpi.toFixed(1)),
    label, color, zone,
    normalizedStrength, normalizedMuscularity,
    strengthIndex: normalizedStrength !== null
      ? parseFloat((normalizedStrength * (6.0 - 2.0) + 2.0).toFixed(2))
      : null,
    hasStrength: !!hasStrength,
    hasMuscularity: !!hasMuscularity,
  };
}

// Save a PR entry for a lift
async function saveLiftPR(userId, liftKey, entry) {
  if (!db) return;
  await set(ref(db, `users/${userId}/prs/${liftKey}/${entry.id}`), entry);
}
async function deleteLiftPR(userId, liftKey, entryId) {
  if (!db) return;
  await remove(ref(db, `users/${userId}/prs/${liftKey}/${entryId}`));
}

// Get sorted PR history for a lift
function getLiftHistory(u, liftKey) {
  if (!u.prs || !u.prs[liftKey]) return [];
  const entries = Object.values(u.prs[liftKey]);
  return entries.sort((a,b) => b.date.localeCompare(a.date));
}
function getLiftPR(u, liftKey) {
  const hist = getLiftHistory(u, liftKey);
  if (!hist.length) return null;
  return hist.reduce((best, e) => e.weight > best.weight ? e : best);
}
function getTotal(u) {
  const s = getLiftPR(u, 'squat'), b = getLiftPR(u, 'bench'), d = getLiftPR(u, 'deadlift');
  if (!s || !b || !d) return null;
  return s.weight + b.weight + d.weight;
}

                const dispW = pr.weight;
                return `<div class="lift-card-val" style="color:${lift.color}">${dispW}<span class="lift-card-unit">${wUnit()}</span></div>
               <div class="lift-card-date">${fmtDate(pr.date)}</div>
               ${rel ? `<div style="font-size:11px;color:#555;margin-top:3px">${rel}x BW</div>` : ""}

                 <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">
                   <span style="color:${tier.color};font-weight:600">${tier.label}</span>
                   <span style="color:#555">${tier.nextLabel ? tier.toNext+' lbs to '+tier.nextLabel : '🏆 Elite'}</span>
                 </div>
                 <div class="pct-bar"><div class="pct-fill" style="width:${tier.pctOfNext}%;background:${tier.color}88"></div></div>
               </div>` : ""}
               ${delta !== null ? `<div class="lift-card-delta" style="color:${delta>=0?'#69ff47':'#ff4d8d'}">${delta>0?'+':''}${delta} lbs from prev</div>` : ""}`;

      const REP_COUNTS = [1,2,3,4,5,6,8,10,12,15];
      return LIFTS.map(lift => {
        const hist = getLiftHistory(u, lift.key);
        if (hist.length < 2) return '';

        // Best weight per rep count
        const repBests = {};
        for (const entry of hist) {
          const r = entry.reps || 1;
          if (!repBests[r] || entry.weight > repBests[r].weight) repBests[r] = entry;
        }
        const repRows = REP_COUNTS.filter(r => repBests[r]).map(r => {
          const e = repBests[r];
          const e1rm = r === 1 ? e.weight : Math.round(e.weight * (1 + r/30));
          return { reps:r, weight:e.weight, e1rm };
        });

        // Sparkline: last 10 entries chronologically, plotted as e1RM
        const sparkData = [...hist].sort((a,b) => a.date.localeCompare(b.date)).slice(-10)
          .map(e => Math.round(e.reps && e.reps > 1 ? e.weight*(1+e.reps/30) : e.weight));
        const sparkMin = Math.min(...sparkData) * 0.97;
        const sparkMax = Math.max(...sparkData) * 1.01;
        const W = 120, H = 40;
        const pts = sparkData.map((v,i) => {
          const x = (W * i / (sparkData.length-1||1)).toFixed(1);
          const y = (H - H*(v-sparkMin)/((sparkMax-sparkMin)||1)).toFixed(1);
          return x + ',' + y;
        }).join(' ');
        const sparkTrend = sparkData.length > 1 ? sparkData[sparkData.length-1] - sparkData[0] : 0;
        const sparkCol = sparkTrend >= 0 ? lift.color : '#ff4d8d';
        const lastY = sparkData.length ? (H - H*(sparkData[sparkData.length-1]-sparkMin)/((sparkMax-sparkMin)||1)).toFixed(1) : H;

        // Predicted max from last 3 RPE entries
        let predictedMax = null;
        const rpeEntries = hist.filter(e => e.rpe && e.weight && e.reps).slice(0,3);
        if (rpeEntries.length >= 1) {
          const ests = rpeEntries.map(e => {
            const effectiveReps = (e.reps||1) + (10 - parseFloat(e.rpe));
            return Math.round(e.weight * (1 + effectiveReps/30));
          });
          predictedMax = Math.round(ests.reduce((s,v)=>s+v,0)/ests.length);
        }

        if (!repRows.length && sparkData.length < 2) return '';

        const repCells = repRows.map(r =>
          '<div style="text-align:center;padding:6px 10px;border-radius:6px;' +
          'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);min-width:56px">' +

          '<div style="font-family:Bebas Neue,sans-serif;font-size:' + (r.reps===1?'22':'17') + 'px;color:' + lift.color + ';line-height:1">' + r.weight + '</div>' +
          '<div style="font-size:9px;color:#444;margin-top:1px">e1RM ' + r.e1rm + '</div></div>'
        ).join('');

        const sparkSVG = sparkData.length >= 2
          ? '<svg width="' + W + '" height="' + H + '" style="overflow:visible">' +
            '<polyline points="' + pts + '" fill="none" stroke="' + sparkCol + '" stroke-width="2" stroke-linejoin="round"/>' +
            '<circle cx="' + W + '" cy="' + lastY + '" r="3" fill="' + sparkCol + '"/></svg>'
          : '';

        const predLabel = predictedMax
          ? '<span style="font-size:11px;color:#888">Predicted max: <strong style="color:' + lift.color + '">' + predictedMax + '</strong> lbs</span>'
          : '';

        return '<div class="card" style="margin-bottom:14px;border-color:' + lift.color + '22">' +
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">' +
          '<span style="font-size:13px">' + lift.icon + '</span>' +
          '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:17px;color:' + lift.color + '">' + lift.label + ' — Rep PRs</span>' +
          (sparkSVG || predLabel ? '<div style="margin-left:auto;display:flex;align-items:center;gap:10px">' + predLabel + sparkSVG + '</div>' : '') +
          '</div>' +
          (repCells ? '<div style="display:flex;flex-wrap:wrap;gap:6px">' + repCells + '</div>' : '') +
          '</div>';
      }).filter(Boolean).join('');
    })()}

        <div style="font-size:10px;color:#555;margin-top:4px">Squat + Bench + Deadlift</div>
      </div>

        <div class="lift-card-label" style="color:rgba(199,125,255,0.7)">📐 Wilks Score</div>

    ${renderSpectrumDial(u)}

      <div style="margin-bottom:28px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;flex-wrap:wrap;gap:8px">

          ${bmi ? `<div style="position:absolute;top:-4px;bottom:-4px;width:3px;background:white;border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,0.9);left:${Math.min(97,Math.max(1,((parseFloat(bmi)-10)/30*100))).toFixed(1)}%"></div>` : ""}

          <div>
            <span style="font-size:10px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase">FFMI</span>

          </div>
          ${ffmiData ? `<div style="display:flex;align-items:baseline;gap:6px">

            <span style="font-size:11px;color:#555">${parseFloat(ffmiData.norm)<18?'Below average':parseFloat(ffmiData.norm)<20?'Average':parseFloat(ffmiData.norm)<22?'Above average':parseFloat(ffmiData.norm)<23?'Near Natural Peak':parseFloat(ffmiData.norm)<25?'Natural Elite':parseFloat(ffmiData.norm)<28?'Enhanced':'Enhanced — High'}</span>
          <span style="font-size:10px;color:#444;margin-left:6px">· natural ceiling ≈ 25</span>
          </div>` : `<span style="font-size:11px;color:#333">Add body fat % in Edit Profile</span>`}
        </div>
        <!-- FFMI range bar -->
        <div style="position:relative;height:20px;border-radius:4px;overflow:hidden;margin-bottom:6px;display:flex">

        <div style="display:flex;justify-content:space-between;font-size:11px;color:#444;letter-spacing:0.04em;flex-wrap:wrap;gap:4px">

        </div>
        <div style="font-size:10px;color:#3a3a4a;margin-top:8px;font-style:italic">✓ FFMI accounts for muscle mass. Natural athletes typically peak around 25. Requires body fat %.</div>
        ${!ffmiData ? `<div style="margin-top:12px;padding:10px 14px;background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);border-radius:6px;font-size:11px;color:#555">

    <!-- PR HISTORY PER LIFT -->

      const max = Math.max(...hist.map(e=>e.weight));

    <!-- DYNAMIC STRENGTH STANDARDS -->
    ${users.filter(u=>u.entries.length>0).map(u => {

        <div style="font-size:12px;color:#555;margin-bottom:14px">Standards adjust as your bodyweight changes. Your current PRs shown in context.</div>
        ${LIFTS.map(lift => {
          const stds = getDynamicStandards(lift.key, curW);
          const pr = getLiftPR(u, lift.key);
          if (!stds) return '';
          let curLevel = -1;
          if (pr) { stds.forEach((s,i)=>{ if(pr.weight>=s.weight) curLevel=i; }); }
          const nextStd = stds[curLevel+1];
          return `<div style="margin-bottom:14px">

              ${pr ? `<span style="font-size:12px;color:#555;margin-left:auto">Current PR: <strong style="color:${lift.color}">${pr.weight} lbs</strong></span>` : `<span style="font-size:11px;color:#444;margin-left:auto">No PR yet</span>`}
            </div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${stds.map((s,i) => {
                const isEarned = pr && pr.weight >= s.weight;
                const isCurrent = i === curLevel;
                const isNext = i === curLevel+1;
                return `<div style="flex:1;min-width:80px;text-align:center;padding:8px 4px;border-radius:6px;border:1px solid ${isEarned?lift.color+'55':'#1a1a2e'};background:${isEarned?lift.color+'15':isCurrent?'rgba(255,255,255,0.04)':'transparent'}">
                  <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${isEarned?lift.color:isNext?'#888':'#333'}">${s.weight}</div>
                  <div style="font-size:9px;color:${isEarned?lift.color+'aa':'#333'};letter-spacing:0.06em">${s.label}</div>
                  ${isNext&&pr ? `<div style="font-size:9px;color:#555;margin-top:2px">${s.weight-pr.weight} to go</div>` : ''}
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}

  `;
}

window.showAddPR = function(userId) {
  const u = users.find(x => x.id===userId); if(!u) return;
  const el = document.getElementById("confirmDialog");
  el.style.display = "flex";
  el.innerHTML = `<div class="confirm-dialog"><div class="confirm-box" style="max-width:440px;text-align:left">
    <h3 style="color:var(--yellow);margin-bottom:18px;letter-spacing:0.05em">Log a PR</h3>
    <div class="form-group"><label>Lift</label>
      <select id="pr-lift">
        ${LIFTS.map(l => `<option value="${l.key}">${l.label}</option>`).join("")}
      </select>
    </div>
    <div class="form-group"><label>Weight (lbs)</label><input type="number" id="pr-weight" step="1" placeholder="e.g. 315"></div>
    <div class="form-group"><label>Date</label><input type="date" id="pr-date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="form-group" style="margin-bottom:24px"><label>Notes (optional)</label><input type="text" id="pr-notes" placeholder="e.g. Competition, belt + wraps"></div>
    <div class="confirm-btns">
      <button class="btn" id="prSave" style="flex:1">Save PR</button>
      <button class="btn btn-danger" id="prCancel" style="flex:1">Cancel</button>
    </div>
  </div></div>`;
  document.getElementById("prCancel").onclick = () => { el.style.display="none"; };
  document.getElementById("prSave").onclick = async () => {
    const liftKey = document.getElementById("pr-lift").value;
    const weight = parseFloat(document.getElementById("pr-weight").value);
    const date = document.getElementById("pr-date").value;
    const notes = document.getElementById("pr-notes").value.trim();
    if (!weight || !date) { alert("Weight and date are required."); return; }
    await saveLiftPR(userId, liftKey, { id:genId(), weight, date, notes });
    el.style.display="none";
  };
};

window.confirmDelPR = function(userId, liftKey, entryId, weight) {
  showConfirm("Delete PR?", `Remove the ${weight} lbs entry?`, async () => {
    await deleteLiftPR(userId, liftKey, entryId);
  });
};

function getAllBadges() { return BADGE_GROUPS.flatMap(g=>g.badges.map(b=>({...b,groupColor:g.color,groupId:g.id}))); }

function getEarnedBadges(u) {
  const manual = u.manualBadges || {};
  return getAllBadges().filter(b => {
    if (manual[b.id]) return true;
    try { return b.check(u); } catch(e){ return false; }
  });
}

function renderBadges(u) {
  const cd = u.customBadgeDefs || {};
  const manual = u.manualBadges || {};

  return BADGE_GROUPS.map(g => {
    const earnedInGroup = g.badges.filter(b => {
      if (manual[b.id]) return true;
      try { return b.check(u); } catch(e) { return false; }
    });
    const lockedInGroup = g.badges.filter(b => !earnedInGroup.find(e => e.id === b.id));
    return `<div style="margin-bottom:18px">
      <div style="font-size:10px;color:${g.color};letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px">

}


// ── RATE OF GAIN ───────────────────────────────────────────
function calcRateOfGain(u) {
  if (!u.entries || u.entries.length < 2) return null;
  // Use TRUE WEIGHT (7-day avg) to avoid water weight noise
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 2) return null;
  const recent = tw.slice(-4);
  if (recent.length < 2) return null;
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 3) return null;
  const change = recent[recent.length-1].weight - recent[0].weight;
  const perWeek = (change / days) * 7;
  return { perWeek: perWeek.toFixed(2), change: change.toFixed(1), days: Math.round(days), usingTrueWeight: true };
}

function rateOfGainWidget(u) {
  if (u.phase !== 'bulk') return "";
  const rog = calcRateOfGain(u);

  const r = parseFloat(rog.perWeek);

  if (r < 0) { status="Losing weight"; statusColor="#ff4d8d"; advice="You're in a deficit — eat more if bulking intentionally."; }

  else if (r <= 1.0) { status="Optimal bulk"; statusColor="#69ff47"; advice="0.5–1 lb/week is the sweet spot for lean gains."; }
  else if (r <= 1.5) { status="Fast — watch it"; statusColor="#ffe040"; advice="Over 1 lb/week — may be gaining excess fat."; }

  const pct = Math.min(100, Math.max(0, (r / 2.0) * 100));

// Rate of Loss widget (for cut phase)
function calcRateOfLoss(u) {
  if (!u.entries || u.entries.length < 2) return null;
  // Uses TRUE WEIGHT (7-day avg) — but still includes ~1-2 lbs of water weight in total loss
  // We apply a 15% water retention factor: not all scale loss is fat
  // Actual fat loss ≈ scale loss × 0.85 (the rest is glycogen/water depletion)
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 2) return null;
  const recent = tw.slice(-4);
  if (recent.length < 2) return null;
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 3) return null;
  const totalChange = recent[0].weight - recent[recent.length-1].weight; // positive = losing
  const perWeek = (totalChange / days) * 7;
  // Estimate fat loss component (85% of scale loss is fat; 15% water/glycogen)
  const fatLossPerWeek = perWeek * 0.85;
  return { perWeek: perWeek.toFixed(2), fatPerWeek: fatLossPerWeek.toFixed(2), change: totalChange.toFixed(1), days: Math.round(days), usingTrueWeight: true };
}

// ── 1RM CALCULATOR ─────────────────────────────────────────
function calc1RM(weight, reps) {
  if (!weight || !reps || reps < 1) return null;
  if (reps === 1) return weight;
  const epley   = weight * (1 + reps/30);
  const brzycki = weight * (36 / (37 - reps));
  const lombardi= weight * Math.pow(reps, 0.10);
  const avg = (epley + brzycki + lombardi) / 3;
  return { epley:Math.round(epley), brzycki:Math.round(brzycki), lombardi:Math.round(lombardi), avg:Math.round(avg) };
}

function render1RMCalc() {
  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="card-title-icon">🧮</span>1RM Estimator</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <div style="flex:2;min-width:120px">
        <label style="font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:6px">Weight Lifted (lbs)</label>
        <input type="number" id="rmWeight" step="1" placeholder="e.g. 275" oninput="update1RM()"
          style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 12px;font-family:'DM Mono',monospace;font-size:13px;outline:none">
      </div>

        <label style="font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:6px">Reps</label>
        <input type="number" id="rmReps" step="1" min="1" max="20" placeholder="e.g. 5" oninput="update1RM()"
          style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 12px;font-family:'DM Mono',monospace;font-size:13px;outline:none">
      </div>

}

window.update1RM = function() {
  const w = parseFloat(document.getElementById("rmWeight")?.value);
  const r = parseInt(document.getElementById("rmReps")?.value);
  const el = document.getElementById("rmResult");
  if (!el) return;
  if (!w || !r || r < 1 || r > 20) { el.innerHTML = `<div style="font-size:11px;color:#444">Enter weight and reps (1–20) to estimate your 1RM.</div>`; return; }
  const res = calc1RM(w, r);
  if (!res) return;
  el.innerHTML = `
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px">
      <span class="rmcalc-result" style="color:#ffe040">${res.avg}</span>
      <span style="font-size:13px;color:#555">lbs estimated 1RM</span>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#555;margin-bottom:10px">
      <span>Epley: <strong style="color:#aaa">${res.epley}</strong></span>

window.updateWhatIf = function(userId, rate) {
  const u = users.find(x=>x.id===userId); if(!u||!u.goalWeight) return;
  const pred = calcGoalPrediction(u); if(!pred||pred.reached||pred.gained) return;
  const r = parseFloat(rate);
  const days = r > 0 ? Math.round((parseFloat(pred.toGoal) / r) * 7) : 9999;
  const goalDate = new Date(); goalDate.setDate(goalDate.getDate()+days);
  const dateStr = goalDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const col = r >= parseFloat(pred.currentRate)*0.9 ? '#c77dff' : r >= 0.5 ? '#ffe040' : '#ff4d8d';
  const el = document.getElementById('whatif-result-'+userId);
  if (el) el.innerHTML = `
    <div style="font-size:10px;color:${col};letter-spacing:0.1em;text-transform:uppercase">At ${r} lbs/wk</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${col};line-height:1">${days<9000?days:'∞'} days</div>
    <div style="font-size:11px;color:#555">${days<9000?dateStr:'Losing ground'}</div>`;
};

// ── PLATEAU DETECTOR ──────────────────────────────────────
function detectPlateau(u) {
  if (!u.entries || u.entries.length < 4) return null;
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 4) return null;
  const recent = tw.slice(-10); // last 10 true-weight points
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 10) return null;
  const change = Math.abs(recent[recent.length-1].weight - recent[0].weight);
  // Plateau = less than 0.5 lb true weight change over 14+ days
  if (days >= 14 && change < 0.5) {
    return { days: Math.round(days), change: change.toFixed(2), severity: days >= 21 ? 'severe' : 'mild' };
  }
  return null;
}

// Refeed day suggestion (for cutters)
function shouldRefeed(u) {
  if (u.phase !== 'cut' || !u.entries || u.entries.length < 5) return null;
  const sorted = [...u.entries].sort((a,b)=>a.date.localeCompare(b.date));
  const recent7 = sorted.slice(-7);
  if (recent7.length < 5) return null;
  // Check: consistent deficit days + rate stalling or plateau detected
  const plateau = detectPlateau(u);
  const rol = calcRateOfLoss(u);
  const slowing = rol && parseFloat(rol.perWeek) < 0.3;
  if (plateau || slowing) {
    return {
      reason: plateau ? `True weight hasn't moved in ${plateau.days} days` : `Rate has slowed to ${rol.perWeek} lbs/week`,
      suggestion: 'Consider a 1-2 day refeed at maintenance calories (~200-500 kcal above deficit). Prioritize carbs to replenish glycogen and support leptin.',
    };
  }
  return null;
}

      <div style="font-size:24px">🧱</div>
