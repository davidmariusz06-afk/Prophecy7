  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; font-size: 14px; }

  /* NOISE TEXTURE */
  body::after { content:''; position:fixed; inset:0; z-index:0; opacity:var(--theme-noise-op,0.025);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events:none; }
  body::before { content: ''; position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 10% 10%, rgba(0,229,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 90%, rgba(255,77,141,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255,107,43,0.03) 0%, transparent 70%);
    pointer-events: none; }

  #app { max-width: 960px; margin: 0 auto; padding: 0 16px 40px; position: relative; z-index: 1; }

  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }

  /* BARBELL SVG */

  .barbell-wrap svg { width: 100%; height: 100%; }

  .logo-block { position: relative; }
  .logo-eyebrow { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--orange); margin-bottom: 4px; }
  .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; color: var(--text); letter-spacing: 0.04em; }
  .logo-title span { color: var(--cyan); }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .sync-status { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink:0; }
  .sync-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 4px var(--green)} 50%{box-shadow:0 0 12px var(--green)} }

  /* PLATES DECORATION */
  .plates-row { display: flex; align-items: center; gap: 0; }
  .plate { border-radius: 3px; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 9px; letter-spacing: 0.05em; }

  /* ── NAV ── */
  nav { display: flex; gap: 6px; padding: 20px 0 20px; flex-wrap: wrap; }
  .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 4px;

  .nav-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .nav-btn.active { background: rgba(0,229,255,0.1); border-color: var(--cyan); color: var(--cyan); }

    color: var(--muted); padding: 5px 14px; border-radius: 3px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 12px; transition: all 0.15s; letter-spacing: 0.05em; }
  .user-pill.active { background: color-mix(in srgb, var(--pill-color) 12%, transparent); border-color: var(--pill-color); color: var(--pill-color); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; display:flex; align-items:center; gap:8px; }
  .card-title-icon { font-size: 14px; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { flex: 1; min-width: 110px; border-radius: 8px; padding: 16px 18px; position:relative; overflow:hidden; }

  input:focus { border-color: rgba(0,229,255,0.4); }
  select { width: 100%; background: #12121f; border: 1px solid var(--border);

  select option { background: #12121f; color: var(--text); }
  .btn { background: rgba(0,229,255,0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 11px 22px; border-radius: 6px;

  .btn:hover { background: rgba(0,229,255,0.2); }

  .btn-danger:hover { background: rgba(255,77,141,0.2); }
  .btn-sm { padding: 6px 14px; font-size: 12px; width: auto; border-radius: 4px; font-family: 'DM Mono', monospace; }

  /* ── LOG ── */
  .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .entry-row:last-child { border-bottom: none; }
  .entry-date { font-size: 11px; color: var(--muted); }
  .entry-note { font-size: 11px; color: #333; margin-left: 12px; }

  /* ── COMPARE DATE FILTER ── */
  .compare-filter { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px;

  .compare-filter label { margin:0; white-space:nowrap; }

// ── UNIT HELPERS ──────────────────────────────────────────

// ── TRUE WEIGHT (7-day rolling average) ───────────────────
function calcTrueWeight(entries) {
  if (!entries || entries.length === 0) return [];
  const sorted = [...entries].sort((a,b)=>a.date.localeCompare(b.date));
  return sorted.map((e, i) => {
    const window = sorted.slice(Math.max(0, i-6), i+1);
    const avg = window.reduce((s,x)=>s+x.weight,0)/window.length;
    return { date:e.date, weight:parseFloat(avg.toFixed(1)) };
  });
}

function getTrueWeightNow(u) {
  const tw = calcTrueWeight(u.entries);
  if (!tw.length) return null;
  return tw[tw.length-1].weight;
}

// Water spike = day-over-day change of ±1 lb or more (up OR down)
function detectSpikes(entries) {
  if (!entries || entries.length < 2) return new Set();
  const sorted = [...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const spikes = new Set();
  for (let i=1; i<sorted.length; i++) {
    const delta = sorted[i].weight - sorted[i-1].weight;
    if (Math.abs(delta) >= 1.0) spikes.add(sorted[i].date);
  }
  return spikes;
}

// ── GOAL PREDICTION ───────────────────────────────────────
function calcGoalPrediction(u) {
  if (!u.goalWeight || !u.entries || u.entries.length < 2) return null;
  // Use true weight for rate calculation (smoother)
  // Use same week-over-week approach as calcRateOfLoss for consistency
  const rol = calcRateOfLoss(u);
  const tw = calcTrueWeight(u.entries);
  if (!tw.length) return null;
  const currentTW = tw[tw.length - 1].weight;
  const toGoal = currentTW - u.goalWeight;
  if (toGoal <= 0) return { reached: true };
  // Use week-over-week rate if available, otherwise fall back to long-term trend
  const weeklyChange = rol ? parseFloat(rol.perWeek) : (() => {
    if (tw.length < 4) return 0;
    const oldest = tw[0], newest = tw[tw.length-1];
    const days = (new Date(newest.date+'T00:00:00') - new Date(oldest.date+'T00:00:00')) / 864e5;
    return days > 0 ? (oldest.weight - newest.weight) / days * 7 : 0;
  })();
  if (weeklyChange <= 0) return { gained: true, weeklyChange: weeklyChange.toFixed(2) };
  const weeksNeeded = toGoal / weeklyChange;
  const daysNeeded = Math.round(weeksNeeded * 7);
  const goalDate = new Date();
  goalDate.setDate(goalDate.getDate() + daysNeeded);
  // Optimal prediction (at 1 lb/week for cut, 0.75 for bulk)
  const optRate = u.phase === 'bulk' ? 0.75 : 1.0;
  const optDays = Math.round((toGoal / optRate) * 7);
  const optDate = new Date();
  optDate.setDate(optDate.getDate() + optDays);

  return {
    reached: false, gained: false,
    currentRate: weeklyChange.toFixed(2),
    daysNeeded, goalDate: goalDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),

    toGoal: toGoal.toFixed(1),
    currentTW: currentTW.toFixed(1),

}

// Strength standards calibrated as % of bodyweight (assuming ~180lb male average)
// Sources: Strength Level data, Greg Nuckols powerlifting research
// Bodyweight-relative multipliers: intermediate = SQ 1.25x, BP 1.0x, DL 1.5x, OHP 0.65x
// [beginner, novice, intermediate, advanced, elite]
const LIFT_BW_MULTIPLIERS = {
  squat:    [0.50, 0.85, 1.25, 1.75, 2.25],
  bench:    [0.35, 0.65, 1.00, 1.40, 1.80],
  deadlift: [0.65, 1.00, 1.50, 2.00, 2.60],
  ohp:      [0.20, 0.40, 0.65, 0.90, 1.15],
};
function getStrengthPercentile(liftKey, liftWeight, bodyweight) {
  const mults = LIFT_BW_MULTIPLIERS[liftKey];
  if (!mults || !liftWeight) return null;
  const bw = bodyweight || 185;
  const pts = [
    {p:0,  w:0},
    {p:15, w:mults[0]*bw},
    {p:35, w:mults[1]*bw},
    {p:55, w:mults[2]*bw},
    {p:80, w:mults[3]*bw},
    {p:95, w:mults[4]*bw},
    {p:99, w:mults[4]*bw*1.15},

  for (let i=1; i<pts.length; i++) {
    if (liftWeight <= pts[i].w) {
      const frac = (liftWeight - pts[i-1].w) / (pts[i].w - pts[i-1].w);
      return Math.round(pts[i-1].p + frac*(pts[i].p-pts[i-1].p));
    }
  }
  return 99;
}
function strengthLabel(pct) {
  if (pct < 25) return { label:'Beginner', color:'#666' };
  if (pct < 50) return { label:'Intermediate', color:'#ff6b2b' };
  if (pct < 75) return { label:'Advanced', color:'#ffe040' };
  if (pct < 90) return { label:'Elite', color:'#69ff47' };
  return { label:'World Class', color:'#00e5ff' };
}

// ── FIREBASE ───────────────────────────────────────────────
function initFirebase(config) {
  try {
    const app = initializeApp(config);
    db = getDatabase(app);
    startTeamGoalListener();
    startTrainingListener();
    onValue(ref(db, "users"), (snapshot) => {
      users = [];
      const data = snapshot.val() || {};
      Object.entries(data).forEach(([id, u]) => {
        const prs = {};
        if (u.prs) { Object.entries(u.prs).forEach(([lk, lv]) => { prs[lk] = lv; }); }
        const manualBadges = u.manualBadges || {};
        const customBadges = u.customBadges || {};
        users.push({ id, ...u, entries: u.entries ? Object.values(u.entries) : [], prs, manualBadges, customBadges });
      });
      users.sort((a, b) => (a.createdAt||0) - (b.createdAt||0));
      if (!activeUserId && users.length > 0) activeUserId = users[0].id;
      if (activeUserId && !users.find(u => u.id === activeUserId))
        activeUserId = users.length > 0 ? users[0].id : null;
      document.getElementById("syncDot").classList.add("connected");
      document.getElementById("syncLabel").textContent = "Live sync";
      renderAll();
    }, (err) => {
      document.getElementById("syncLabel").textContent = "Connection failed";
    });
  } catch(e) { document.getElementById("syncLabel").textContent = "Config error"; }
}

// ── HELPERS ────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function getActive() { return users.find(u => u.id === activeUserId); }
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

function filteredEntries(u, startDate, endDate) {
  return u.entries.filter(e => {
    if (startDate && e.date < startDate) return false;
    if (endDate && e.date > endDate) return false;
    return true;
  });
}

function calcProgress(u, entries) {
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  const first = sorted[0].weight, last = sorted[sorted.length-1].weight;
  return {
    current: last, first,
    lost: (first - last).toFixed(1),
    toGoal: u.goalWeight ? (last - u.goalWeight).toFixed(1) : null,
    pct: u.goalWeight ? Math.min(100, Math.max(0, ((first-last)/(first-u.goalWeight))*100)) : null,
  };
}

function calcBMI(weight, height) {
  if (!weight || !height) return null;
  return ((weight / Math.pow(height,2)) * 703).toFixed(1);
}
function calcWeeklyRate(u, entries) {
  const ents = (entries ?? u.entries);
  if (!ents || ents.length < 2) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  const days = (new Date(sorted[sorted.length-1].date) - new Date(sorted[0].date)) / 864e5;
  if (days < 1) return null;
  return ((sorted[0].weight - sorted[sorted.length-1].weight) / (days/7)).toFixed(2);
}
function calcPctBodyLost(u, entries) {
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  return ((sorted[0].weight - sorted[sorted.length-1].weight) / sorted[0].weight * 100).toFixed(1);
}
function calcGoalPct(u, entries) {
  if (!u.goalWeight) return null;
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  return Math.min(100, Math.max(0, ((sorted[0].weight - sorted[sorted.length-1].weight) / (sorted[0].weight - u.goalWeight)) * 100)).toFixed(0);
}
function calcBestWeekDrop(u, entries) {
  const ents = (entries ?? u.entries);
  if (!ents || ents.length < 2) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  let best = 0;
  for (let i = 1; i < sorted.length; i++) {
    const days = (new Date(sorted[i].date) - new Date(sorted[i-1].date)) / 864e5;
    if (days <= 10) { const drop = sorted[i-1].weight - sorted[i].weight; if (drop > best) best = drop; }
  }
  return best > 0 ? best.toFixed(1) : null;
}
function calcClosestToGoal(u, entries) {
  if (!u.goalWeight) return null;
  const ents = entries ?? u.entries;
  if (!ents || ents.length === 0) return null;
  const sorted = [...ents].sort((a,b) => a.date.localeCompare(b.date));
  return (sorted[sorted.length-1].weight - u.goalWeight).toFixed(1);
}
function phaseLabel(phase) {
  if (phase === "bulk") return `<span class="phase-badge phase-bulk">Bulk</span>`;
  if (phase === "cut") return `<span class="phase-badge phase-cut">Cut</span>`;
  return `<span class="phase-badge phase-maintain">Maintain</span>`;
}

function renderAthleteChart(u) {
  const sorted = [...u.entries].sort((a,b)=>a.date.localeCompare(b.date));
  if (sorted.length <= 1) return;
  const ctx = document.getElementById('chart-'+u.id);
  if (!ctx) return;
  const spikes = settings.showSpikes ? detectSpikes(u.entries) : new Set();
  const twData = settings.showTrueWeight ? calcTrueWeight(u.entries) : [];
  const twMap = {}; twData.forEach(t => { twMap[t.date] = t.weight; });
  const datasets = [{
    label: u.name,
    data: sorted.map(e => e.weight),
    borderColor: u.color, backgroundColor: u.color+'18', borderWidth:2,
    pointRadius: sorted.map(e => spikes.has(e.date)?7:3),
    pointBackgroundColor: sorted.map(e => spikes.has(e.date)?'#33aaff':u.color),
    pointBorderColor: sorted.map(e => spikes.has(e.date)?'white':u.color),
    fill:true, tension:0.3
  }];
  if (settings.showTrueWeight && twData.length) {
    datasets.push({ label:'True Weight', data: sorted.map(e=>twMap[e.date]??null),
      borderColor:'#33aaff', backgroundColor:'transparent', borderWidth:2,
      borderDash:[6,4], pointRadius:0, fill:false, tension:0.3, spanGaps:true });
  }
  new Chart(ctx, {
    type:'line',
    data:{ labels:sorted.map(e=>fmtDate(e.date)), datasets },
    options:{
      plugins:{legend:{display:settings.showTrueWeight,labels:{color:'#777',font:{family:'DM Mono',size:10},boxWidth:20}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:10},callback:v=>v+' lbs'}}

let filterDebounce = null;
window.updateFilter = function() {
  // Debounce so year can be fully typed before triggering
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(() => {
    const s = document.getElementById("filterStart")?.value || "";
    const e = document.getElementById("filterEnd")?.value || "";
    // Only apply if dates are complete (4-digit year) or empty
    const validOrEmpty = v => v === "" || /^\d{4}-\d{2}-\d{2}$/.test(v) && parseInt(v.slice(0,4)) > 1900;
    if (validOrEmpty(s) && validOrEmpty(e)) {
      compareStartDate = s;
      compareEndDate = e;
      renderCompare();
    }
  }, 600);
};
window.resetFilter = function() {
  compareStartDate = ""; compareEndDate = "";
  renderCompare();
};

// ── BPI CALCULATION ───────────────────────────────────────────
function calcBPI(u) {
  const currentW = u.entries.length > 0
    ? [...u.entries].sort((a,b) => b.date.localeCompare(a.date))[0].weight
    : u.startWeight;
  if (!currentW) return null;

  const sqPR  = getLiftPR(u, 'squat');
  const bpPR  = getLiftPR(u, 'bench');
  const dlPR  = getLiftPR(u, 'deadlift');
  const ohpPR = getLiftPR(u, 'ohp');
  const ffmiData = calcFFMI(currentW, u.height, u.bodyFat);
  const bmi = u.height ? parseFloat(((currentW / Math.pow(u.height, 2)) * 703).toFixed(1)) : null;

  const hasStrength = sqPR || bpPR || dlPR || ohpPR;
  const hasMuscularity = ffmiData && bmi;
  if (!hasStrength && !hasMuscularity) return null;

  let normalizedStrength = null;
  if (hasStrength) {
    let weightedSum = 0, weightTotal = 0;
    if (sqPR)  { weightedSum += 0.35 * (sqPR.weight  / currentW); weightTotal += 0.35; }
    if (dlPR)  { weightedSum += 0.35 * (dlPR.weight  / currentW); weightTotal += 0.35; }
    if (bpPR)  { weightedSum += 0.20 * (bpPR.weight  / currentW); weightTotal += 0.20; }
    if (ohpPR) { weightedSum += 0.10 * (ohpPR.weight / currentW); weightTotal += 0.10; }
    const strengthIndex = weightTotal > 0 ? weightedSum / weightTotal : 0;
    const STRENGTH_MIN = 2.0, STRENGTH_MAX = 6.0;
    normalizedStrength = Math.min(1, Math.max(0,
      (strengthIndex - STRENGTH_MIN) / (STRENGTH_MAX - STRENGTH_MIN)
    ));
  }

  let normalizedMuscularity = null;
  if (hasMuscularity) {
    const ffmi = parseFloat(ffmiData.norm);
    // STEP 3: Muscularity index — rewards high FFMI relative to BMI
    const muscularityIndex = (ffmi - 18) * (ffmi / bmi);

    // STEP 4: Normalize — untrained ~0.8, near natural limit ~2.5
    const MUSC_MIN = 0.8, MUSC_MAX = 2.5;
    normalizedMuscularity = Math.min(1, Math.max(0,
      (muscularityIndex - MUSC_MIN) / (MUSC_MAX - MUSC_MIN)
    ));
  }

  // STEP 5: BPI — positive = powerlifter, negative = bodybuilder
  let bpi;
  if (normalizedStrength !== null && normalizedMuscularity !== null) {
    bpi = 100 * (normalizedStrength - normalizedMuscularity);
  } else if (normalizedStrength !== null) {
    // Only strength data: treat muscularity as neutral (0.5)
    bpi = 100 * (normalizedStrength - 0.5);
  } else {
    // Only muscularity data: treat strength as neutral (0.5)
    bpi = 100 * (0.5 - normalizedMuscularity);
  }

  // Classify
  let label, color, zone;
  if (bpi >= 60)        { label = 'Powerlifter';              color = '#ff4d8d'; zone = 4; }
  else if (bpi >= 25)   { label = 'Powerlifter-leaning';      color = '#ff8c69'; zone = 3; }
  else if (bpi > -25)   { label = 'True Hybrid';              color = '#c77dff'; zone = 2; }
  else if (bpi > -60)   { label = 'Bodybuilder-leaning';      color = '#69b4ff'; zone = 1; }
  else                  { label = 'Bodybuilder';              color = '#00e5ff'; zone = 0; }

  return {
    bpi: parseFloat(bpi.toFixed(1)),
    label, color, zone,
    normalizedStrength, normalizedMuscularity,
    strengthIndex: normalizedStrength !== null
      ? parseFloat((normalizedStrength * (6.0 - 2.0) + 2.0).toFixed(2))
      : null,
    hasStrength: !!hasStrength,
    hasMuscularity: !!hasMuscularity,
  };
}

function renderSpectrumDial(u) {
  // Filter users who have enough data for at least one signal
  const users_with_data = users.filter(u2 => {
    const currentW = u2.entries.length > 0
      ? [...u2.entries].sort((a,b) => b.date.localeCompare(a.date))[0].weight
      : u2.startWeight;
    const hasLifts = getLiftPR(u2,'squat') || getLiftPR(u2,'bench') || getLiftPR(u2,'deadlift') || getLiftPR(u2,'ohp');
    const ffmiData = calcFFMI(currentW, u2.height, u2.bodyFat);
    return hasLifts || ffmiData;
  });

  if (!users_with_data.length) {
    return `<div class="card">
      <div class="card-title"><span class="card-title-icon">🔀</span>Bodybuilder–Powerlifter Index (BPI)</div>
      <div style="font-size:12px;color:#555;text-align:center;padding:20px">Log PRs and/or add height + body fat % to unlock the BPI spectrum.</div>
    </div>`;
  }

  const results = users_with_data.map(u2 => ({ u: u2, r: calcBPI(u2) })).filter(x => x.r !== null);
  if (!results.length) return '';

  // BPI range is -100 to +100. Convert to 0–100% for positioning on bar.
  // Bar: left=Bodybuilder (BPI=-100), centre=Hybrid (BPI=0), right=Powerlifter (BPI=+100)
  const bpiToPos = bpi => Math.min(98, Math.max(2, (bpi + 100) / 200 * 100));

  // Zone boundary positions on the bar (%)
  const zones = [
    { label: 'BB',         from: 0,    to: 20,   color: '#00e5ff' },
    { label: 'BB Hybrid',  from: 20,   to: 37.5, color: '#69b4ff' },
    { label: 'Hybrid',     from: 37.5, to: 62.5, color: '#c77dff' },
    { label: 'PL Hybrid',  from: 62.5, to: 80,   color: '#ff8c69' },
    { label: 'PL',         from: 80,   to: 100,  color: '#ff4d8d' },
  ];

  return `<div class="card">
    <div class="card-title"><span class="card-title-icon">🔀</span>Bodybuilder–Powerlifter Index (BPI)</div>
    <div style="font-size:11px;color:#555;margin-bottom:20px">
      Combines weighted relative strength (SQ·0.35 + DL·0.35 + BP·0.20 + OHP·0.10) against FFMI/BMI muscularity.
      Negative BPI = bodybuilder-dominant. Positive = powerlifter-dominant.
    </div>

    <!-- Spectrum bar with zone segments -->
    <div style="position:relative;margin-bottom:44px;margin-top:32px">
      <!-- Name labels above bar -->
      ${results.map(({u:u2, r}) => {
        const pos = bpiToPos(r.bpi);
        const clampedPos = Math.min(92, Math.max(8, pos));
        return `<div style="position:absolute;bottom:calc(100% + 6px);left:${clampedPos}%;transform:translateX(-50%);text-align:center;pointer-events:none">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:${u2.color};white-space:nowrap;text-shadow:0 0 10px ${u2.color}88">${u2.name}</div>
          <div style="font-size:10px;color:${r.color};margin-top:1px">${r.bpi > 0 ? '+' : ''}${r.bpi}</div>
        </div>`;
      }).join('')}

      <!-- Segmented gradient bar -->
      <div style="height:28px;border-radius:6px;overflow:hidden;display:flex;position:relative">
        ${zones.map(z => `<div style="flex:${z.to - z.from};background:${z.color};opacity:0.85"></div>`).join('')}
        <!-- Subtle zone dividers -->
        ${[20,37.5,62.5,80].map(p => `<div style="position:absolute;top:0;bottom:0;left:${p}%;width:1px;background:rgba(0,0,0,0.3)"></div>`).join('')}
      </div>

      <!-- Zone text labels inside bar -->
      <div style="position:absolute;inset:0;display:flex;align-items:center;pointer-events:none">
        <div style="flex:20;text-align:center"><span style="font-family:'Bebas Neue',sans-serif;font-size:10px;color:rgba(0,0,0,0.55)">BB</span></div>
        <div style="flex:17.5;text-align:center"><span style="font-family:'Bebas Neue',sans-serif;font-size:10px;color:rgba(0,0,0,0.55)">BB Hybrid</span></div>

// Get sorted PR history for a lift
// ── POWERLIFTING CONSTANTS ────────────────────────────────
// Wilks2 (2020 updated formula — IPF standard)
function calcWilks(total, bw, isMale=true) {
  if (!total || !bw) return null;
  const bwKg = bw / 2.2046226218;
  const totKg = total / 2.2046226218;
  let a, b, c, d, e, f;
  if (isMale) {
    a = -216.0475144; b = 16.2606339; c = -0.002388645;
    d = -0.00113732; e = 7.01863e-6; f = -1.291e-8;
  } else {
    a = 594.31747775582; b = -27.23842536447; c = 0.82112226871;
    d = -0.00930733913; e = 4.731582e-5; f = -9.054e-8;
  }
  const denom = a + b*bwKg + c*bwKg**2 + d*bwKg**3 + e*bwKg**4 + f*bwKg**5;
  const coeff = 500 / denom;
  return (coeff * totKg).toFixed(1);
}

function calcFFMI(weightLbs, heightIn, bodyFatPct) {
  if (!weightLbs || !heightIn || !bodyFatPct) return null;
  const weightKg = weightLbs / 2.2046;
  const heightM  = (heightIn * 2.54) / 100;
  const leanMass = weightKg * (1 - bodyFatPct / 100);
  const ffmi = leanMass / (heightM * heightM);
  const normalised = ffmi + 6.3 * (1.8 - heightM);
  return { ffmi: ffmi.toFixed(1), norm: normalised.toFixed(1) };
}

function ffmiLabel(norm) {
  const n = parseFloat(norm);
  if (n < 16)  return { label:'Below Average',   color:'#666' };
  if (n < 18)  return { label:'Average',          color:'#aaa' };
  if (n < 20)  return { label:'Above Average',    color:'#ff6b2b' };
  if (n < 22)  return { label:'Excellent',        color:'#ffe040' };
  if (n < 23)  return { label:'Near Natty Peak',  color:'#69ff47' };
  if (n < 25)  return { label:'Natural Elite',    color:'#00e5ff' };
  if (n < 28)  return { label:'Enhanced',         color:'#c77dff' };
  return               { label:'Enhanced — High', color:'#ff4d8d' };
}

const LIFTS = [
  { key:"squat",    label:"Back Squat",     icon:"🟥", color:"#ff4d8d" },
  { key:"bench",    label:"Bench Press",    icon:"🟦", color:"#00e5ff" },
  { key:"deadlift", label:"Deadlift",       icon:"⬛", color:"#ffe040" },
  { key:"ohp",      label:"Overhead Press", icon:"🟩", color:"#69ff47" },
];

function getLiftHistory(u, liftKey) {
  if (!u.prs || !u.prs[liftKey]) return [];
  const entries = Object.values(u.prs[liftKey]);
  return entries.sort((a,b) => b.date.localeCompare(a.date));
}
function getLiftPR(u, liftKey) {
  const hist = getLiftHistory(u, liftKey);
  if (!hist.length) return null;
  return hist.reduce((best, e) => e.weight > best.weight ? e : best);
}
function getTotal(u) {
  const s = getLiftPR(u, 'squat'), b = getLiftPR(u, 'bench'), d = getLiftPR(u, 'deadlift');
  if (!s || !b || !d) return null;
  return s.weight + b.weight + d.weight;
}

// ── RATE OF GAIN ───────────────────────────────────────────
function calcRateOfGain(u) {
  if (!u.entries || u.entries.length < 2) return null;
  // Use TRUE WEIGHT (7-day avg) to avoid water weight noise
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 2) return null;
  const recent = tw.slice(-4);
  if (recent.length < 2) return null;
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 3) return null;
  const change = recent[recent.length-1].weight - recent[0].weight;
  const perWeek = (change / days) * 7;
  return { perWeek: perWeek.toFixed(2), change: change.toFixed(1), days: Math.round(days), usingTrueWeight: true };
}

// Rate of Loss widget (for cut phase)
function calcRateOfLoss(u) {
  if (!u.entries || u.entries.length < 2) return null;
  // Rate = this week's true-weight avg  vs  last week's true-weight avg
  // "True weight" = 7-day rolling average of raw entries
  const sorted = [...u.entries].sort((a,b) => a.date.localeCompare(b.date));
  const today = new Date();

  // Build 7-day avg for any date window
  function avgWeightInWindow(fromDate, toDate) {
    const inWindow = sorted.filter(e => {
      const d = new Date(e.date + 'T00:00:00');
      return d >= fromDate && d <= toDate;
    });
    if (!inWindow.length) return null;
    return inWindow.reduce((s,e) => s + e.weight, 0) / inWindow.length;
  }

  // This week: last 7 days
  const thisWeekEnd   = new Date(today);
  const thisWeekStart = new Date(today); thisWeekStart.setDate(today.getDate() - 6);
  // Last week: 7–14 days ago
  const lastWeekEnd   = new Date(today); lastWeekEnd.setDate(today.getDate() - 7);
  const lastWeekStart = new Date(today); lastWeekStart.setDate(today.getDate() - 13);

  const thisWeekAvg = avgWeightInWindow(thisWeekStart, thisWeekEnd);
  const lastWeekAvg = avgWeightInWindow(lastWeekStart, lastWeekEnd);

  // Fallback: if not enough data in rolling windows, use oldest vs newest true weight
  if (thisWeekAvg === null || lastWeekAvg === null) {
    const tw = calcTrueWeight(u.entries);
    if (tw.length < 4) return null;
    const oldest = tw[0], newest = tw[tw.length - 1];
    const days = (new Date(newest.date + 'T00:00:00') - new Date(oldest.date + 'T00:00:00')) / 864e5;
    if (days < 7) return null;
    const perWeek = ((oldest.weight - newest.weight) / days) * 7;
    const curW = newest.weight;
    return { perWeek: perWeek.toFixed(2), change: (oldest.weight - newest.weight).toFixed(1),
             days: Math.round(days), thisWeekAvg: newest.weight.toFixed(1),
             lastWeekAvg: oldest.weight.toFixed(1), usingFallback: true, curW };
  }

  const perWeek = lastWeekAvg - thisWeekAvg; // positive = losing weight
  return {
    perWeek: perWeek.toFixed(2),
    change: perWeek.toFixed(2),
    days: 7,
    thisWeekAvg: thisWeekAvg.toFixed(1),
    lastWeekAvg: lastWeekAvg.toFixed(1),
    usingFallback: false,
    curW: thisWeekAvg,
  };
}

// ── 1RM CALCULATOR ─────────────────────────────────────────
function calc1RM(weight, reps) {
  if (!weight || !reps || reps < 1) return null;
  if (reps === 1) return weight;
  const epley   = weight * (1 + reps/30);
  const brzycki = weight * (36 / (37 - reps));
  const lombardi= weight * Math.pow(reps, 0.10);
  const avg = (epley + brzycki + lombardi) / 3;
  return { epley:Math.round(epley), brzycki:Math.round(brzycki), lombardi:Math.round(lombardi), avg:Math.round(avg) };
}

// ── PLATEAU PROBABILITY SCORE ─────────────────────────────
function calcPlateauProbability(u) {
  if (!u.entries || u.entries.length < 10) return null;
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 10) return null;
  const recent = tw.slice(-14); // last 14 true-weight points
  const weights = recent.map(p => p.weight);
  const mean = weights.reduce((s,v) => s+v, 0) / weights.length;
  const variance = weights.reduce((s,v) => s + (v-mean)**2, 0) / weights.length;
  const stdDev = Math.sqrt(variance);
  // Net change over the window
  const netChange = recent[0].weight - recent[recent.length-1].weight;
  const daySpan = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5 || 1;
  const weeklyRate = (netChange / daySpan) * 7;
  // Plateau if: low net movement AND high variance relative to movement
  // Probability = how much of the variance is "noise" vs directional signal
  const noiseRatio = stdDev / (Math.abs(weeklyRate) + 0.01);
  // Scale 0-100: noiseRatio > 3 = very likely plateau, < 0.5 = clear trend
  const raw = Math.min(99, Math.max(1, (noiseRatio - 0.3) / 3.5 * 100));
  const pct = Math.round(raw);
  let label, color;
  if (pct >= 75) { label = 'Plateau'; color = '#ff6b2b'; }
  else if (pct >= 50) { label = 'Likely stalling'; color = '#ffe040'; }
  else if (pct >= 30) { label = 'Slight stall'; color = '#c77dff'; }
  else { label = 'Trending'; color = '#69ff47'; }
  return { pct, label, color, stdDev: stdDev.toFixed(2), weeklyRate: weeklyRate.toFixed(2), mean: mean.toFixed(1) };
}

function renderPlateauProbability(u) {
  const p = calcPlateauProbability(u);
  if (!p) return '';
  return `<div class="card" style="margin-bottom:16px;border-color:rgba(255,107,43,0.15)">

// ── PREDICTED NATURAL WEIGHT RANGE ────────────────────────
function renderNaturalWeightRange(u) {
  if (!u.height || !u.bodyFat) return '';
  const currentW = getTrueWeightNow(u) || (u.entries.length ? [...u.entries].sort((a,b)=>b.date.localeCompare(a.date))[0].weight : null);
  if (!currentW) return '';
  const heightIn = u.height;
  const heightM = (heightIn * 2.54) / 100;
  // Natural FFMI ceiling ~25 (normalised). Work backwards to find weight at various BF%
  // FFMI_norm = (leanMass_kg / heightM²) + 6.3*(1.8 - heightM)
  // leanMass_kg = (FFMI_norm - 6.3*(1.8-heightM)) * heightM²
  // weight_lbs = leanMass_kg / (1 - bf%) * 2.2046
  const ffmiCeil = 25.0;
  const ffmiAdj = ffmiCeil - 6.3 * (1.8 - heightM);
  const leanMassKgAtCeil = ffmiAdj * heightM * heightM;
  const targets = [
    {bf: 8,  label: 'Competition (8% BF)'},
    {bf: 12, label: 'Lean (12% BF)'},
    {bf: 15, label: 'Athletic (15% BF)'},
    {bf: 20, label: 'Fitness (20% BF)'},
  ];
  return `<div class="card" style="margin-bottom:16px;border-color:rgba(0,229,255,0.12)">
    <div class="card-title"><span class="card-title-icon">🎚</span>Natural Weight Ceiling
      <span style="margin-left:auto;font-size:10px;color:#333">FFMI ≤ 25 (natural limit)</span>
    </div>
    <div style="font-size:11px;color:#555;margin-bottom:12px">At various body fat % targets, your max natural weight at FFMI 25:</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${targets.map(t => {
        const wKg = leanMassKgAtCeil / (1 - t.bf/100);
        const wLbs = Math.round(wKg * 2.2046);
        const diff = wLbs - Math.round(currentW);
        const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
        const bar = Math.min(100, Math.max(2, (Math.round(currentW) / wLbs * 100)));
        return `<div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:11px;color:#777">${t.label}</span>
            <span style="font-size:12px;font-family:'Bebas Neue',sans-serif;color:#00e5ff">${wLbs} lbs
              <span style="font-size:10px;color:${diff>0?'#69ff47':'#ff4d8d'}">(${diffStr} from now)</span>
            </span>
          </div>
          <div style="height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${bar}%;background:rgba(0,229,255,0.5);border-radius:3px"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:#333;margin-top:12px;font-style:italic">Based on your height (${heightIn}″). Add body fat % in Edit Profile to compare current lean mass.</div>
  </div>`;
}

// ── PLATEAU DETECTOR ──────────────────────────────────────
function detectPlateau(u) {
  if (!u.entries || u.entries.length < 4) return null;
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 4) return null;
  const recent = tw.slice(-10); // last 10 true-weight points
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 10) return null;
  const change = Math.abs(recent[recent.length-1].weight - recent[0].weight);
  // Plateau = less than 0.5 lb true weight change over 14+ days
  if (days >= 14 && change < 0.5) {
    return { days: Math.round(days), change: change.toFixed(2), severity: days >= 21 ? 'severe' : 'mild' };
  }
  return null;
}

// Refeed day suggestion (for cutters)
function shouldRefeed(u) {
  if (u.phase !== 'cut' || !u.entries || u.entries.length < 5) return null;
  const sorted = [...u.entries].sort((a,b)=>a.date.localeCompare(b.date));
  const recent7 = sorted.slice(-7);
  if (recent7.length < 5) return null;
  // Check: consistent deficit days + rate stalling or plateau detected
  const plateau = detectPlateau(u);
  const rol = calcRateOfLoss(u);
  const slowing = rol && parseFloat(rol.perWeek) < 0.3;
  if (plateau || slowing) {
    return {
      reason: plateau ? `True weight hasn't moved in ${plateau.days} days` : `Rate has slowed to ${rol.perWeek} lbs/week`,
      suggestion: 'Consider a 1-2 day refeed at maintenance calories (~200-500 kcal above deficit). Prioritize carbs to replenish glycogen and support leptin.',
    };
  }
  return null;
}

function renderPlateauWidget(u) {
  const plateau = detectPlateau(u);
  const refeed = shouldRefeed(u);
  if (!plateau && !refeed) return '';
  let html = '';
  if (plateau) {
    html += `<div class="plateau-alert" style="border-color:rgba(255,107,43,0.4);background:rgba(255,107,43,0.07)">
      <div style="font-size:24px">🧱</div>

        <div style="font-size:12px;color:#888;margin-top:3px">True weight has barely moved (${plateau.change} lbs) over the last ${plateau.days} days.</div>
        <div style="font-size:12px;color:#666;margin-top:6px">💡 Try: recalculate TDEE, add 1,000 steps/day, or take a diet break for 1-2 weeks at maintenance.</div>
      </div>
    </div>`;
  }
  if (refeed) {

      <div style="font-size:24px">🍚</div>

// ── DYNAMIC STRENGTH STANDARDS (bodyweight-adjusted) ──────
// Standards scale based on current bodyweight using strength-to-weight ratios
function getDynamicStandards(liftKey, bodyweightLbs) {
  if (!bodyweightLbs) return null;
  const mults = LIFT_BW_MULTIPLIERS[liftKey];
  if (!mults) return null;
  const levels = ['Beginner','Novice','Intermediate','Advanced','Elite'];
  return levels.map((label, i) => ({ label, weight: Math.round(mults[i] * bodyweightLbs / 5) * 5 }));
}

// ── MONTE CARLO PROJECTION ─────────────────────────────────
function runMonteCarlo(u, simCount=200) {
  if (!u.goalWeight || !u.entries || u.entries.length < 3) return null;
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 3) return null;
  // Compute weekly deltas from true weight
  const sorted = [...tw].sort((a,b)=>a.date.localeCompare(b.date));
  const weeklyDeltas = [];
  for (let i=1; i<sorted.length; i++) {
    const d = (new Date(sorted[i].date)-new Date(sorted[i-1].date))/864e5;
    if (d > 0) weeklyDeltas.push((sorted[i].weight - sorted[i-1].weight)/(d/7));
  }
  if (weeklyDeltas.length < 2) return null;
  const meanDelta = weeklyDeltas.reduce((s,v)=>s+v,0)/weeklyDeltas.length;
  const variance = weeklyDeltas.reduce((s,v)=>s+(v-meanDelta)**2,0)/weeklyDeltas.length;
  const stdDev = Math.sqrt(variance);
  const currentWeight = sorted[sorted.length-1].weight;
  const startDate = new Date();
  const weeks = 52; // project 1 year forward

  // Run simulations
  const allPaths = [];
  for (let s=0; s<simCount; s++) {
    let w = currentWeight;
    const path = [w];
    for (let wk=0; wk<weeks; wk++) {
      // Box-Muller for normal distribution
      const u1=Math.random(), u2=Math.random();
      const z = Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
      w += meanDelta + z*stdDev;
      path.push(parseFloat(w.toFixed(1)));
    }
    allPaths.push(path);
  }

  // Compute percentile bands at each week
  const p10=[], p25=[], p50=[], p75=[], p90=[];
  for (let wk=0; wk<=weeks; wk++) {
    const vals = allPaths.map(p=>p[wk]).sort((a,b)=>a-b);
    const pct = (p) => vals[Math.floor(p/100*vals.length)];
    p10.push(pct(10)); p25.push(pct(25)); p50.push(pct(50)); p75.push(pct(75)); p90.push(pct(90));
  }
  const labels = Array.from({length:weeks+1},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i*7);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });
  return { labels, p10, p25, p50, p75, p90, meanDelta: meanDelta.toFixed(2), stdDev: stdDev.toFixed(2) };
}

// ── VELOCITY / MOMENTUM CHART ──────────────────────────────
function calcWeeklyVelocity(u) {
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 3) return null;
  const sorted = [...tw].sort((a,b)=>a.date.localeCompare(b.date));
  // Rolling 7-day rate of change
  const result = [];
  for (let i=1; i<sorted.length; i++) {
    const d = (new Date(sorted[i].date)-new Date(sorted[i-1].date))/864e5;
    if (d<1||d>14) continue;
    const roc = (sorted[i].weight - sorted[i-1].weight)/(d/7);
    result.push({ date: sorted[i].date, roc: parseFloat(roc.toFixed(2)) });
  }
  return result;
}

        { label:'', data:mc.p10, borderColor:'transparent', backgroundColor:'transparent', fill:false, tension:0.4, pointRadius:0 },
        // Inner band (p25-p75)
        { label:'25–75%', data:mc.p75, borderColor:'transparent', backgroundColor:u.color+'44', fill:'+1', tension:0.4, pointRadius:0 },
        { label:'', data:mc.p25, borderColor:'transparent', backgroundColor:'transparent', fill:false, tension:0.4, pointRadius:0 },
        // Median
        { label:'Median', data:mc.p50, borderColor:u.color, backgroundColor:'transparent', borderWidth:2, tension:0.4, pointRadius:0, fill:false },
      ];
      if (u.goalWeight) {
        datasets.push({ label:'Goal', data:Array(mc.labels.length).fill(u.goalWeight), borderColor:'rgba(255,255,255,0.3)', backgroundColor:'transparent', borderWidth:1, borderDash:[4,4], pointRadius:0, fill:false });
      }
      new Chart(ctx, {
        type:'line',
        data:{ labels:mc.labels, datasets },
        options:{
          plugins:{ legend:{ display:false } },
          scales:{
            x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:10},maxTicksLimit:8}},
            y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Mono',size:10},callback:v=>v+' lbs'}}
          },
          responsive:true, maintainAspectRatio:true,
        }
      });
    });

    // ── BODYWEIGHT vs STRENGTH CHART ──────────────────────────
    const bwStrCtx = document.getElementById('bwStrengthChart');
    if (bwStrCtx) {
      const eligible = usersWithData.filter(u =>
        u.entries.length >= 5 && (getLiftPR(u,'squat')||getLiftPR(u,'bench')||getLiftPR(u,'deadlift'))
      );
      const datasets = [];
      eligible.forEach(u => {
        // Normalised bodyweight: % change from start
        const sorted = [...u.entries].sort((a,b)=>a.date.localeCompare(b.date));
        const startW = sorted[0].weight;
        const bwPoints = sorted.map(e => ({
          x: e.date, y: parseFloat(((e.weight - startW) / startW * 100).toFixed(2))
        }));
        datasets.push({ label: u.name + ' Weight %', data: bwPoints,
          borderColor: u.color + '99', backgroundColor: 'transparent',
          tension: 0.35, pointRadius: 2, borderDash: [4,3],
          parsing: { xAxisKey:'x', yAxisKey:'y' } });
        // PR dots — each logged PR as a % of first PR for that lift
        ['squat','bench','deadlift'].forEach(liftKey => {
          const lift = LIFTS.find(l=>l.key===liftKey);
          if (!lift || !u.prs?.[liftKey]?.length) return;
          const prSorted = [...u.prs[liftKey]].sort((a,b)=>a.date.localeCompare(b.date));
          if (!prSorted.length) return;
          const firstPR = prSorted[0].weight;
          const prPoints = prSorted.map(pr => ({
            x: pr.date, y: parseFloat(((pr.weight - firstPR) / firstPR * 100).toFixed(2))
          }));
          datasets.push({ label: u.name + ' ' + lift.label + ' %',
            data: prPoints, borderColor: lift.color,
            backgroundColor: lift.color + '88', tension: 0.3,
            pointRadius: 5, pointStyle: 'circle', showLine: true,
            parsing: { xAxisKey:'x', yAxisKey:'y' } });
        });
      });
      new Chart(bwStrCtx, { type: 'line',
        data: { datasets },
        options: {
          parsing: false,
          scales: {
            x: { type:'category', ticks:{ color:'#555', font:{family:'DM Mono',size:9}, maxTicksLimit:8 },
                 grid:{ color:'rgba(255,255,255,0.04)' } },
            y: { title:{ display:true, text:'% change from start', color:'#555', font:{size:10} },
                 ticks:{ color:'#555', font:{family:'DM Mono',size:10},
                   callback: v => (v>=0?'+':'')+v+'%' },
                 grid:{ color:'rgba(255,255,255,0.04)' } }
          },
          plugins:{ legend:{ labels:{ color:'#888', font:{family:'DM Mono',size:10}, boxWidth:10 } },
            tooltip:{ callbacks:{ label: ctx => ctx.dataset.label+': '+(ctx.parsed.y>=0?'+':'')+ctx.parsed.y+'%' } }
          },
          responsive:true, maintainAspectRatio:true,
        }
      });
    }

    // ── WEIGH-IN HEATMAP ──────────────────────────────────────
    const heatmapEl = document.getElementById('weighinHeatmap');
    if (heatmapEl && usersWithData.length) {
      const weeks = 12;
      const today = new Date();
      // Build date set for each user
      const userDateSets = usersWithData.map(u => new Set(u.entries.map(e=>e.date)));
      // Generate week × day grid
      let html = '<div style="overflow-x:auto"><table style="border-collapse:separate;border-spacing:3px;width:100%">';
      // Header row: day labels
      html += '<tr><td style="font-size:9px;color:#333;min-width:60px"></td>';
      const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      dayLabels.forEach(d => { html += `<td style="font-size:9px;color:#444;text-align:center;padding:2px">${d}</td>`; });
      html += '</tr>';
      // User rows
      usersWithData.forEach(u => {
        const dateSet = userDateSets[usersWithData.indexOf(u)];
        html += `<tr><td style="font-size:10px;color:${u.color};font-family:'Bebas Neue',sans-serif;letter-spacing:0.06em;padding-right:8px;white-space:nowrap">${u.name}</td>`;
        // Get sunday of 12 weeks ago
        const startSun = new Date(today);
        startSun.setDate(today.getDate() - today.getDay() - (weeks-1)*7);
        for (let w = 0; w < weeks; w++) {
          for (let d = 0; d < 7; d++) {
            const cellDate = new Date(startSun);
            cellDate.setDate(startSun.getDate() + w*7 + d);
            const dateStr = cellDate.toISOString().split('T')[0];
            const isFuture = cellDate > today;
            const logged = dateSet.has(dateStr);
            const bg = isFuture ? 'rgba(255,255,255,0.02)' : logged ? u.color : 'rgba(255,255,255,0.05)';
            const border = logged ? u.color+'66' : 'rgba(255,255,255,0.06)';
            html += `<td title="${dateStr}" style="width:20px;height:20px;background:${bg};border-radius:3px;border:1px solid ${border}"></td>`;
          }
        }
        html += '</tr>';
      });
      html += '</table></div>';
      // Legend
      html += '<div style="display:flex;gap:16px;margin-top:8px;font-size:10px;color:#444">';
      html += '<span>□ No entry</span>';
      usersWithData.forEach(u => { html += `<span style="color:${u.color}">■ ${u.name}</span>`; });
      html += '</div>';
      heatmapEl.innerHTML = html;
    }

    // ── WEEK-OVER-WEEK DELTA TABLE ─────────────────────────────
    const wowEl = document.getElementById('wowTable');
    if (wowEl && usersWithData.length >= 2) {
      const weeks = 8;
      const today = new Date();
      // Get last N Sunday-start weeks
      const weekStarts = [];
      for (let w = weeks-1; w >= 0; w--) {
        const sun = new Date(today);
        sun.setDate(today.getDate() - today.getDay() - w*7);
        weekStarts.push(sun.toISOString().split('T')[0]);
      }
      // For each user, compute true weight avg per week
      let html = '<table style="width:100%;border-collapse:collapse"><thead><tr>';
      html += '<th style="text-align:left;font-size:10px;color:#555;padding:6px 10px">Athlete</th>';
      weekStarts.forEach(ws => {
        const d = new Date(ws+'T00:00:00');
        html += `<th style="text-align:center;font-size:9px;color:#444;padding:4px 6px">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</th>`;
      });
      html += '</tr></thead><tbody>';
      usersWithData.forEach(u => {
        html += `<tr><td style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:${u.color};padding:6px 10px">${u.name}</td>`;
        let prevAvg = null;
        weekStarts.forEach(ws => {
          const d = new Date(ws+'T00:00:00');
          const nextSun = new Date(d); nextSun.setDate(d.getDate()+7);
          const inWeek = u.entries.filter(e => {
            const ed = new Date(e.date+'T00:00:00');
            return ed >= d && ed < nextSun;
          });
          const avg = inWeek.length ? inWeek.reduce((s,e)=>s+e.weight,0)/inWeek.length : null;
          let cell = '—';
          let color = '#333';
          if (avg !== null) {
            const delta = prevAvg !== null ? avg - prevAvg : null;
            cell = avg.toFixed(1);
            if (delta !== null) {
              const sign = delta < 0 ? '▼' : delta > 0 ? '▲' : '●';
              const dColor = delta < 0 ? '#69ff47' : delta > 0 ? '#ff4d8d' : '#555';
              cell += `<div style="font-size:9px;color:${dColor}">${sign} ${Math.abs(delta).toFixed(1)}</div>`;
              color = '#aaa';
            }
            prevAvg = avg;
          } else { prevAvg = null; }
          html += `<td style="text-align:center;font-size:11px;color:${color};padding:4px 6px;border-top:1px solid rgba(255,255,255,0.04)">${cell}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      wowEl.innerHTML = html;
    }

  }, 50);
}

// ── COLLAPSIBLE SECTIONS ──────────────────────────────────
// State stored as data-open attribute on the element itself — survives across re-renders
// because collapseState is keyed by id and consulted at render time.
const collapseState = {};

window.toggleCollapse = function(id) {
  const body  = document.getElementById('cb-' + id);
  const arrow = document.getElementById('ca-' + id);
  if (!body) return;

  // Read current state from data attribute (truth is always on the element)
  const isCurrentlyOpen = body.dataset.open === 'true';
  const opening = !isCurrentlyOpen;
  collapseState[id] = opening;
  body.dataset.open = opening ? 'true' : 'false';

  // If opening an athlete section, mount their chart after the transition
  if (opening && id.startsWith('athlete-')) {
    const uid = id.replace('athlete-', '');
    const u = users.find(x => x.id === uid);
    if (u && u.entries.length > 1) {
      setTimeout(() => {
        const ctx = document.getElementById('chart-' + uid);
        if (ctx) { const ch = Chart.getChart(ctx); if (ch) ch.destroy(); }
        renderAthleteChart(u);
      }, 380); // after transition completes
    }
  }

  if (opening) {
    // OPEN: unhide, then animate from 0 → scrollHeight
    body.style.overflow  = 'hidden';
    body.style.maxHeight = '0px';
    body.style.opacity   = '0';
    body.style.pointerEvents = '';
    if (arrow) arrow.classList.add('open');
    // Force layout, then start transition
    void body.offsetHeight;
    body.style.transition = 'max-height 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease';
    body.style.maxHeight  = body.scrollHeight + 'px';
    body.style.opacity    = '1';
    // Once done, free the height so dynamic content can grow
    body.addEventListener('transitionend', function onDone(e) {
      if (e.propertyName !== 'max-height') return;
      body.removeEventListener('transitionend', onDone);
      if (body.dataset.open === 'true') body.style.maxHeight = 'none';
    });
  } else {
    // CLOSE: pin current height, then animate to 0
    body.style.transition = 'none'; // disable transition temporarily to set start value
    body.style.maxHeight  = body.scrollHeight + 'px';
    body.style.opacity    = '1';
    void body.offsetHeight; // force layout
    body.style.transition = 'max-height 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease';
    body.style.maxHeight  = '0px';
    body.style.opacity    = '0';
    body.style.pointerEvents = 'none';
    if (arrow) arrow.classList.remove('open');
  }
};

function collapseSection(id, title, contentHtml, defaultOpen=true) {
  if (collapseState[id] === undefined) collapseState[id] = defaultOpen;
  const isOpen = collapseState[id];
  const heightStyle  = isOpen ? 'max-height:none;'  : 'max-height:0px;';
  const opacityStyle = isOpen ? 'opacity:1;'         : 'opacity:0;';
  const ptrStyle     = isOpen ? ''                   : 'pointer-events:none;';
  return `<div style="margin-bottom:16px">
    <div class="collapse-header card-title" onclick="window.toggleCollapse('${id}')"
         style="cursor:pointer;user-select:none;margin-bottom:${isOpen ? '12px' : '0'}">
      <span id="ca-${id}" class="collapse-arrow ${isOpen ? 'open' : ''}">▶</span>
      ${title}
    </div>
    <div id="cb-${id}"
         data-open="${isOpen ? 'true' : 'false'}"
         style="overflow:hidden;${heightStyle}${opacityStyle}${ptrStyle}">
      ${contentHtml}
    </div>
  </div>`;
}

// ── ALL TIME LOW ─────────────────────────────────────────
function getAllTimeLow(u) {
  if (!u.entries || u.entries.length === 0) return null;
  // Use ALL historical entries — ATL is genuinely the lowest ever logged
  const sorted = [...u.entries].sort((a,b) => a.weight - b.weight);
  const atl = sorted[0];
  // Use 7-day true weight for current comparison so a spike doesn't falsely trigger "near ATL"
  const tw = getTrueWeightNow(u);
  const curW = tw ?? ([...u.entries].sort((a,b)=>b.date.localeCompare(a.date))[0]?.weight ?? null);
  const isAtATL = curW !== null && Math.abs(curW - atl.weight) <= 2.0;
  const isNewATL = curW !== null && curW < atl.weight;
  return { weight: atl.weight, date: atl.date, isAtATL, isNewATL, current: curW };
}

// ── STREAK TRACKER ────────────────────────────────────────
function calcStreak(u) {
  if (!u.entries || u.entries.length === 0) return { current: 0, longest: 0, lastLog: null };
  const dates = [...new Set(u.entries.map(e => e.date))].sort();
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 864e5).toISOString().split('T')[0];

  // Current streak: consecutive weeks with at least 1 entry (7-day windows)
  // We use a simpler day-gap method: streak breaks if gap > 8 days between any two entries
  let current = 1, longest = 1, streak = 1;
  for (let i = dates.length - 1; i > 0; i--) {
    const gap = (new Date(dates[i]) - new Date(dates[i-1])) / 864e5;
    if (gap <= 8) { streak++; longest = Math.max(longest, streak); }
    else { if (i === dates.length - 1) current = 1; streak = 1; }
  }
  // If last entry was more than 8 days ago, current streak is 0
  const daysSinceLast = (new Date(today) - new Date(dates[dates.length-1])) / 864e5;
  current = daysSinceLast <= 8 ? Math.max(current, streak) : 0;
  longest = Math.max(longest, streak);

  const milestones = [7,14,30,60,90,180,365];
  const nextMilestone = milestones.find(m => m > current) ?? null;
  return { current, longest, lastLog: dates[dates.length-1], nextMilestone, daysSinceLast: Math.floor(daysSinceLast) };
}

function renderStreakWidget(u) {
  const s = calcStreak(u);

// ── BODY RECOMPOSITION DETECTOR ───────────────────────────
function detectRecomp(u) {
  if (!u.bodyFat || !u.entries || u.entries.length < 4) return null;
  // Need at least 2 BF% readings saved as entries with bf property, OR
  // detect recomp by: weight stable (< 2 lbs change) while FFMI improving
  // Since we only store one BF% on the profile (not historical), we detect via
  // weight stability + entries logged (proxy for consistent training)
  const sorted = [...u.entries].sort((a,b) => a.date.localeCompare(b.date));
  const recent = sorted.slice(-8);
  if (recent.length < 4) return null;
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 21) return null;
  const weightChange = Math.abs(recent[recent.length-1].weight - recent[0].weight);
  const twNow = getTrueWeightNow(u);
  const twEarly = calcTrueWeight(recent.slice(0,3));
  const twEarlyVal = twEarly.length ? twEarly[twEarly.length-1].weight : recent[0].weight;
  const twChange = twNow ? Math.abs(twNow - twEarlyVal) : weightChange;
  // Recomp signal: true weight stable (<2 lbs) over 21+ days with consistent entries
  if (twChange < 2.0 && days >= 21 && recent.length >= 4) {
    return { days: Math.round(days), twChange: twChange.toFixed(1), entries: recent.length };
  }
  return null;
}

function renderRecompBadge(u) {
  const r = detectRecomp(u);
  if (!r) return '';
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(29,233,182,0.07);border:1px solid rgba(29,233,182,0.2);border-radius:8px;margin-bottom:16px">

    </div>
  </div>`;
}

// ── TREND CONFIDENCE SCORE ────────────────────────────────
function calcTrendConfidence(u) {
  if (!u.entries || u.entries.length < 5) return null;
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 5) return null;
  const sorted = [...tw].sort((a,b) => a.date.localeCompare(b.date));
  // Compute week-over-week deltas
  const deltas = [];
  for (let i = 1; i < sorted.length; i++) {
    const d = (new Date(sorted[i].date) - new Date(sorted[i-1].date)) / 864e5;
    if (d > 0 && d <= 10) deltas.push((sorted[i].weight - sorted[i-1].weight) / (d/7));
  }
  if (deltas.length < 3) return null;
  const mean = deltas.reduce((s,v) => s+v, 0) / deltas.length;
  const variance = deltas.reduce((s,v) => s + (v-mean)**2, 0) / deltas.length;
  const stdDev = Math.sqrt(variance);
  // Coefficient of variation — lower = more consistent = higher confidence
  const cv = mean !== 0 ? Math.abs(stdDev / mean) : 1;
  // Confidence: 0–100, higher = more reliable prediction
  const confidence = Math.round(Math.min(100, Math.max(0, (1 - Math.min(cv, 1)) * 100)));
  const entryBonus = Math.min(20, (u.entries.length - 5) * 2); // up to +20 for more data
  const finalScore = Math.min(100, confidence + entryBonus);
  let label, color;
  if (finalScore >= 75) { label = 'High confidence'; color = '#69ff47'; }
  else if (finalScore >= 50) { label = 'Moderate'; color = '#ffe040'; }
  else if (finalScore >= 25) { label = 'Low'; color = '#ff6b2b'; }
  else { label = 'Very low'; color = '#ff4d8d'; }
  return { score: finalScore, label, color, stdDev: stdDev.toFixed(2), entries: u.entries.length };
}

function renderTrendConfidence(u) {
  const c = calcTrendConfidence(u);
  if (!c) return '';
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-bottom:12px">

function mountOverlayChart() {
  const withData = users.filter(u => u.entries.length >= 2);
  const ctx = document.getElementById('overlayChart');
  if (!ctx || !withData.length) return;
  const allDates = [...new Set(withData.flatMap(u => u.entries.map(e => e.date)))].sort();
  const isNorm = overlayMode === 'normalized';
  const datasets = withData.map(u2 => {
    const sorted = [...u2.entries].sort((a,b) => a.date.localeCompare(b.date));
    const startW = sorted[0].weight;
    const byDate = {}; sorted.forEach(e => { byDate[e.date] = e.weight; });
    const data = allDates.map(d => {
      if (byDate[d] === undefined) return null;
      return isNorm
        ? parseFloat(((byDate[d] - startW) / startW * 100).toFixed(2))
        : byDate[d];
    });
    return {
      label: u2.name,
      data,
      borderColor: u2.color, backgroundColor: u2.color + '15', borderWidth: 2,
      pointRadius: 3, tension: 0.3, spanGaps: true, fill: false,
    };
  });
  const yCallback = isNorm
    ? v => (v > 0 ? '+' : '') + v + '%'
    : v => v + ' lbs';
  const tooltipLabel = isNorm
    ? ctx => `${ctx.dataset.label}: ${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y}%`
    : ctx => `${ctx.dataset.label}: ${ctx.parsed.y} lbs`;
  new Chart(ctx, {
    type: 'line',
    data: { labels: allDates.map(d => fmtDate(d)), datasets },
    options: {
      plugins: {
        legend: { labels: { color: '#777', font: { family: 'DM Mono', size: 10 }, boxWidth: 20 } },
        tooltip: { callbacks: { label: tooltipLabel } }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#555', font: { family: 'DM Mono', size: 10 }, callback: yCallback } }
      },
      responsive: true, maintainAspectRatio: true,
    }
  });
}

function mountIndividualCharts() {

// ── PASTE PARSER ──────────────────────────────────────────────
function parseWorkoutPaste(text) {
  // Split into session blocks by Day headers
  const lines = text.split('\n');
  const sessions = [];
  let currentSession = null;
  let currentExercise = null;

  const dayRe    = /^Day\s+([\d.]+)\s*[—–-]+?\s*(.+)/i;
  const setLineRe = /^([\d]+)[x×]([\d]+)/i;
  const weightRe  = /\(([^)]+)\)/;
  const rpeRe     = /RPE\s*([\d.]+)/i;
  const repsRe    = /(\d+)[x×](\d+)/i;
  const setsOnlyRe = /^(\d+)\s+sets?\b/i;
  const dividerRe  = /^[.—\-–=]{4,}/;

  function flushExercise() {
    if (currentExercise && currentSession) {
      if (currentExercise.sets.length > 0 || currentExercise.name) {
        currentSession.exercises.push(currentExercise);
      }
    }
    currentExercise = null;
  }

  function flushSession() {
    flushExercise();
    if (currentSession && currentSession.exercises.length > 0) {
      sessions.push(currentSession);
    }
    currentSession = null;
  }

  for (let raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (dividerRe.test(line)) { flushSession(); continue; }

    // New day/session header
    const dayMatch = line.match(dayRe);
    if (dayMatch) {
      flushSession();
      currentSession = {
        id: genId(),
        userId: activeUserId,
        date: new Date().toISOString().split('T')[0],
        label: dayMatch[2].trim(),
        cycle: dayMatch[1].trim(),
        exercises: [],
        notes: ''
      };
      currentExercise = null;
      continue;
    }

    if (!currentSession) continue;

    // Continuation set line (starts with spaces/tabs then set notation)
    const isContinuation = /^\s{2,}/.test(raw) || /^\t/.test(raw);
    const repsMatch = line.match(repsRe);
    const weightMatch = line.match(weightRe);
    const rpeMatch = line.match(rpeRe);

    if (isContinuation && currentExercise && repsMatch) {
      // Additional set group for same exercise
      const sets = buildSets(repsMatch[1], repsMatch[2], weightMatch, rpeMatch);
      currentExercise.sets.push(...sets);
      continue;
    }

    // "3 sets" only (bodyweight/unweighted)
    const setsOnly = line.match(setsOnlyRe);
    if (setsOnly && !repsMatch && line.length < 60) {
      flushExercise();
      const name = line.replace(setsOnlyRe,'').trim();
      currentExercise = {
        id: genId(),
        name: name || line,
        sets: Array.from({length:parseInt(setsOnly[1])}, () => ({ id:genId(), reps:null, weight:null, rpe:null, note:'' }))
      };
      continue;
    }

    // Label-only lines (superset labels, "Rest", etc.)
    if (!repsMatch && !weightMatch && line.length < 50) {
      // Could be exercise with no weight/reps yet, or a note
      if (/rest/i.test(line)) continue;
      if (/superset/i.test(line)) {
        if (currentExercise) currentExercise.isSupersetWith = line; continue;
      }
      // Treat as standalone exercise name with no sets
      flushExercise();
      currentExercise = { id: genId(), name: line, sets: [] };
      continue;
    }

    // Normal exercise line
    if (repsMatch) {
      flushExercise();
      // Extract exercise name: everything before the reps/RPE/weight
      let name = line
        .replace(repsRe, '').replace(rpeRe, '').replace(weightRe, '')
        .replace(/RPE/gi,'').replace(/\d+(\.\d+)?/g,'').replace(/[x×]/g,'')
        .replace(/\s+/g,' ').trim();
      if (!name) name = line.split(/\d/)[0].trim();
      const sets = buildSets(repsMatch[1], repsMatch[2], weightMatch, rpeMatch);
      currentExercise = { id: genId(), name: name || line, sets };
      continue;
    }
  }
  flushSession();
  return sessions;
}

function buildSets(setsN, repsN, weightMatch, rpeMatch) {
  const n = parseInt(setsN), r = parseInt(repsN);
  const rawW = weightMatch ? weightMatch[1].trim() : null;
  const numW = rawW ? parseFloat(rawW) : null;
  const weightVal = (!isNaN(numW) && numW > 0) ? numW : null;
  const weightNote = (rawW && isNaN(parseFloat(rawW))) ? rawW : (weightVal ? null : rawW);
  const rpe = rpeMatch ? parseFloat(rpeMatch[1]) : null;
  return Array.from({length: n}, () => ({
    id: genId(), reps: r,
    weight: weightVal, weightNote: weightNote || null,
    rpe: rpe, note: ''
  }));
}

// ── E1RM PER SET ──────────────────────────────────────────────
function setE1RM(set) {
  if (!set.weight || !set.reps || set.reps < 1) return null;
  if (set.reps === 1) return set.weight;
  // RPE-adjusted if available: higher RPE = closer to true max
  const base = set.weight * (1 + set.reps / 30);
  if (set.rpe) {
    const rpeAdj = 1 + (set.rpe - 6) * 0.03; // ~3% per RPE point above 6
    return Math.round(base * rpeAdj);
  }
  return Math.round(base);
}

// ── GET SESSIONS FOR USER ─────────────────────────────────────
function getUserSessions(userId) {
  return (trainingSessions[userId] || []).sort((a,b) => b.date.localeCompare(a.date));
}

// ── EXERCISE TREND DATA ───────────────────────────────────────
function getExerciseTrend(userId, exerciseName, rangeWeeks) {
  let sessions = getUserSessions(userId);
  if (rangeWeeks && rangeWeeks > 0) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - rangeWeeks * 7);
    const cutoffStr = cutoff.toISOString().split('T')[0];
    sessions = sessions.filter(s => s.date >= cutoffStr);
  }
  const results = [];
  for (const s of sessions) {
    for (const ex of (s.exercises||[])) {
      if (!ex || !ex.name) continue;
      if (ex.name.toLowerCase().trim() === exerciseName.toLowerCase().trim()) {
        const weightedSets = (ex.sets||[]).filter(st => st.weight);
        if (!weightedSets.length) continue;
        const topE1RM = Math.max(...weightedSets.map(st => setE1RM(st) || 0));
        const topWeight = Math.max(...weightedSets.map(st => st.weight || 0));
        const avgRPE = weightedSets.filter(st=>st.rpe).length
          ? (weightedSets.reduce((s,st) => s+(st.rpe||0),0) / weightedSets.filter(st=>st.rpe).length).toFixed(1)
          : null;
        const totalVol = weightedSets.reduce((s,st) => s+(st.weight||0)*(st.reps||0), 0);
        results.push({ date: s.date, label: s.label, topE1RM, topWeight, avgRPE, totalVol, sets: weightedSets });
      }
    }
  }
  return results.sort((a,b) => a.date.localeCompare(b.date));
}

function getAllExercises(userId) {

}

// ── WEEKLY VOLUME PER MUSCLE ──────────────────────────────────
// ── TONNAGE HELPERS ──────────────────────────────────────────
function calcSessionTonnage(session) {
  // Tonnage = sum of (weight × reps) for every set
  let total = 0;
  (session.exercises || []).forEach(ex => {
    (ex.sets || []).forEach(st => {
      if (st.weight && st.reps) total += st.weight * st.reps;
    });
  });
  return total;
}

function getWeeklyTonnage(userId) {
  const sessions = getUserSessions(userId);
  const weeks = {};
  sessions.forEach(s => {
    const d = new Date(s.date + 'T00:00:00');
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const wk = weekStart.toISOString().split('T')[0];
    weeks[wk] = (weeks[wk] || 0) + calcSessionTonnage(s);
  });
  return weeks;
}

function getExerciseTonnage(userId) {
  // Returns { exerciseName: { total, sessions, avgPerSession, peakSession, trend: [...] } }
  const sessions = getUserSessions(userId);
  const exMap = {};
  sessions.forEach(s => {
    (s.exercises || []).forEach(ex => {
      if (!ex.name) return;
      const name = ex.name;
      const t = (ex.sets||[]).reduce((acc, st) => acc + (st.weight&&st.reps ? st.weight*st.reps : 0), 0);
      if (!exMap[name]) exMap[name] = { total:0, sessions:0, peak:0, peakDate:'', trend:[] };
      exMap[name].total += t;
      exMap[name].sessions += 1;
      if (t > exMap[name].peak) { exMap[name].peak = t; exMap[name].peakDate = s.date; }
      exMap[name].trend.push({ date: s.date, tonnage: t });
    });
  });
  Object.values(exMap).forEach(v => {
    v.avgPerSession = v.sessions > 0 ? Math.round(v.total / v.sessions) : 0;
    v.trend.sort((a,b) => a.date.localeCompare(b.date));
  });
  return exMap;
}

function getWeeklyVolume(userId) {
  const sessions = getUserSessions(userId);
  const today = new Date();
  const weeks = {};
  sessions.forEach(s => {
    const d = new Date(s.date + 'T00:00:00');
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const wk = weekStart.toISOString().split('T')[0];
    if (!weeks[wk]) weeks[wk] = {};
    (s.exercises||[]).forEach(ex => {
      if (!ex || !ex.name) return;
      const muscles = getMuscles(ex.name);
      const weightedSets = (ex.sets||[]).filter(st => st.reps);
      muscles.forEach(m => {
        weeks[wk][m] = (weeks[wk][m] || 0) + weightedSets.length;
      });
    });
  });
  return weeks;
}

window.toggleReminder = async function(enabled) {
  if (enabled && 'Notification' in window) {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      alert('Notification permission denied. Enable in browser/OS settings, then try again.');
      return;
    }
  }
  saveSetting('reminderEnabled', enabled);
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'SCHEDULE_REMINDER', enabled, time: settings.reminderTime || '07:00'
    });
  }
  // Re-render settings panel in place
  const sp = document.getElementById('settingsPanel');
  if (sp) {

    sp.replaceWith(dummy.firstElementChild);
  }

      type: 'SCHEDULE_REMINDER', enabled: true, time: t
    });
  }
};

// ── SESSION LOG TAB ───────────────────────────────────────────
function renderSessionLog(u, sessions) {
  if (!sessions.length) return `<div class="empty" style="padding:40px">
    <div class="empty-icon">📋</div>
    <p>No sessions yet. Import your logs or add one manually.</p>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <button class="btn" style="width:auto;padding:10px 24px" onclick="window.setTrainingTab('import')">⬇️ Import Logs</button>
      <button class="btn btn-ghost" style="width:auto;padding:10px 24px" onclick="window.showAddSession('${u.id}')">+ Manual Session</button>
    </div>
  </div>`;

  // Group by cycle
  const byCycle = {};
  sessions.forEach(s => {
    const c = s.cycle || 'Misc';
    if (!byCycle[c]) byCycle[c] = [];
    byCycle[c].push(s);
  });

  // Sort cycle keys: 1.1, 1.2, 2.1, etc
  const cycleKeys = Object.keys(byCycle).sort((a,b) => {
    const [am,ad='0'] = a.split('.').map(Number);
    const [bm,bd='0'] = b.split('.').map(Number);
    return bm - am || bd - ad; // descending
  });

  return cycleKeys.map(cycle => {
    const cycleSessions = byCycle[cycle].sort((a,b) => {
      const ap = (a.cycle||'0').split('.');
      const bp = (b.cycle||'0').split('.');
      const ad = Number(ap[1]||0);
      const bd = Number(bp[1]||0);
      return ad - bd;
    });
    return `<div style="margin-bottom:24px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:#444;letter-spacing:0.12em;margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <span>Cycle ${cycle}</span>
        <span style="flex:1;height:1px;background:rgba(255,255,255,0.06)"></span>
      </div>
      ${cycleSessions.map(s => renderSessionCard(u, s)).join('')}
    </div>`;
  }).join('');
}
