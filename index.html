        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:#ff6b2b">Plateau Detected</div>
        <div style="font-size:12px;color:#888;margin-top:3px">True weight has barely moved (${plateau.change} lbs) over the last ${plateau.days} days.</div>
        <div style="font-size:12px;color:#666;margin-top:6px">💡 Try: recalculate TDEE, add 1,000 steps/day, or take a diet break for 1-2 weeks at maintenance.</div>
      </div>
    </div>`;
  }
  if (refeed) {
    html += `<div class="plateau-alert" style="border-color:rgba(0,229,255,0.3);background:rgba(0,229,255,0.05)">
      <div style="font-size:24px">🍚</div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:#00e5ff">Refeed Suggested</div>
        <div style="font-size:12px;color:#888;margin-top:3px">${refeed.reason}.</div>
        <div style="font-size:12px;color:#666;margin-top:6px">💡 ${refeed.suggestion}</div>
      </div>
    </div>`;
  }
  return html;
}

// ── DYNAMIC STRENGTH STANDARDS (bodyweight-adjusted) ──────
// Standards scale based on current bodyweight using strength-to-weight ratios
function getDynamicStandards(liftKey, bodyweightLbs) {
  if (!bodyweightLbs) return null;
  const mults = LIFT_BW_MULTIPLIERS[liftKey];
  if (!mults) return null;
  const levels = ['Beginner','Novice','Intermediate','Advanced','Elite'];
  return levels.map((label, i) => ({ label, weight: Math.round(mults[i] * bodyweightLbs / 5) * 5 }));
}

// ── MONTE CARLO PROJECTION ─────────────────────────────────
// ── VELOCITY / MOMENTUM CHART ──────────────────────────────
function calcWeeklyVelocity(u) {
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 3) return null;
  const sorted = [...tw].sort((a,b)=>a.date.localeCompare(b.date));
  // Rolling 7-day rate of change
  const result = [];
  for (let i=1; i<sorted.length; i++) {
    const d = (new Date(sorted[i].date)-new Date(sorted[i-1].date))/864e5;
    if (d<1||d>14) continue;
    const roc = (sorted[i].weight - sorted[i-1].weight)/(d/7);
    result.push({ date: sorted[i].date, roc: parseFloat(roc.toFixed(2)) });
  }
  return result;
}

// ── RACE TO GOAL ──────────────────────────────────────────
function renderRaceToGoal() {
  const racers = users.filter(u=>u.goalWeight && u.entries.length>0);
  if (racers.length === 0) return `<div class="card"><div class="card-title"><span class="card-title-icon">🏆</span>Race to Goal</div><div style="color:#444;font-size:13px;text-align:center;padding:20px">Set goal weights and log entries to see the race.</div></div>`;
  const stats = racers.map(u => {
    const p = calcProgress(u);
    const pct = p?.pct ?? 0;
    const tw = getTrueWeightNow(u);
    const toGoal = tw !== null ? Math.max(0, tw - u.goalWeight) : null;
    return { u, pct: parseFloat(pct||0), toGoal };
  }).sort((a,b)=>b.pct-a.pct);

  const leader = stats[0];
  return `<div class="card">
    <div class="card-title"><span class="card-title-icon">🏆</span>Race to Goal
      <span style="margin-left:auto;font-size:11px;color:#555">% of goal reached</span>
    </div>
    ${stats.map((s,i) => {
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const barW = Math.min(100, Math.max(2, s.pct));
      return `<div class="race-lane">
        <div class="race-name" style="color:${s.u.color}">${medal} ${s.u.name}</div>
        <div class="race-track-bar">
          <div class="race-fill" style="width:${barW}%;background:linear-gradient(90deg,${s.u.color}55,${s.u.color}99)">
            ${barW > 20 ? `<span style="font-size:11px;color:rgba(255,255,255,0.8);font-family:'Bebas Neue',sans-serif;padding-right:6px">${s.pct.toFixed(0)}%</span>` : ''}
          </div>
          <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#444">
            ${s.toGoal!==null?`${s.toGoal.toFixed(1)} to go`:''}
          </span>
        </div>
        <div style="font-size:13px;color:${s.u.color};min-width:42px;text-align:right;font-family:'Bebas Neue',sans-serif">${s.pct.toFixed(0)}%</div>
      </div>`;
    }).join('')}
    <div style="font-size:11px;color:#555;margin-top:10px;font-style:italic">True weight used where available. Lead: <strong style="color:${leader.u.color}">${leader.u.name}</strong> at ${leader.pct.toFixed(1)}%</div>
  </div>`;
}

// ── COLLAPSIBLE SECTIONS ──────────────────────────────────
// State stored as data-open attribute on the element itself — survives across re-renders
// because collapseState is keyed by id and consulted at render time.
const collapseState = {};

window.toggleCollapse = function(id) {
  const body  = document.getElementById('cb-' + id);
  const arrow = document.getElementById('ca-' + id);
  if (!body) return;

  // Read current state from data attribute (truth is always on the element)
  const isCurrentlyOpen = body.dataset.open === 'true';
  const opening = !isCurrentlyOpen;
  collapseState[id] = opening;
  body.dataset.open = opening ? 'true' : 'false';

  // If opening an athlete section, mount their chart after the transition
  if (opening && id.startsWith('athlete-')) {
    const uid = id.replace('athlete-', '');
    const u = users.find(x => x.id === uid);
    if (u && u.entries.length > 1) {
      setTimeout(() => {
        const ctx = document.getElementById('chart-' + uid);
        if (ctx) { const ch = Chart.getChart(ctx); if (ch) ch.destroy(); }
        renderAthleteChart(u);
        mountVolatilityChart(u);
      }, 380); // after transition completes
    }
  }

  if (opening) {
    // OPEN: unhide, then animate from 0 → scrollHeight
    body.style.overflow  = 'hidden';
    body.style.maxHeight = '0px';
    body.style.opacity   = '0';
    body.style.pointerEvents = '';
    if (arrow) arrow.classList.add('open');
    // Force layout, then start transition
    void body.offsetHeight;
    body.style.transition = 'max-height 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease';
    body.style.maxHeight  = body.scrollHeight + 'px';
    body.style.opacity    = '1';
    // Once done, free the height so dynamic content can grow
    body.addEventListener('transitionend', function onDone(e) {
      if (e.propertyName !== 'max-height') return;
      body.removeEventListener('transitionend', onDone);
      if (body.dataset.open === 'true') body.style.maxHeight = 'none';
    });
  } else {
    // CLOSE: pin current height, then animate to 0
    body.style.transition = 'none'; // disable transition temporarily to set start value
    body.style.maxHeight  = body.scrollHeight + 'px';
    body.style.opacity    = '1';
    void body.offsetHeight; // force layout
    body.style.transition = 'max-height 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease';
    body.style.maxHeight  = '0px';
    body.style.opacity    = '0';
    body.style.pointerEvents = 'none';
    if (arrow) arrow.classList.remove('open');
  }
};

function collapseSection(id, title, contentHtml, defaultOpen=true) {
  if (collapseState[id] === undefined) collapseState[id] = defaultOpen;
  const isOpen = collapseState[id];
  const heightStyle  = isOpen ? 'max-height:none;'  : 'max-height:0px;';
  const opacityStyle = isOpen ? 'opacity:1;'         : 'opacity:0;';
  const ptrStyle     = isOpen ? ''                   : 'pointer-events:none;';
  return `<div style="margin-bottom:16px">
    <div class="collapse-header card-title" onclick="window.toggleCollapse('${id}')"
         style="cursor:pointer;user-select:none;margin-bottom:${isOpen ? '12px' : '0'}">
      <span id="ca-${id}" class="collapse-arrow ${isOpen ? 'open' : ''}">▶</span>
      ${title}
    </div>
    <div id="cb-${id}"
         data-open="${isOpen ? 'true' : 'false'}"
         style="overflow:hidden;${heightStyle}${opacityStyle}${ptrStyle}">

  </div>`;
}

function getAllTimeLow(u) {
  if (!u.entries || u.entries.length === 0) return null;
  const sorted = [...u.entries].sort((a,b) => a.weight - b.weight);
  const atl = sorted[0];
  // Check if current weight is near ATL (within 2 lbs)
  const tw = getTrueWeightNow(u);
  const curW = u.entries.sort ? [...u.entries].sort((a,b)=>b.date.localeCompare(a.date))[0].weight : null;
  const isAtATL = curW !== null && Math.abs(curW - atl.weight) <= 2.0;
  const isNewATL = curW !== null && curW < atl.weight;
  return { weight: atl.weight, date: atl.date, isAtATL, isNewATL, current: curW };
}

// ── STREAK TRACKER ────────────────────────────────────────
function calcStreak(u) {
  if (!u.entries || u.entries.length === 0) return { current: 0, longest: 0, lastLog: null };
  const dates = [...new Set(u.entries.map(e => e.date))].sort();
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 864e5).toISOString().split('T')[0];

  // Current streak: consecutive weeks with at least 1 entry (7-day windows)
  // We use a simpler day-gap method: streak breaks if gap > 8 days between any two entries
  let current = 1, longest = 1, streak = 1;
  for (let i = dates.length - 1; i > 0; i--) {
    const gap = (new Date(dates[i]) - new Date(dates[i-1])) / 864e5;
    if (gap <= 8) { streak++; longest = Math.max(longest, streak); }
    else { if (i === dates.length - 1) current = 1; streak = 1; }
  }
  // If last entry was more than 8 days ago, current streak is 0
  const daysSinceLast = (new Date(today) - new Date(dates[dates.length-1])) / 864e5;
  current = daysSinceLast <= 8 ? Math.max(current, streak) : 0;
  longest = Math.max(longest, streak);

  const milestones = [7,14,30,60,90,180,365];
  const nextMilestone = milestones.find(m => m > current) ?? null;
  return { current, longest, lastLog: dates[dates.length-1], nextMilestone, daysSinceLast: Math.floor(daysSinceLast) };
}

function renderStreakWidget(u) {
  const s = calcStreak(u);
  if (s.current === 0 && s.longest === 0) return '';

// ── BODY RECOMPOSITION DETECTOR ───────────────────────────
function detectRecomp(u) {
  if (!u.bodyFat || !u.entries || u.entries.length < 4) return null;
  // Need at least 2 BF% readings saved as entries with bf property, OR
  // detect recomp by: weight stable (< 2 lbs change) while FFMI improving
  // Since we only store one BF% on the profile (not historical), we detect via
  // weight stability + entries logged (proxy for consistent training)
  const sorted = [...u.entries].sort((a,b) => a.date.localeCompare(b.date));
  const recent = sorted.slice(-8);
  if (recent.length < 4) return null;
  const days = (new Date(recent[recent.length-1].date) - new Date(recent[0].date)) / 864e5;
  if (days < 21) return null;
  const weightChange = Math.abs(recent[recent.length-1].weight - recent[0].weight);
  const twNow = getTrueWeightNow(u);
  const twEarly = calcTrueWeight(recent.slice(0,3));
  const twEarlyVal = twEarly.length ? twEarly[twEarly.length-1].weight : recent[0].weight;
  const twChange = twNow ? Math.abs(twNow - twEarlyVal) : weightChange;
  // Recomp signal: true weight stable (<2 lbs) over 21+ days with consistent entries
  if (twChange < 2.0 && days >= 21 && recent.length >= 4) {
    return { days: Math.round(days), twChange: twChange.toFixed(1), entries: recent.length };
  }
  return null;
}

function renderRecompBadge(u) {
  const r = detectRecomp(u);
  if (!r) return '';
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(29,233,182,0.07);border:1px solid rgba(29,233,182,0.2);border-radius:8px;margin-bottom:16px">

    </div>
  </div>`;
}

// ── TREND CONFIDENCE SCORE ────────────────────────────────
function calcTrendConfidence(u) {
  if (!u.entries || u.entries.length < 5) return null;
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 5) return null;
  const sorted = [...tw].sort((a,b) => a.date.localeCompare(b.date));
  // Compute week-over-week deltas
  const deltas = [];
  for (let i = 1; i < sorted.length; i++) {
    const d = (new Date(sorted[i].date) - new Date(sorted[i-1].date)) / 864e5;
    if (d > 0 && d <= 10) deltas.push((sorted[i].weight - sorted[i-1].weight) / (d/7));
  }
  if (deltas.length < 3) return null;
  const mean = deltas.reduce((s,v) => s+v, 0) / deltas.length;
  const variance = deltas.reduce((s,v) => s + (v-mean)**2, 0) / deltas.length;
  const stdDev = Math.sqrt(variance);
  // Coefficient of variation — lower = more consistent = higher confidence
  const cv = mean !== 0 ? Math.abs(stdDev / mean) : 1;
  // Confidence: 0–100, higher = more reliable prediction
  const confidence = Math.round(Math.min(100, Math.max(0, (1 - Math.min(cv, 1)) * 100)));
  const entryBonus = Math.min(20, (u.entries.length - 5) * 2); // up to +20 for more data
  const finalScore = Math.min(100, confidence + entryBonus);
  let label, color;
  if (finalScore >= 75) { label = 'High confidence'; color = '#69ff47'; }
  else if (finalScore >= 50) { label = 'Moderate'; color = '#ffe040'; }
  else if (finalScore >= 25) { label = 'Low'; color = '#ff6b2b'; }
  else { label = 'Very low'; color = '#ff4d8d'; }
  return { score: finalScore, label, color, stdDev: stdDev.toFixed(2), entries: u.entries.length };
}

function renderTrendConfidence(u) {
  const c = calcTrendConfidence(u);
  if (!c) return '';
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-bottom:12px">

// ── PLATEAU PROBABILITY ───────────────────────────────────────
function renderPlateauProbability(u) {
  if (u.entries.length < 4) return '';
  const tw = calcTrueWeight(u.entries);
  if (tw.length < 4) return '';

  // ── Core plateau check: is TODAY's true weight within ±0.5 lbs of 1.5 weeks ago? ──
  const LOOKBACK   = 10.5; // days (1.5 weeks)
  const THRESHOLD  = 0.5;  // lbs
  const sorted = [...tw].sort((a,b) => a.date.localeCompare(b.date));
  const todayTW  = sorted[sorted.length - 1];
  const todayMs  = new Date(todayTW.date).getTime();
  // Find the true-weight point closest to 1.5 weeks ago
  const targetMs = todayMs - LOOKBACK * 864e5;
  const refPoint = sorted.reduce((best, p) => {
    const d = Math.abs(new Date(p.date).getTime() - targetMs);
    return d < Math.abs(new Date(best.date).getTime() - targetMs) ? p : best;
  });
  const refDays  = (todayMs - new Date(refPoint.date).getTime()) / 864e5;
  const twDelta  = Math.abs(todayTW.weight - refPoint.weight);
  // Only call it a plateau if the reference point is at least 7 days back
  const isDefinedPlateau = refDays >= 7 && twDelta <= THRESHOLD;

  // ── Rate-based probability gauge (rolling recent rate) ──────────────────
  const recent = sorted.slice(-14);
  const deltas = [];
  for (let i = 1; i < recent.length; i++) {
    const dayGap = (new Date(recent[i].date) - new Date(recent[i-1].date)) / 864e5;
    if (dayGap > 0) deltas.push((recent[i].weight - recent[i-1].weight) / dayGap);
  }
  if (!deltas.length) return '';
  const mean     = deltas.reduce((s,v)=>s+v,0) / deltas.length;
  const variance = deltas.reduce((s,v)=>s+(v-mean)**2,0) / deltas.length;
  const stdDev   = Math.sqrt(variance);
  const absRate  = Math.abs(mean * 7); // lbs/wk
  // Sigmoid: 0 lbs/wk → 90%, 0.5 lbs/wk → 50%, 1 lbs/wk → 10%
  const ratePct  = Math.round(90 / (1 + Math.exp(8 * (absRate - 0.4))));
  const platProb = isDefinedPlateau ? Math.max(ratePct, 88) : ratePct;

  const col   = isDefinedPlateau ? '#ff4d8d' : platProb >= 70 ? '#ff4d8d' : platProb >= 40 ? '#ffe040' : '#69ff47';
  const label = isDefinedPlateau ? '⚠️ True Plateau' : platProb >= 70 ? 'High risk' : platProb >= 40 ? 'Moderate' : 'On track';
  const advice = isDefinedPlateau
    ? 'True weight within ±0.5 lbs of 1.5 weeks ago — confirmed plateau. Consider a refeed, diet break, or ↑NEAT.'
    : platProb >= 70 ? 'Progress slowing — consider refeed or diet break.'
    : platProb >= 40 ? 'Watch the next 2 weeks closely.'
    : 'Weight moving consistently. Keep going.';
  const badge = isDefinedPlateau
    ? `<div style="font-size:10px;color:#ff4d8d;background:rgba(255,77,141,0.12);border:1px solid rgba(255,77,141,0.3);border-radius:4px;padding:4px 10px;margin-bottom:10px;display:inline-block">
        ⚠ Confirmed · today ${todayTW.weight} lbs vs ${Math.round(refDays)}d ago ${refPoint.weight} lbs · Δ ${twDelta.toFixed(2)} lbs
       </div>` : '';
  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="card-title-icon">📉</span>Plateau Probability</div>
    ${badge}
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div style="text-align:center;min-width:80px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:56px;color:${col};line-height:1">${platProb}%</div>
        <div style="font-size:10px;color:${col};letter-spacing:.1em;text-transform:uppercase">${label}</div>
      </div>
      <div style="flex:1;min-width:160px">
        <div style="height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-bottom:8px">
          <div style="height:100%;width:${Math.min(platProb,100)}%;background:${col};border-radius:4px"></div>
        </div>
        <div style="font-size:11px;color:#555">${advice}</div>
        <div style="font-size:10px;color:#333;margin-top:6px">
          Today TW: <strong style="color:${col}">${todayTW.weight} lbs</strong> · 
          ${Math.round(refDays)}d ago: ${refPoint.weight} lbs · 
          rate ${(mean*7)>=0?'+':''}${(mean*7).toFixed(2)} lbs/wk
        </div>
      </div>
    </div>
  </div>`;
}

function renderVolatilityChart(u) {

  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="card-title-icon">〜</span>Weight Volatility

  </div>`;

function mountVolatilityChart(u) {
  const ctx = document.getElementById('volatility-' + u.id);
  if (!ctx || u.entries.length < 8) return;
  const existing = Chart.getChart(ctx);
  if (existing) existing.destroy();
  const sorted = [...u.entries].sort((a,b) => a.date.localeCompare(b.date));
  const WIN = 7;
  const points = [];
  for (let i = WIN - 1; i < sorted.length; i++) {
    const win = sorted.slice(i - WIN + 1, i + 1).map(e => e.weight);
    const mean = win.reduce((s,v)=>s+v,0) / WIN;
    const sd = Math.sqrt(win.reduce((s,v)=>s+(v-mean)**2,0) / WIN);
    points.push({ date: sorted[i].date, sd: parseFloat(sd.toFixed(2)) });
  }
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: points.map(p => fmtDate(p.date)),
      datasets: [{ label: 'σ lbs', data: points.map(p => p.sd),
        borderColor: u.color, backgroundColor: u.color+'22',
        borderWidth: 2, fill: true, tension: 0.4, pointRadius: 2 }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:9},maxTicksLimit:8} },
        y: { grid:{color:'rgba(255,255,255,0.04)'}, min:0, ticks:{color:'#555',font:{family:'DM Mono',size:9},callback:v=>v+' lbs'} }
      },
      responsive: true, maintainAspectRatio: true,
    }
  });
}

function mountOverlayChart() {
  const withData = users.filter(u => u.entries.length >= 2);
  const ctx = document.getElementById('overlayChart');
  if (!ctx || !withData.length) return;
  const allDates = [...new Set(withData.flatMap(u => u.entries.map(e => e.date)))].sort();
  const isNorm = overlayMode === 'normalized';
  const datasets = withData.map(u2 => {
    const sorted = [...u2.entries].sort((a,b) => a.date.localeCompare(b.date));
    const startW = sorted[0].weight;
    const byDate = {}; sorted.forEach(e => { byDate[e.date] = e.weight; });
    const data = allDates.map(d => {
      if (byDate[d] === undefined) return null;
      return isNorm
        ? parseFloat(((byDate[d] - startW) / startW * 100).toFixed(2))
        : byDate[d];
    });
    return {
      label: u2.name,
      data,
      borderColor: u2.color, backgroundColor: u2.color + '15', borderWidth: 2,
      pointRadius: 3, tension: 0.3, spanGaps: true, fill: false,
    };
  });
  const yCallback = isNorm
    ? v => (v > 0 ? '+' : '') + v + '%'
    : v => v + ' lbs';
  const tooltipLabel = isNorm
    ? ctx => `${ctx.dataset.label}: ${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y}%`
    : ctx => `${ctx.dataset.label}: ${ctx.parsed.y} lbs`;
  new Chart(ctx, {
    type: 'line',
    data: { labels: allDates.map(d => fmtDate(d)), datasets },
    options: {
      plugins: {
        legend: { labels: { color: '#777', font: { family: 'DM Mono', size: 10 }, boxWidth: 20 } },
        tooltip: { callbacks: { label: tooltipLabel } }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#555', font: { family: 'DM Mono', size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#555', font: { family: 'DM Mono', size: 10 }, callback: yCallback } }
      },
      responsive: true, maintainAspectRatio: true,
    }
  });
}

// ── PASTE PARSER ──────────────────────────────────────────────
function parseWorkoutPaste(text) {
  // Split into session blocks by Day headers
  const lines = text.split('\n');
  const sessions = [];
  let currentSession = null;
  let currentExercise = null;

  const dayRe    = /^Day\s+([\d.]+)\s*[—–-]+?\s*(.+)/i;
  const setLineRe = /^([\d]+)[x×]([\d]+)/i;
  const weightRe  = /\(([^)]+)\)/;
  const rpeRe     = /RPE\s*([\d.]+)/i;
  const repsRe    = /(\d+)[x×](\d+)/i;
  const setsOnlyRe = /^(\d+)\s+sets?\b/i;
  const dividerRe  = /^[.—\-–=]{4,}/;

  function flushExercise() {
    if (currentExercise && currentSession) {
      if (currentExercise.sets.length > 0 || currentExercise.name) {
        currentSession.exercises.push(currentExercise);
      }
    }
    currentExercise = null;
  }

  function flushSession() {
    flushExercise();
    if (currentSession && currentSession.exercises.length > 0) {
      sessions.push(currentSession);
    }
    currentSession = null;
  }

  for (let raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (dividerRe.test(line)) { flushSession(); continue; }

    // New day/session header
    const dayMatch = line.match(dayRe);
    if (dayMatch) {
      flushSession();
      currentSession = {
        id: genId(),
        userId: activeUserId,
        date: new Date().toISOString().split('T')[0],
        label: dayMatch[2].trim(),
        cycle: dayMatch[1].trim(),
        exercises: [],
        notes: ''
      };
      currentExercise = null;
      continue;
    }

    if (!currentSession) continue;

    // Continuation set line (starts with spaces/tabs then set notation)
    const isContinuation = /^\s{2,}/.test(raw) || /^\t/.test(raw);
    const repsMatch = line.match(repsRe);
    const weightMatch = line.match(weightRe);
    const rpeMatch = line.match(rpeRe);

    if (isContinuation && currentExercise && repsMatch) {
      // Additional set group for same exercise
      const sets = buildSets(repsMatch[1], repsMatch[2], weightMatch, rpeMatch);
      currentExercise.sets.push(...sets);
      continue;
    }

    // "3 sets" only (bodyweight/unweighted)
    const setsOnly = line.match(setsOnlyRe);
    if (setsOnly && !repsMatch && line.length < 60) {
      flushExercise();
      const name = line.replace(setsOnlyRe,'').trim();
      currentExercise = {
        id: genId(),
        name: name || line,
        sets: Array.from({length:parseInt(setsOnly[1])}, () => ({ id:genId(), reps:null, weight:null, rpe:null, note:'' }))
      };
      continue;
    }

    // Label-only lines (superset labels, "Rest", etc.)
    if (!repsMatch && !weightMatch && line.length < 50) {
      // Could be exercise with no weight/reps yet, or a note
      if (/rest/i.test(line)) continue;
      if (/superset/i.test(line)) {
        if (currentExercise) currentExercise.isSupersetWith = line; continue;
      }
      // Treat as standalone exercise name with no sets
      flushExercise();
      currentExercise = { id: genId(), name: line, sets: [] };
      continue;
    }

    // Normal exercise line
    if (repsMatch) {
      flushExercise();
      // Extract exercise name: everything before the reps/RPE/weight
      let name = line
        .replace(repsRe, '').replace(rpeRe, '').replace(weightRe, '')
        .replace(/RPE/gi,'').replace(/\d+(\.\d+)?/g,'').replace(/[x×]/g,'')
        .replace(/\s+/g,' ').trim();
      if (!name) name = line.split(/\d/)[0].trim();
      const sets = buildSets(repsMatch[1], repsMatch[2], weightMatch, rpeMatch);
      currentExercise = { id: genId(), name: name || line, sets };
      continue;
    }
  }
  flushSession();
  return sessions;
}

function buildSets(setsN, repsN, weightMatch, rpeMatch) {
  const n = parseInt(setsN), r = parseInt(repsN);
  const rawW = weightMatch ? weightMatch[1].trim() : null;
  const numW = rawW ? parseFloat(rawW) : null;
  const weightVal = (!isNaN(numW) && numW > 0) ? numW : null;
  const weightNote = (rawW && isNaN(parseFloat(rawW))) ? rawW : (weightVal ? null : rawW);
  const rpe = rpeMatch ? parseFloat(rpeMatch[1]) : null;
  return Array.from({length: n}, () => ({
    id: genId(), reps: r,
    weight: weightVal, weightNote: weightNote || null,
    rpe: rpe, note: ''
  }));
}

// ── E1RM PER SET ──────────────────────────────────────────────
function setE1RM(set) {
  if (!set.weight || !set.reps || set.reps < 1) return null;
  if (set.reps === 1) return set.weight;
  // RPE-adjusted if available: higher RPE = closer to true max
  const base = set.weight * (1 + set.reps / 30);
  if (set.rpe) {
    const rpeAdj = 1 + (set.rpe - 6) * 0.03; // ~3% per RPE point above 6
    return Math.round(base * rpeAdj);
  }
  return Math.round(base);
}

// ── GET SESSIONS FOR USER ─────────────────────────────────────
function getUserSessions(userId) {
  return (trainingSessions[userId] || []).sort((a,b) => b.date.localeCompare(a.date));
}

// ── EXERCISE TREND DATA ───────────────────────────────────────
function getExerciseTrend(userId, exerciseName, rangeWeeks) {
  let sessions = getUserSessions(userId).filter(s => s.type !== 'rest');
  if (exCustomStart && exCustomEnd) {
    sessions = sessions.filter(s => s.date >= exCustomStart && s.date <= exCustomEnd);
  } else if (rangeWeeks && rangeWeeks > 0) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - rangeWeeks * 7);
    const cutoffStr = cutoff.toISOString().split('T')[0];
    sessions = sessions.filter(s => s.date >= cutoffStr);
  }
  if (exBlockFilter) sessions = sessions.filter(s => (s.block||'') === exBlockFilter);
  const results = [];
  for (const s of sessions) {
    for (const ex of (s.exercises||[])) {
      if (!ex || !ex.name) continue;
      if (ex.name.toLowerCase().trim() === exerciseName.toLowerCase().trim()) {
        const weightedSets = (ex.sets||[]).filter(st => st.weight);
        if (!weightedSets.length) continue;
        const topE1RM = Math.max(...weightedSets.map(st => setE1RM(st) || 0));
        const topWeight = Math.max(...weightedSets.map(st => st.weight || 0));
        const avgRPE = weightedSets.filter(st=>st.rpe).length
          ? (weightedSets.reduce((s,st) => s+(st.rpe||0),0) / weightedSets.filter(st=>st.rpe).length).toFixed(1)
          : null;
        const totalVol = weightedSets.reduce((s,st) => s+(st.weight||0)*(st.reps||0), 0);
        results.push({ date: s.date, label: s.label, block: s.block||'', cycle: s.cycle||'', topE1RM, topWeight, avgRPE, totalVol, sets: weightedSets });
      }
    }
  }
  return results.sort((a,b) => a.date.localeCompare(b.date));
}

// ── ALL EXERCISES FOR USER ────────────────────────────────────
function getAllExercises(userId) {
  const sessions = getUserSessions(userId);
  const seen = new Set();
  sessions.forEach(s => (s.exercises||[]).forEach(ex => { if (ex && ex.name) seen.add(ex.name); }));
  return [...seen].sort();
}

// ── WEEKLY VOLUME PER MUSCLE ──────────────────────────────────
function getWeeklyVolume(userId, blockFilter, customStart, customEnd) {
  let sessions = getUserSessions(userId).filter(s => s.type !== 'rest');
  if (customStart && customEnd) {
    sessions = sessions.filter(s => s.date >= customStart && s.date <= customEnd);
  }
  if (blockFilter) sessions = sessions.filter(s => (s.block||'') === blockFilter);
  const today = new Date();
  const weeks = {};
  sessions.forEach(s => {
    const d = new Date(s.date + 'T00:00:00');
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const wk = weekStart.toISOString().split('T')[0];
    if (!weeks[wk]) weeks[wk] = {};
    (s.exercises||[]).forEach(ex => {
      if (!ex || !ex.name) return;
      const muscles = getMuscles(ex.name);
      const weightedSets = (ex.sets||[]).filter(st => st.reps);
      muscles.forEach(m => {
        weeks[wk][m] = (weeks[wk][m] || 0) + weightedSets.length;
      });
    });
  });
  return weeks;
}

// ── CUSTOM BLOCK PERSISTENCE ─────────────────────────────────
const PRESET_BLOCKS = ['Accumulation','Intensification','Peaking','Deload','Test Week','Off Season'];
// {name, color} objects for custom blocks
function getCustomBlocks(userId) {
  try { return JSON.parse(localStorage.getItem('prophecy_custom_blocks_' + userId) || '[]'); } catch(e) { return []; }
}
function addCustomBlock(userId, name, color) {
  if (!name || PRESET_BLOCKS.includes(name)) return;
  const existing = getCustomBlocks(userId);
  if (existing.find(b => b.name === name)) return;
  const entry = { name, color: color || '#a855f7' };
  try { localStorage.setItem('prophecy_custom_blocks_' + userId, JSON.stringify([...existing, entry])); } catch(e) {}
}
function getCustomBlockColor(userId, name) {
  const blocks = getCustomBlocks(userId);
  const found = blocks.find(b => b.name === name);
  return found?.color || '#a855f7';
}
function setCustomBlockColor(userId, name, color) {
  const existing = getCustomBlocks(userId);
  const idx = existing.findIndex(b => b.name === name);
  if (idx >= 0) { existing[idx].color = color; }
  else { existing.push({ name, color }); }
  try { localStorage.setItem('prophecy_custom_blocks_' + userId, JSON.stringify(existing)); } catch(e) {}
}
function buildBlockOptions(userId, selected) {
  const presetHTML = PRESET_BLOCKS.map(b =>
    `<option value="${b}" ${selected===b?'selected':''}>${b}</option>`
  ).join('');
  const customs = getCustomBlocks(userId);
  const customHTML = customs.length
    ? customs.map(b => `<option value="${b.name}" ${selected===b.name?'selected':''}>${b.name}</option>`).join('')
    : '';
  const customSep = customs.length ? `<option disabled>── Custom ──</option>` : '';
  return `<option value="" ${!selected?'selected':''}>— None —</option>
    ${presetHTML}
    ${customSep}${customHTML}
    <option value="__custom__">+ Add custom block...</option>`;
}
window.handleBlockSelect = function(selectEl, userId, onSave) {
  if (selectEl.value !== '__custom__') { onSave(selectEl.value); return; }
  const name = prompt('Enter custom block name:');
  if (!name || !name.trim()) { selectEl.value = ''; return; }
  const trimmed = name.trim();
  const color = prompt('Block color (hex, e.g. #ff6b2b):', '#a855f7') || '#a855f7';
  addCustomBlock(userId, trimmed, color);
  onSave(trimmed);
  selectEl.innerHTML = buildBlockOptions(userId, trimmed);
};
// Update blockColor to check custom block colors
window.getBlockColorForUser = function(userId, blockName) {
  if (!blockName) return '#555';
  if (BLOCK_COLORS[blockName]) return BLOCK_COLORS[blockName];
  return getCustomBlockColor(userId, blockName);
};

function renderSessionLog(u, sessions) {
  const restMetricsHTML = renderRestMetrics(u, sessions);
  if (!sessions.length) return `<div class="empty" style="padding:40px">
    <div class="empty-icon">📋</div>
    <p>No sessions yet. Import your logs or add one manually.</p>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <button class="btn" style="width:auto;padding:10px 24px" onclick="window.setTrainingTab('import')">⬇️ Import Logs</button>
      <button class="btn btn-ghost" style="width:auto;padding:10px 24px" onclick="window.showAddSession('${u.id}')">+ Manual Session</button>
    </div>
  </div>`;

  // Group by block, then by cycle within block
  const byBlock = {};
  sessions.forEach(s => {
    const b = s.block || '';
    if (!byBlock[b]) byBlock[b] = {};
    const c = s.cycle || 'Misc';
    if (!byBlock[b][c]) byBlock[b][c] = [];
    byBlock[b][c].push(s);
  });

  // Defined phase order
  const BLOCK_ORDER = ['Peaking','Test Week','Intensification','Accumulation','Deload','Off Season',''];
  const blockKeys = Object.keys(byBlock).sort((a,b) => {
    const ia = BLOCK_ORDER.indexOf(a) === -1 ? 99 : BLOCK_ORDER.indexOf(a);
    const ib = BLOCK_ORDER.indexOf(b) === -1 ? 99 : BLOCK_ORDER.indexOf(b);
    return ia - ib;
  });

  return restMetricsHTML + blockKeys.map(block => {
    const byCycle = byBlock[block];
    const col = blockColor(block);
    const blockLabel = block || 'Unassigned';
    const cycleKeys = Object.keys(byCycle).sort((a,b) => {
      const [am,ad='0'] = a.split('.').map(Number);
      const [bm,bd='0'] = b.split('.').map(Number);
      return bm - am || bd - ad;
    });
    const totalSessions = cycleKeys.reduce((s,c) => s + byCycle[c].filter(x=>x.type!=='rest').length, 0);
    const totalRestDays = cycleKeys.reduce((s,c) => s + byCycle[c].filter(x=>x.type==='rest').length, 0);
    const blockId = 'block-' + u.id + '-' + block.replace(/\s+/g,'-');
    const inner = cycleKeys.map(cycle => {
      const cs = byCycle[cycle].sort((a,b) => {
        const [,ad='0'] = (a.cycle||'0').split('.');
        const [,bd='0'] = (b.cycle||'0').split('.');
        return Number(ad) - Number(bd);
      });
      return `<div style="margin-bottom:18px">
        <div style="font-size:11px;color:#333;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;padding-left:4px">
          <span>Cycle ${cycle}</span>
          <span style="flex:1;height:1px;background:rgba(255,255,255,0.04)"></span>
          <span style="color:#2a2a4a">${cs.length} session${cs.length!==1?'s':''}</span>
        </div>
        ${cs.map(s => s.type==='rest' ? renderRestDayRow(u,s) : renderSessionCard(u, s)).join('')}
      </div>`;
    }).join('');
    // Make each block a collapsible section
    const headerHTML = `<span style="color:${col};font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.12em">${blockLabel}</span>
      <span style="font-size:10px;color:${col}55;margin-left:8px;background:${col}18;padding:2px 8px;border-radius:4px">${totalSessions} sessions${totalRestDays?" · "+totalRestDays+" rest":""}</span>`;
    return collapseSection(blockId, headerHTML, `<div style="padding-top:4px">${inner}</div>`, true);
  }).join('');
}

// ── REST DAY METRICS WIDGET ──────────────────────────────────
function renderRestMetrics(u, sessions) {
  const restDays = sessions.filter(s => s.type === 'rest').sort((a,b) => b.date.localeCompare(a.date));
  const trainDays = sessions.filter(s => s.type !== 'rest').sort((a,b) => b.date.localeCompare(a.date));
  if (!restDays.length || !trainDays.length) return '';

  // Days since last rest
  const lastRest = restDays[0].date;
  const daysSince = Math.floor((new Date() - new Date(lastRest)) / 864e5);

  // Consecutive training days (streak without rest)
  let trainStreak = 0;
  const allSorted = sessions.sort((a,b) => b.date.localeCompare(a.date));
  for (const s of allSorted) {
    if (s.type === 'rest') break;
    trainStreak++;
  }

  // Weekly rest ratio (last 4 weeks)
  const fourWeeksAgo = new Date(); fourWeeksAgo.setDate(fourWeeksAgo.getDate() - 28);
  const recentAll = sessions.filter(s => new Date(s.date) >= fourWeeksAgo);
  const recentRest = recentAll.filter(s => s.type === 'rest').length;
  const recentTrain = recentAll.filter(s => s.type !== 'rest').length;
  const restRatio = recentAll.length ? Math.round((recentRest / recentAll.length) * 100) : 0;

  // Weight on rest day vs training day correlation
  let weightNote = '';
  if (u.entries && u.entries.length > 3) {
    const restWeights = restDays.map(r => {
      const match = u.entries.find(e => e.date === r.date) ||
        u.entries.reduce((best, e) => Math.abs(new Date(e.date)-new Date(r.date)) < Math.abs(new Date(best.date)-new Date(r.date)) ? e : best);
      return match && Math.abs(new Date(match.date)-new Date(r.date))/864e5 < 2 ? match.weight : null;
    }).filter(Boolean);
    const trainWeights = trainDays.slice(0,restWeights.length).map(t => {
      const match = u.entries.find(e => e.date === t.date) ||
        u.entries.reduce((best, e) => Math.abs(new Date(e.date)-new Date(t.date)) < Math.abs(new Date(best.date)-new Date(t.date)) ? e : best);
      return match && Math.abs(new Date(match.date)-new Date(t.date))/864e5 < 2 ? match.weight : null;
    }).filter(Boolean);
    if (restWeights.length >= 2 && trainWeights.length >= 2) {
      const avgRest = restWeights.reduce((s,v)=>s+v,0)/restWeights.length;
      const avgTrain = trainWeights.reduce((s,v)=>s+v,0)/trainWeights.length;
      const diff = (avgRest - avgTrain).toFixed(1);
      weightNote = parseFloat(diff) > 0.3
        ? `Avg weight ${Math.abs(diff)} lbs higher on rest days (water retention normal)`
        : parseFloat(diff) < -0.3
        ? `Avg weight ${Math.abs(diff)} lbs lower on rest days`
        : 'Weight similar on rest vs training days';
    }
  }

  const streakCol = trainStreak >= 7 ? '#ff4d8d' : trainStreak >= 4 ? '#ffe040' : '#69ff47';
  const sinceCol  = daysSince >= 7 ? '#ff4d8d' : daysSince >= 4 ? '#ffe040' : '#69ff47';

  return `<div class="card" style="margin-bottom:12px;border-color:rgba(105,255,71,0.15)">
    <div class="card-title"><span class="card-title-icon">🛌</span>Rest Day Stats</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px">
      <div style="text-align:center;min-width:70px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:${sinceCol};line-height:1">${daysSince}</div>
        <div style="font-size:10px;color:#555;letter-spacing:.08em">days since rest</div>
      </div>
      <div style="text-align:center;min-width:70px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:${streakCol};line-height:1">${trainStreak}</div>
        <div style="font-size:10px;color:#555;letter-spacing:.08em">training streak</div>
      </div>
      <div style="text-align:center;min-width:70px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:#00e5ff;line-height:1">${restRatio}%</div>
        <div style="font-size:10px;color:#555;letter-spacing:.08em">rest ratio (4wk)</div>
      </div>
      <div style="flex:1;min-width:140px;display:flex;align-items:center">
        <div style="font-size:11px;color:#444;font-style:italic">${weightNote || (restDays.length + ' rest days logged')}</div>
      </div>
    </div>
    ${trainStreak >= 6 ? '<div style="font-size:11px;color:#ff4d8d;background:rgba(255,77,141,0.08);padding:6px 10px;border-radius:4px">⚠ High training streak — consider a rest day soon</div>' : ''}
  </div>`;
}

function renderSessionDetail(u, s) {

    return `<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

        ${getMuscles(ex.name).length ? `<span style="font-size:9px;color:#444">${getMuscles(ex.name).join(', ')}</span>` : ''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${ex.sets.map((st,i) => {
          const e1 = setE1RM(st);

// ── EXERCISE TRENDS TAB ───────────────────────────────────────
function renderExerciseTrends(u, sessions) {
  const allEx = getAllExercises(u.id);
  if (!allEx.length) return `<div style="color:#444;text-align:center;padding:40px">No exercises logged yet.</div>`;

  // Map exercise names to main LIFTS for PR annotation
  const LIFT_NAME_MAP = {
    'squat':['squat','back squat'],'bench':['bench','bench press','tempo bench'],
    'deadlift':['deadlift'],'ohp':['ohp','overhead press','btn press','press']
  };
  function getLiftKeyForExercise(name) {
    const n = (name||'').toLowerCase();
    for (const [key, aliases] of Object.entries(LIFT_NAME_MAP)) {
      if (aliases.some(a => n.includes(a))) return key;
    }
    return null;
  }

  const rangeOptions = [[0,'All'],[4,'4wk'],[8,'8wk'],[12,'12wk'],[24,'6mo'],[52,'1yr']];
  const allBlocks = [...new Set(sessions.filter(s=>s.type!=='rest').map(s=>s.block||'').filter(Boolean))];

  const controlBar = `<div class="card" style="margin-bottom:16px;padding:14px 20px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      <div style="font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase">Exercise</div>
      <select id="exercise-select" onchange="window.selectExercise(this.value)"
        style="flex:2;min-width:160px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:12px;outline:none">
        <option value="">— pick an exercise —</option>
        ${allEx.map(n => `<option value="${n}" ${n===selectedExercise?'selected':''}>${n}</option>`).join('')}
      </select>
      ${allBlocks.length > 1 ? `<div style="font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase">Block</div>
      <select onchange="window.setExBlock(this.value)"
        style="min-width:120px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:12px;outline:none">
        <option value="" ${!exBlockFilter?'selected':''}>All blocks</option>
        ${allBlocks.map(b=>{const bc=blockColor(b);return '<option value="'+b+'" '+(exBlockFilter===b?'selected':'')+'>'+b+'</option>';}).join('')}
      </select>` : ''}
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <div style="font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap">Range</div>
      ${rangeOptions.map(([w,l]) => `<button class="chart-mode-btn ${exRangeWeeks===w&&!exCustomStart?'active':''}"
        onclick="window.setExRange(${w})" style="font-size:10px;padding:4px 9px">${l}</button>`).join('')}
      <span style="color:#333;font-size:11px;margin-left:4px">or</span>
      <input type="date" id="ex-custom-start" value="${exCustomStart}"
        style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:11px;outline:none">
      <span style="color:#444;font-size:11px">–</span>
      <input type="date" id="ex-custom-end" value="${exCustomEnd}"
        style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:11px;outline:none">
      <button class="chart-mode-btn ${exCustomStart?'active':''}" onclick="window.setExCustomRange()"
        style="font-size:10px;padding:4px 9px">Apply</button>
      ${exCustomStart?`<button class="chart-mode-btn" onclick="exCustomStart='';exCustomEnd='';window.setExRange(0);" style="font-size:10px;padding:4px 9px">✕ Clear</button>`:''}
    </div>
  </div>`;

  if (!selectedExercise) return controlBar + `<div style="color:#444;text-align:center;padding:30px;font-size:13px">Select an exercise above to see its trend.</div>`;

  const trend = getExerciseTrend(u.id, selectedExercise, exRangeWeeks);
  if (!trend.length) return controlBar + `<div style="color:#444;text-align:center;padding:30px">No data in this range. Try a wider window.</div>`;

  const allE1RMs = trend.map(t => t.topE1RM).filter(Boolean);
  const peakE1RM = allE1RMs.length ? Math.max(...allE1RMs) : 0;
  const latestE1RM = trend[trend.length-1]?.topE1RM || 0;
  const firstE1RM  = trend[0]?.topE1RM || 0;
  const e1rmDelta  = latestE1RM - firstE1RM;
  const muscles = getMuscles(selectedExercise);
  const allVols = trend.map(t => t.totalVol).filter(Boolean);
  const peakVol = allVols.length ? Math.max(...allVols) : 0;
  const liftKey = getLiftKeyForExercise(selectedExercise);
  const prEntry = liftKey ? getLiftPR(u, liftKey) : null;
  const trend7 = trend.slice(-3); // last 3 sessions momentum
  const momentum = trend7.length >= 2 ? (trend7[trend7.length-1].topE1RM||0) - (trend7[0].topE1RM||0) : null;

  return controlBar + `
    <!-- HEADLINE STATS -->
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card" style="background:rgba(0,229,255,0.07);border:1px solid rgba(0,229,255,0.18)">
        <div class="stat-label" style="color:rgba(0,229,255,0.7)">Peak e1RM</div>
        <div class="stat-value" style="color:#00e5ff">${peakE1RM}<span class="stat-unit">lbs</span></div>
        ${prEntry ? `<div style="font-size:10px;color:#555;margin-top:4px">Logged PR: ${prEntry.weight} lbs</div>` : ''}
      </div>
      <div class="stat-card" style="background:rgba(105,255,71,0.07);border:1px solid rgba(105,255,71,0.18)">
        <div class="stat-label" style="color:rgba(105,255,71,0.7)">${exRangeWeeks ? 'Range' : 'All-time'} gain</div>
        <div class="stat-value" style="color:${e1rmDelta>=0?'#69ff47':'#ff4d8d'};font-size:28px">${e1rmDelta>=0?'+':''}${e1rmDelta}<span class="stat-unit">lbs</span></div>
      </div>
      <div class="stat-card" style="background:rgba(255,224,64,0.07);border:1px solid rgba(255,224,64,0.18)">
        <div class="stat-label" style="color:rgba(255,224,64,0.7)">Sessions</div>
        <div class="stat-value" style="color:#ffe040">${trend.length}</div>
        ${momentum !== null ? `<div style="font-size:10px;color:${momentum>=0?'#69ff47':'#ff4d8d'};margin-top:4px">${momentum>=0?'↑':'↓'} ${Math.abs(momentum)} last 3</div>` : ''}
      </div>
      <div class="stat-card" style="background:rgba(199,125,255,0.07);border:1px solid rgba(199,125,255,0.18)">
        <div class="stat-label" style="color:rgba(199,125,255,0.7)">Peak Volume</div>
        <div class="stat-value" style="color:#c77dff;font-size:28px">${peakVol>0?Math.round(peakVol/1000):'—'}<span class="stat-unit">${peakVol>0?'k lbs':''}</span></div>
      </div>
    </div>

    ${muscles.length ? `<div style="font-size:11px;color:#555;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="color:#444">Muscles:</span>
      ${muscles.map(m=>`<span style="color:${MUSCLE_COLORS[m]||'#888'};background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:3px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em">${m}</span>`).join('')}
    </div>` : ''}

    <!-- E1RM TREND CHART -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">
        <span class="card-title-icon">📈</span>Estimated 1RM — ${selectedExercise}
        <div style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          ${prEntry ? `<span style="font-size:10px;color:#ffe040;background:rgba(255,224,64,0.08);border:1px solid rgba(255,224,64,0.2);padding:2px 8px;border-radius:3px">🏆 PR ${prEntry.weight} lbs</span>` : ''}
          <span style="font-size:10px;color:#555">RPE-adjusted · dashed = actual top set</span>
        </div>
      </div>
      <canvas id="ex-trend-chart" style="max-height:300px"></canvas>
    </div>

    <!-- VOLUME + RPE COMBO CHART -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">📦</span>Session Volume &amp; Avg RPE</div>
      <canvas id="ex-vol-chart" style="max-height:200px"></canvas>
    </div>

    <!-- SESSION HISTORY TABLE -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">🎯</span>Session History
        <span style="margin-left:auto;font-size:10px;color:#444">${trend.length} sessions · ${exRangeWeeks ? exRangeWeeks+' week window' : 'all time'}</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Date</th><th>Session</th><th>Top Set</th><th>e1RM</th><th>Avg RPE</th><th>Volume</th>
          </tr></thead>
          <tbody>
            ${[...trend].reverse().map(t => {
              const isPeak = t.topE1RM === peakE1RM && peakE1RM > 0;
              const topSet = [...(t.sets||[])].sort((a,b) => (setE1RM(b)||0)-(setE1RM(a)||0))[0];
              const rpeColor = t.avgRPE >= 9 ? '#ff4d8d' : t.avgRPE >= 8 ? '#ff6b2b' : t.avgRPE >= 7 ? '#ffe040' : '#69ff47';
              const bCol = t.block ? blockColor(t.block) : '';
              return `<tr style="${isPeak?'background:rgba(0,229,255,0.06);':t.block?'border-left:2px solid '+blockColor(t.block)+'55;':''}" >
                <td style="color:#777;font-size:11px;white-space:nowrap">${fmtDate(t.date)}${t.block?`<span style="display:block;font-size:9px;color:${blockColor(t.block)};margin-top:1px">${t.block}</span>`:''}</td>
                <td style="font-size:10px;color:#555;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.label||''}</td>
                <td style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text);white-space:nowrap">
                  ${topSet?.weight ? topSet.weight+' × '+(topSet.reps||'?') : topSet?.weightNote || '—'}
                  ${topSet?.rpe ? `<span style="font-size:10px;color:#666"> @${topSet.rpe}</span>` : ''}
                </td>
                <td style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${isPeak?'#00e5ff':'var(--text)'};white-space:nowrap">
                  ${t.topE1RM||'—'} ${isPeak?'<span class="peak-badge">PEAK</span>':''}
                </td>
                <td style="font-size:12px;color:${t.avgRPE?rpeColor:'#444'}">${t.avgRPE||'—'}</td>
                <td style="font-size:11px;color:#555">${t.totalVol ? Math.round(t.totalVol/1000)+'k' : '—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function mountExerciseChart(userId, exerciseName) {
  const trend = getExerciseTrend(userId, exerciseName, exRangeWeeks);
  if (!trend.length) return;
  const u = users.find(x => x.id === userId);
  const color = u?.color || '#00e5ff';

  // Find PR from logged lifts for annotation
  const LIFT_NAME_MAP = {'squat':['squat','back squat'],'bench':['bench','bench press','tempo bench'],'deadlift':['deadlift'],'ohp':['ohp','overhead press','btn press']};
  let prWeight = null;
  for (const [key, aliases] of Object.entries(LIFT_NAME_MAP)) {
    if (aliases.some(a => exerciseName.toLowerCase().includes(a))) {
      const pr = getLiftPR(u, key);
      if (pr) prWeight = pr.weight;
      break;
    }
  }

  const peakE1RM = Math.max(...trend.map(t => t.topE1RM||0));
  const labels = trend.map(t => fmtDate(t.date));

  // RPE → point color: low=green, mid=yellow, high=red, none=grey
  const rpeColor = rpe => rpe >= 9 ? '#ff4d8d' : rpe >= 8 ? '#ff6b2b' : rpe >= 7 ? '#ffe040' : rpe ? '#69ff47' : color+'88';

  // ── e1RM chart ─────────────────────────────────────────────
  const ctx1 = document.getElementById('ex-trend-chart');
  if (ctx1) {
    const ch = Chart.getChart(ctx1); if (ch) ch.destroy();
    const datasets = [{
      label: 'Est. 1RM (RPE-adj)',
      data: trend.map(t => t.topE1RM),
      borderColor: color, backgroundColor: color+'18', borderWidth: 2.5,
      pointRadius: trend.map(t => t.topE1RM === peakE1RM ? 8 : 5),
      pointBackgroundColor: trend.map(t => t.topE1RM === peakE1RM ? '#ffffff' : rpeColor(t.avgRPE)),
      pointBorderColor: trend.map(t => t.topE1RM === peakE1RM ? color : 'transparent'),
      pointBorderWidth: 2,
      fill: true, tension: 0.35,
    }, {
      label: 'Top Working Set',
      data: trend.map(t => t.topWeight),
      borderColor: color+'66', backgroundColor: 'transparent', borderWidth: 1.5,
      borderDash: [6,4], pointRadius: 3, pointBackgroundColor: color+'66',
      fill: false, tension: 0.35,
    }];

    // PR annotation line if available
    if (prWeight) {
      datasets.push({
        label: 'Logged PR',
        data: Array(trend.length).fill(prWeight),
        borderColor: '#ffe040', backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [3,4],
        pointRadius: 0, fill: false,
      });
    }

    new Chart(ctx1, {
      type: 'line',
      data: { labels, datasets },
      options: {
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { labels: { color:'#777', font:{family:'DM Mono',size:10}, boxWidth:16, padding:16 } },
          tooltip: {
            backgroundColor:'rgba(10,10,20,0.95)', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
            titleColor:'#aaa', bodyColor:'#ccc', titleFont:{family:'DM Mono',size:10}, bodyFont:{family:'DM Mono',size:11},
            padding:10,
            callbacks: {
              title: items => fmtDate(trend[items[0].dataIndex]?.date||''),
              afterBody: items => {
                const t = trend[items[0].dataIndex];
                if (!t) return [];
                const lines = [];
                if (t.avgRPE) lines.push(`RPE avg: ${t.avgRPE}`);
                if (t.totalVol) lines.push(`Volume: ${Math.round(t.totalVol/1000)}k lbs`);
                return lines;
              }
            }
          }
        },
        scales: {
          x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, maxRotation:45} },
          y: {
            grid:{color:'rgba(255,255,255,0.06)'}, 
            ticks:{color:'#666',font:{family:'DM Mono',size:10}, callback:v=>v+' lbs'},
            // Pad y axis so PR line has breathing room
            afterDataLimits(scale) { scale.max = Math.max(scale.max, (prWeight||0)*1.02); }
          }
        },
        responsive:true, maintainAspectRatio:true,
      }
    });
  }

  // ── Volume + RPE combo bar chart ───────────────────────────
  const ctx2 = document.getElementById('ex-vol-chart');
  if (ctx2) {
    const ch2 = Chart.getChart(ctx2); if (ch2) ch2.destroy();
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Volume (lbs)',
          data: trend.map(t => t.totalVol||0),
          backgroundColor: trend.map(t => {
            const r = parseFloat(t.avgRPE)||0;
            return r >= 9 ? '#ff4d8d55' : r >= 8 ? '#ff6b2b55' : r >= 7 ? '#ffe04055' : color+'44';
          }),
          borderColor: trend.map(t => {
            const r = parseFloat(t.avgRPE)||0;
            return r >= 9 ? '#ff4d8d' : r >= 8 ? '#ff6b2b' : r >= 7 ? '#ffe040' : color;
          }),
          borderWidth: 1.5, borderRadius: 4,
          yAxisID: 'y',
        }, {
          label: 'Avg RPE',
          data: trend.map(t => parseFloat(t.avgRPE)||null),
          type: 'line',
          borderColor: '#c77dff', backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#c77dff',
          tension: 0.3, fill: false,
          yAxisID: 'y2',
        }]
      },
      options: {
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { labels:{ color:'#777', font:{family:'DM Mono',size:10}, boxWidth:16, padding:14 } },
          tooltip: {
            backgroundColor:'rgba(10,10,20,0.95)', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
            titleColor:'#aaa', bodyColor:'#ccc', titleFont:{family:'DM Mono',size:10}, bodyFont:{family:'DM Mono',size:11},
            callbacks: { label: ctx => ctx.dataset.label+': '+(ctx.dataset.yAxisID==='y2' ? ctx.parsed.y : Math.round((ctx.parsed.y||0)/1000)+'k lbs') }
          }
        },
        scales: {
          x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, maxRotation:45} },
          y: { position:'left', grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555',font:{family:'DM Mono',size:10}, callback:v=>Math.round(v/1000)+'k'} },
          y2: { position:'right', min:5, max:10, grid:{display:false}, ticks:{color:'#c77dff99',font:{family:'DM Mono',size:10}, callback:v=>'RPE '+v} }
        },
        responsive:true, maintainAspectRatio:true,
      }
    });
  }
}

// ── VOLUME TAB ────────────────────────────────────────────────
const MUSCLE_COLORS = {
  'chest':'#ff4d8d','triceps':'#ff6b2b','front delt':'#ffe040',
  'quads':'#69ff47','glutes':'#1de9b6','hamstrings':'#00e5ff',
  'lower back':'#c77dff','lats':'#7b5ea7','upper back':'#4a90d9',
  'side delt':'#ffb347','rear delt':'#ff7eb3','biceps':'#a8e6cf',
  'core':'#f8f8f8','obliques':'#ddd','traps':'#aaa','adductors':'#888',
};

function renderVolumeTab(u) {
  const weeklyVol = getWeeklyVolume(u.id, volBlockFilter||'', volCustomStart, volCustomEnd);
  const allWeeks = Object.keys(weeklyVol).sort();
  if (!allWeeks.length) return `<div style="color:#444;text-align:center;padding:40px">No data yet. Log some sessions first.</div>`;

  // volRangeWeeks is module-level, set by window.setVolRange
  const weeks = allWeeks.slice(-volRangeWeeks);

  // Most recent week with data (may not be current calendar week)
  const latestWeek = weeks[weeks.length-1];
  const thisMuscles = weeklyVol[latestWeek] || {};
  const muscles = [...new Set(Object.values(weeklyVol).flatMap(w => Object.keys(w)))].sort();

  const MRV = { chest:20, triceps:18, front_delt:16, quads:20, glutes:18, hamstrings:20, lower_back:12, lats:20, upper_back:20, side_delt:20, rear_delt:20, biceps:18, core:16 };
  const rangeOptions = [[4,'4 wk'],[8,'8 wk'],[12,'12 wk'],[26,'6 mo'],[52,'1 yr']];
  const allVolBlocks = [...new Set(getUserSessions(u.id).filter(s=>s.type!=='rest').map(s=>s.block||'').filter(Boolean))];

  return `
    <!-- RANGE SELECTOR -->
    <div class="card" style="margin-bottom:16px;padding:12px 16px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase">History window</span>
        ${rangeOptions.map(([w,l]) => `<button class="chart-mode-btn ${volRangeWeeks===w&&!volCustomStart?'active':''}"
          onclick="window.setVolRange(${w})" style="font-size:10px;padding:4px 9px">${l}</button>`).join('')}
        <span style="color:#333;font-size:11px;margin-left:4px">or</span>
        <input type="date" id="vol-custom-start" value="${volCustomStart}"
          style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:11px;outline:none">
        <span style="color:#444;font-size:11px">–</span>
        <input type="date" id="vol-custom-end" value="${volCustomEnd}"
          style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 6px;font-size:11px;outline:none">
        <button class="chart-mode-btn ${volCustomStart?'active':''}" onclick="window.setVolCustomRange()"
          style="font-size:10px;padding:4px 9px">Apply</button>
        ${volCustomStart?`<button class="chart-mode-btn" onclick="volCustomStart='';volCustomEnd='';window.setVolRange(8);" style="font-size:10px;padding:4px 9px">✕</button>`:''}
      </div>
      ${allVolBlocks.length>1?`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase">Block</span>
        <button class="chart-mode-btn ${!volBlockFilter?'active':''}" onclick="window.setVolBlock('')" style="font-size:10px;padding:4px 9px">All</button>
        ${allVolBlocks.map(b=>`<button class="chart-mode-btn ${volBlockFilter===b?'active':''}" onclick="window.setVolBlock('${b}')"
          style="font-size:10px;padding:4px 9px;color:${blockColor(b)};border-color:${blockColor(b)}44">${b}</button>`).join('')}
      </div>`:''}
      <div style="font-size:10px;color:#444;margin-top:6px">Most recent: week of ${fmtDate(latestWeek)}</div>
    </div>

    <!-- LATEST WEEK MUSCLE GRID -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">💪</span>Latest Week — Sets per Muscle Group
        <span style="margin-left:auto;font-size:11px;color:#555">vs. Israetel MEV/MRV</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${muscles.map(m => {
          const sets = thisMuscles[m] || 0;
          const key = m.replace(/ /g,'_');
          const mrv = MRV[key] || 16;
          const mev = Math.round(mrv * 0.4); // MEV ≈ 40% of MRV
          const pct = Math.min(100, (sets/mrv)*100);
          const col = MUSCLE_COLORS[m] || '#888';
          const status = sets === 0 ? '#333' : sets < mev ? '#ff4d8d' : pct < 70 ? '#ffe040' : '#69ff47';
          const label = sets === 0 ? 'none' : sets < mev ? 'under MEV' : pct >= 100 ? 'at MRV' : 'good';
          return `<div style="flex:1;min-width:130px;background:rgba(255,255,255,0.03);border:1px solid ${col}22;border-radius:8px;padding:12px">
            <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">
              <span style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:${status}">${sets}</span>
              <span style="font-size:10px;color:#444">/ ${mrv}</span>
            </div>
            <div style="font-size:10px;color:${col};letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">${m}</div>
            <div style="position:relative;height:5px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-bottom:4px">
              <div style="height:100%;width:${pct.toFixed(0)}%;background:linear-gradient(90deg,${col}88,${col});border-radius:2px"></div>
              <div style="position:absolute;top:0;left:40%;width:1px;height:100%;background:rgba(255,255,255,0.15)"></div>
            </div>
            <div style="font-size:9px;color:${status};letter-spacing:0.06em">${label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- WEEKLY VOLUME CHART -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><span class="card-title-icon">📊</span>Weekly Volume — Sets by Muscle Group</div>
      <canvas id="volume-chart" style="max-height:320px"></canvas>
    </div>

    <!-- FREQUENCY TABLE -->
    <div class="card">
      <div class="card-title"><span class="card-title-icon">📅</span>Muscle Frequency Grid
        <span style="margin-left:auto;font-size:10px;color:#444">green=12+ · yellow=6–11 · red=1–5 · —=none</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Muscle</th>
            ${weeks.map(w => `<th style="text-align:center;font-size:10px">${fmtDate(w)}</th>`).join('')}
            <th style="text-align:center">Avg</th>
          </tr></thead>
          <tbody>
            ${muscles.map(m => {
              const sets = weeks.map(w => weeklyVol[w]?.[m] || 0);
              const avg = (sets.reduce((a,b)=>a+b,0)/sets.length).toFixed(1);
              const col = MUSCLE_COLORS[m] || '#888';
              return `<tr>
                <td style="font-size:11px;color:${col};min-width:90px;padding:8px 10px">${m}</td>
                ${sets.map(s => `<td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:${s===0?'#2a2a3a':s<6?'#ff4d8d':s<12?'#ffe040':'#69ff47'};padding:8px 6px">${s||'—'}</td>`).join('')}
                <td style="text-align:center;font-size:12px;color:${col};font-weight:bold">${avg}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- TONNAGE STATS -->
    ${(() => {
      const sessions = getUserSessions(u.id);
      if (!sessions.length) return '';
      const exTonnage = {};
      const exSets = {};
      const exMaxWeight = {};
      let totalTonnage = 0;
      sessions.forEach(s => {
        (s.exercises||[]).forEach(ex => {
          if (!ex || !ex.name) return;
          const name = ex.name.trim();
          if (!exTonnage[name]) { exTonnage[name]=0; exSets[name]=0; exMaxWeight[name]=0; }
          (ex.sets||[]).forEach(st => {
            const w = parseFloat(st.weight)||0, r = parseInt(st.reps)||0;
            if (w && r) { exTonnage[name]+=w*r; exSets[name]++; exMaxWeight[name]=Math.max(exMaxWeight[name],w); totalTonnage+=w*r; }
          });
        });
      });
      const top = Object.entries(exTonnage).sort((a,b)=>b[1]-a[1]).slice(0,10);
      if (!top.length) return '';
      const maxT = top[0][1];
      return '<div class="card" style="margin-bottom:16px">' +
        '<div class="card-title"><span class="card-title-icon">🏋️</span>Top Exercises by Tonnage' +
        '<span style="margin-left:auto;font-size:11px;color:#555">All-time total: ' + (totalTonnage>=1000?(totalTonnage/1000).toFixed(1)+'k':Math.round(totalTonnage)) + ' lbs</span></div>' +
        top.map(([name, tons], i) => {
          const pct = Math.round((tons/maxT)*100);
          return '<div style="margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
            '<span style="font-size:10px;color:#555;width:16px;text-align:right">' + (i+1) + '</span>' +
            '<span style="font-size:12px;flex:1;color:var(--text)">' + name + '</span>' +
            '<span style="font-size:11px;color:#555">' + exSets[name] + ' sets · max ' + exMaxWeight[name] + ' lbs</span>' +
            '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:var(--cyan);min-width:65px;text-align:right">' + (tons>=1000?(tons/1000).toFixed(1)+'k':Math.round(tons)) + ' lbs</span>' +
            '</div>' +
            '<div style="height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">' +
            '<div style="height:100%;width:' + pct + '%;background:var(--cyan);border-radius:3px;opacity:0.7"></div>' +
            '</div></div>';
        }).join('') + '</div>';
    })()}
  `;
}

function mountVolumeChart(userId) {
  const ctx = document.getElementById('volume-chart');
  if (!ctx) return;
  const ch = Chart.getChart(ctx); if (ch) ch.destroy();
  const weeklyVol = getWeeklyVolume(userId);
  // volRangeWeeks is module-level, set by window.setVolRange
  const weeks = Object.keys(weeklyVol).sort().slice(-volRangeWeeks);
  if (!weeks.length) return;
  const muscles = [...new Set(Object.values(weeklyVol).flatMap(w => Object.keys(w)))].sort();
  const ranked = muscles.map(m => ({ m, total: weeks.reduce((s,w) => s+(weeklyVol[w]?.[m]||0), 0) }))
    .sort((a,b) => b.total-a.total).slice(0,8).map(x=>x.m);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weeks.map(w => fmtDate(w)),
      datasets: ranked.map(m => ({
        label: m, data: weeks.map(w => weeklyVol[w]?.[m] || 0),
        backgroundColor: (MUSCLE_COLORS[m]||'#888')+'aa',
        borderColor: MUSCLE_COLORS[m]||'#888', borderWidth:1, borderRadius:3,
      }))
    },
    options: {

window.previewImport = function(userId) {
  const text   = document.getElementById('import-paste')?.value;
  const dateEl = document.getElementById('import-date');
  const baseDate = dateEl?.value || new Date().toISOString().split('T')[0];
  if (!text?.trim()) return;

  const parsed = parseWorkoutPaste(text);
  // Assign dates: space sessions 1 day apart starting from baseDate
  parsed.forEach((s, i) => {
    const d = new Date(baseDate + 'T00:00:00');
    d.setDate(d.getDate() + i);
    s.date = d.toISOString().split('T')[0];
    s.userId = userId;
  });

  const el = document.getElementById('import-preview');
  if (!el) return;

  if (!parsed.length) {
    el.innerHTML = `<div style="color:#ff4d8d;font-size:13px">No sessions detected. Check format.</div>`;
    return;
  }

  const u = users.find(x => x.id === userId);
  el.innerHTML = `
    <div style="font-size:11px;color:#69ff47;margin-bottom:14px">✅ ${parsed.length} sessions parsed — review below, then confirm import.</div>
    ${parsed.map((s,i) => `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${u?.color||'#00e5ff'}">${s.label}</span>
        <span style="font-size:10px;color:#444">Day ${s.cycle} · ${fmtDate(s.date)}</span>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <label style="font-size:10px;color:#555;text-transform:none;letter-spacing:0;margin:0">Date:</label>
          <input type="date" value="${s.date}" id="import-date-${i}"
            style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:3px 8px;font-family:'DM Mono',monospace;font-size:11px;outline:none;width:130px">
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${(s.exercises||[]).map(ex => {
          const hasSets = ex.sets.filter(st=>st.weight||st.reps||st.weightNote).length;
          return `<span style="font-size:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:3px;padding:3px 8px;color:${hasSets?'#aaa':'#555'}">
            ${ex.name}${hasSets ? ' ('+hasSets+' sets)' : ''}
          </span>`;
        }).join('')}
      </div>
    </div>`).join('')}
    <button class="btn" style="width:100%;margin-top:8px" onclick="window.confirmImport('${userId}')">
      ✅ Import ${parsed.length} Sessions
    </button>
  `;

  // Store parsed data for confirm
  window._pendingImport = parsed;
};

window.confirmImport = async function(userId) {
  const parsed = window._pendingImport;
  if (!parsed?.length) return;
  // Update dates from per-session inputs
  parsed.forEach((s, i) => {
    const d = document.getElementById('import-date-'+i);
    if (d?.value) s.date = d.value;
    s.userId = userId;
  });
  for (const s of parsed) await saveTrainingSession(s);
  window._pendingImport = null;
  trainingSubTab = 'log';
  renderTraining();
};

// Helper: get live session object from trainingSessions (always current)
function getLiveSession(uid, sid) {
  return (trainingSessions[uid] || []).find(x => x.id === sid) || null;
}

window.updateSessionField = async function(uid, sid, field, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  s[field] = val;
  saveTrainingSession(s); // fire-and-forget; no re-render needed (input already shows new val)
};
window.updateSessionField = async function(uid, sid, field, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  s[field] = val;
  saveTrainingSession(s);
};
window.updateExerciseName = async function(uid, sid, exId, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  ex.name = val;
  saveTrainingSession(s);
};
window.updateSet = async function(uid, sid, exId, stId, field, val) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  const st = (ex.sets||[]).find(x=>x.id===stId); if(!st) return;
  st[field] = val === '' ? null : (field==='rpe'||field==='weight'||field==='reps') ? parseFloat(val) : val;
  saveTrainingSession(s);
};
window.deleteSet = async function(uid, sid, exId, stId) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  ex.sets = (ex.sets||[]).filter(x=>x.id!==stId);
  await saveTrainingSession(s);   // await so DOM update sees new data
  if (window._reRenderEditSession) window._reRenderEditSession();
};
window.addSet = async function(uid, sid, exId) {
  const s = getLiveSession(uid, sid); if(!s) return;
  const ex = (s.exercises||[]).find(e=>e.id===exId); if(!ex) return;
  const last = (ex.sets||[])[ex.sets.length-1] || {};
  ex.sets = [...(ex.sets||[]), { id:genId(), weight:last.weight||null, reps:last.reps||null, rpe:null, note:'' }];
  await saveTrainingSession(s);
  if (window._reRenderEditSession) window._reRenderEditSession();
};
window.deleteExercise = async function(uid, sid, exId) {
  const s = getLiveSession(uid, sid); if(!s) return;
  s.exercises = (s.exercises||[]).filter(e=>e.id!==exId);
  await saveTrainingSession(s);
  if (window._reRenderEditSession) window._reRenderEditSession();
};
window.addExercise = async function(uid, sid) {
  const s = getLiveSession(uid, sid); if(!s) return;
  // Optimistic mutation directly on the live object so re-render sees it immediately
  if (!s.exercises) s.exercises = [];
  s.exercises.push({ id:genId(), name:'New Exercise', sets:[{ id:genId(), weight:null, reps:null, rpe:null, note:'' }] });
  if (window._reRenderEditSession) window._reRenderEditSession(); // show immediately
  saveTrainingSession(s); // persist in background
};


// ── BOOT ───────────────────────────────────────────────────
// Wire nav via data attributes (avoids type=module scope issues with inline onclick)
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('mainNav').addEventListener('click', e => {
    const btn = e.target.closest('[data-view]');
    if (btn) window.showView(btn.dataset.view, { target: btn });
  });
});
initFirebase(HARDCODED_CONFIG);
</script>
</body>
